<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação B2B — Venda Direta | Controle Total</title>
    <script src="sidebar.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f1117;
            color: #c9d1d9;
            display: flex;
            min-height: 100vh;
        }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header {
            background-color: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            padding: 30px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #f0883e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .content { padding: 0 30px 30px; flex: 1; }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            background-color: #1a1d27;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2d3a;
            flex-wrap: wrap;
        }
        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        select, input[type="text"] {
            padding: 8px 12px;
            background-color: #0f1117;
            border: 1px solid #2a2d3a;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        select:focus, input[type="text"]:focus { outline: none; border-color: #f0883e; }
        .search-input { width: 100%; min-width: 200px; }
        .button {
            padding: 10px 16px;
            background-color: #f0883e;
            color: #0f1117;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .button:hover { background-color: #ff9d4d; }
        .button.secondary { background-color: #238636; color: #ffffff; }
        .button.secondary:hover { background-color: #2ea043; }
        .button.danger { background-color: #da3633; color: #ffffff; }
        .button:disabled { opacity: 0.5; cursor: not-allowed; }
        input[type="file"] { display: none; }

        /* Status bar */
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #8b949e;
        }
        .status-bar .stat { display: flex; align-items: center; gap: 6px; }
        .status-bar .stat .num { color: #f0883e; font-weight: 700; font-size: 16px; }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: calc(100vh - 220px);
            border-radius: 8px;
            border: 1px solid #2a2d3a;
        }
        table { width: 100%; border-collapse: collapse; background-color: #0f1117; }
        thead {
            background-color: #1a1d27;
            border-bottom: 2px solid #2a2d3a;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        thead th {
            background-color: #1a1d27;
        }
        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 0.5px;
        }
        th.price, td.price { text-align: center; }
        td {
            padding: 12px;
            border-bottom: 1px solid #2a2d3a;
            font-size: 14px;
        }

        /* Section Headers (títulos) */
        .section-header-row td {
            background-color: #1a1d27;
            padding: 14px 12px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            color: #f0883e;
            border-top: 2px solid #f0883e;
            border-bottom: 1px solid #2a2d3a;
            letter-spacing: 0.5px;
        }

        /* Separador (linha vazia visual) */
        .separator-row td {
            background-color: #0f1117;
            padding: 6px 0;
            border-bottom: none;
        }

        /* Product Rows */
        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover:not(.section-header-row) { background-color: #1a1d27; }
        tbody tr.product-row { cursor: pointer; }
        tbody tr.product-row.active-row { background-color: #1e2a3a; border-left: 3px solid #f0883e; }

        /* Expandable Detail Row */
        tr.detail-row { display: none; }
        tr.detail-row.open { display: table-row; }
        tr.detail-row td { padding: 0; border-bottom: 2px solid #f0883e40; }
        .detail-panel {
            background: linear-gradient(135deg, #141822 0%, #1a1d27 100%);
            padding: 16px 20px;
            animation: slideDown 0.25s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .detail-section {
            background: #0f111780;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            padding: 12px;
        }
        .detail-section h4 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #f0883e;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .detail-row-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid #2a2d3a20;
        }
        .detail-row-item:last-child { border-bottom: none; }
        .detail-label { color: #8b949e; }
        .detail-value {
            color: #e6edf3;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
        }
        .detail-value.highlight { color: #f0883e; }
        .detail-value.green { color: #3fb950; }
        .detail-formula {
            font-size: 10px;
            color: #6e7681;
            margin-top: 8px;
            font-style: italic;
        }
        .detail-toggle {
            padding: 3px 8px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            color: #8b949e;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .detail-toggle.active { background: #1e3a5f; border-color: #4a9eff; color: #e6edf3; }
        .no-cost { color: #f85149; }

        /* Modal de importação */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { color: #f0883e; margin-bottom: 20px; font-size: 20px; }
        .modal .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2d3a;
            font-size: 14px;
        }
        .modal .summary-item:last-child { border-bottom: none; }
        .modal .actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 20px;
            background-color: #238636;
            color: #fff;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { background-color: #da3633; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Loading */
        .loading { display: flex; justify-content: center; align-items: center; height: 400px; color: #6e7681; }
        .spinner {
            border: 3px solid #2a2d3a;
            border-top: 3px solid #f0883e;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header { padding: 20px; }
            .header h1 { font-size: 24px; }
            .content { padding: 0 15px 15px; }
            .controls-bar { flex-direction: column; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>

    <div id="sidebar-container"></div>

    <script src="/config.js"></script>
    <script>
        const SUPABASE_URL = window.GGE_SUPABASE_URL;
        const SUPABASE_KEY = window.GGE_SUPABASE_KEY;
        const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
        const HEADERS_GET = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

        // Busca paginada — Supabase limita a 1000 por request
        async function fetchAllRows(url) {
            let all = [];
            let page = 0;
            const PAGE_SIZE = 1000;
            while (true) {
                const from = page * PAGE_SIZE;
                const to = from + PAGE_SIZE - 1;
                const res = await fetch(url, {
                    headers: Object.assign({}, HEADERS_GET, { 'Range': from + '-' + to })
                });
                if (!res.ok) throw new Error('fetch ' + res.status);
                const rows = await res.json();
                all = all.concat(rows);
                if (rows.length < PAGE_SIZE) break;
                page++;
            }
            return all;
        }

        // ══════════════════════════════════════════════════════════
        // PARÂMETROS DE PRECIFICAÇÃO (alinhados com Skill calculo-margem)
        // Default: compra do mesmo estado
        // ══════════════════════════════════════════════════════════
        const PREC_PARAMS = {
            GGE: {
                comissao_pct: 0.12,       // 12% Clássico ML
                icms_pct: 0.18,           // 18% SP (mesmo estado — default)
                pis_cofins_pct: 0.0925,   // 9,25% (débito bruto)
                simples_pct: 0,
                ads_pct: 0,
                frete_fixo: 0,
            },
            TOOW: {
                comissao_pct: 0.12,
                icms_pct: 0,
                pis_cofins_pct: 0,
                simples_pct: 0.0865,      // 8,65% DAS
                ads_pct: 0,
                frete_fixo: 0,
            }
        };

        // Fórmula canônica (Skill calculo-margem § 4):
        //   GGE:  PV = (Custo + Frete) / (1 - comissão% - ads% - ICMS% - PIS_COFINS_líq% - MC%)
        //         PIS_COFINS_líq% = 9,25% × (1 - comissão% - ads%)
        //   TOOW: PV = (Custo + Frete) / (1 - comissão% - ads% - simples% - MC%)
        function calcPV(custo, mcPct, empresa) {
            if (custo <= 0) return 0;
            const p = PREC_PARAMS[empresa] || PREC_PARAMS.GGE;
            let deducoes;
            if (empresa === 'TOOW') {
                deducoes = p.comissao_pct + p.simples_pct + p.ads_pct;
            } else {
                const pisLiq = p.pis_cofins_pct * (1 - p.comissao_pct - p.ads_pct);
                deducoes = p.comissao_pct + p.icms_pct + pisLiq + p.ads_pct;
            }
            const denominador = 1 - deducoes - (mcPct / 100);
            if (denominador <= 0) return 0;
            return (custo + p.frete_fixo) / denominador;
        }

        // Alíquotas ICMS internas por UF (para DIFAL em B2B)
        const ICMS_UF = {AC:17,AL:19,AM:20,AP:18,BA:20.5,CE:20,DF:20,ES:17,GO:19,MA:22,MG:18,MS:17,MT:17,PA:19,PB:20,PE:20.5,PI:21,PR:19.5,RJ:22,RN:18,RO:19.5,RR:20,RS:17,SC:17,SE:19,SP:18,TO:20};
        const UFS_SUL_SUDESTE = ['PR','SC','RS','SP','RJ','MG','ES'];

        function icmsInterestadual(importado, ufDestino) {
            if (importado) return 4;
            if (UFS_SUL_SUDESTE.includes(ufDestino) && ufDestino !== 'ES') return 12;
            return 7;
        }

        function calcPV_B2B(custo, mcPct, importado, ufDestino, consumidorFinal) {
            if (custo <= 0) return 0;
            const icmsNF = icmsInterestadual(importado, ufDestino) / 100;
            const pisCofins = 0.0925;
            let difal = 0;
            if (consumidorFinal && ufDestino && ICMS_UF[ufDestino]) {
                difal = Math.max(0, (ICMS_UF[ufDestino] / 100) - icmsNF);
            }
            const den = 1 - icmsNF - pisCofins - difal - (mcPct / 100);
            if (den <= 0) return 0;
            return custo / den;
        }

        // Precificação Venda Direta (B2B) — trata GGE e TOOW
        // GGE: PV = Custo / (1 - ICMS_interestadual% - PIS/COFINS 9,25% - DIFAL% - MC%)
        // TOOW: PV = Custo / (1 - Simples 8,65% - MC%)
        function calcPV_VD(custo, mcPct, empresa, importado, ufDestino, consumidorFinal) {
            if (custo <= 0) return 0;
            let den;
            if (empresa === 'TOOW') {
                den = 1 - 0.0865 - (mcPct / 100);
            } else {
                const icmsNF = icmsInterestadual(importado || false, ufDestino || 'SP') / 100;
                const pisCofins = 0.0925;
                let difal = 0;
                if (consumidorFinal && ufDestino && ICMS_UF[ufDestino]) {
                    difal = Math.max(0, (ICMS_UF[ufDestino] / 100) - icmsNF);
                }
                den = 1 - icmsNF - pisCofins - difal - (mcPct / 100);
            }
            if (den <= 0) return 0;
            return custo / den;
        }

        // Decomposição da venda VD — retorna objeto com cada componente em R$
        function decomporVendaVD(custo, mcPct, empresa, importado, ufDestino, consumidorFinal) {
            const pv = calcPV_VD(custo, mcPct, empresa, importado, ufDestino, consumidorFinal);
            if (pv <= 0) return null;
            if (empresa === 'TOOW') {
                const simples = pv * 0.0865;
                const mc = pv * (mcPct / 100);
                return { pv, custo, simples, icms: 0, pisCofins: 0, difal: 0, mc, conferencia: pv - custo - simples - mc };
            } else {
                const icmsRate = icmsInterestadual(importado || false, ufDestino || 'SP') / 100;
                const icms = pv * icmsRate;
                const pisCofins = pv * 0.0925;
                let difal = 0;
                if (consumidorFinal && ufDestino && ICMS_UF[ufDestino]) {
                    const difalRate = Math.max(0, (ICMS_UF[ufDestino] / 100) - icmsRate);
                    difal = pv * difalRate;
                }
                const mc = pv * (mcPct / 100);
                return { pv, custo, icms, icmsRate, pisCofins, difal, simples: 0, mc, conferencia: pv - custo - icms - pisCofins - difal - mc };
            }
        }

        // ══════════════════════════════════════════════════════════
        // STATE
        // ══════════════════════════════════════════════════════════
        let skuData = {};              // { sku: { descricao, custo_cif_rj, custo_cif_sp, unidade, is_combo } }
        let anunciosPorSku = {};       // { SKU: [{ mlb_id, titulo, preco, tipo, status }] }
        let custoHistPorSku = {};      // { sku|empresa: { preco_fob, frete, ... } }
        let tabelaVdItens = [];        // [{ ordem, tipo, sku, descricao_titulo, custo_cif_override }]
        let currentEmpresa = 'GGE';
        let pendingImport = null;      // dados para confirmar importação

        // DOM
        const empresaSelect = document.getElementById('empresaSelect');
        const searchInput = document.getElementById('searchInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const loadingState = document.getElementById('loadingState');
        const pricingTable = document.getElementById('pricingTable');
        const tableBody = document.getElementById('tableBody');

        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            empresaSelect.addEventListener('change', (e) => {
                currentEmpresa = e.target.value;
                loadTabelaVd().then(() => renderTable());
            });
            searchInput.addEventListener('input', () => renderTable());
            downloadBtn.addEventListener('click', downloadExcel);
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileUpload);
        });

        // ══════════════════════════════════════════════════════════
        // DATA LOADING
        // ══════════════════════════════════════════════════════════
        async function loadAllData() {
            loadingState.style.display = 'flex';
            pricingTable.style.display = 'none';
            try {
                const [skuArr, anunciosArr, custoHistArr] = await Promise.all([
                    fetchAllRows(`${SUPABASE_URL}/rest/v1/skus_custo?select=sku,descricao,custo_cif_rj,custo_cif_sp,unidade,is_combo,peso`),
                    fetchAllRows(`${SUPABASE_URL}/rest/v1/anuncios?select=mlb_id,sku_vendedor,titulo,preco_atual,tipo_listagem,status&status=eq.active&sku_vendedor=not.is.null`),
                    fetchAllRows(`${SUPABASE_URL}/rest/v1/skus_custo_historico?select=sku,empresa,preco_fob,frete,icms_credito,pis_cofins_credito,ipi_valor,st_valor,outros_custos,custo_cif_rj,custo_cif_sp,nota_fiscal,data_vigencia,origem&order=data_vigencia.desc`)
                ]);

                skuData = {};
                skuArr.forEach(item => {
                    skuData[item.sku] = {
                        descricao: item.descricao || '',
                        custo_cif_rj: parseFloat(item.custo_cif_rj) || 0,
                        custo_cif_sp: parseFloat(item.custo_cif_sp) || 0,
                        unidade: item.unidade || '',
                        is_combo: item.is_combo || false,
                        peso: parseFloat(item.peso) || 0
                    };
                });

                anunciosPorSku = {};
                anunciosArr.forEach(a => {
                    const s = (a.sku_vendedor || '').trim().toUpperCase();
                    if (!s) return;
                    if (!anunciosPorSku[s]) anunciosPorSku[s] = [];
                    anunciosPorSku[s].push({ mlb_id: a.mlb_id, titulo: a.titulo || '', preco: a.preco_atual || 0, tipo: a.tipo_listagem || '', status: a.status || '' });
                });

                custoHistPorSku = {};
                custoHistArr.forEach(h => {
                    const key = h.sku + '|' + (h.empresa || 'GGE');
                    if (!custoHistPorSku[key]) custoHistPorSku[key] = h;
                });

                await loadTabelaVd();
                renderTable();
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showToast(`Erro ao carregar dados: ${error.message}`, 'error');
                loadingState.style.display = 'none';
            }
        }

        async function loadTabelaVd() {
            try {
                tabelaVdItens = await fetchAllRows(`${SUPABASE_URL}/rest/v1/tabela_vd_itens?empresa=eq.${currentEmpresa}&order=ordem.asc`);
            } catch (e) {
                console.error('Erro ao carregar tabela VD:', e);
                tabelaVdItens = [];
            }
        }

        // ══════════════════════════════════════════════════════════
        // RENDER
        // ══════════════════════════════════════════════════════════
        function renderTable() {
            loadingState.style.display = 'none';
            pricingTable.style.display = 'table';
            tableBody.innerHTML = '';
            const query = (searchInput.value || '').toLowerCase().trim();
            const margins = [50, 45, 40, 35, 30];

            let totalProdutos = 0, semCusto = 0, totalTitulos = 0;

            if (tabelaVdItens.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#6e7681;">Nenhum item na Tabela VD para ' + currentEmpresa + '.<br>Use "Enviar Excel" para importar a lista de produtos.</td></tr>';
                updateStatus(0, 0, 0);
                return;
            }

            for (const item of tabelaVdItens) {
                if (item.tipo === 'separador') {
                    if (query) continue;
                    tableBody.innerHTML += `<tr class="separator-row"><td colspan="10"></td></tr>`;
                    continue;
                }
                if (item.tipo === 'titulo') {
                    if (query) continue;
                    totalTitulos++;
                    tableBody.innerHTML += `<tr class="section-header-row"><td colspan="10">${item.descricao_titulo || '—'}</td></tr>`;
                    continue;
                }

                // Produto
                const sku = item.sku;
                const skuInfo = skuData[sku];
                if (!skuInfo) {
                    // SKU na tabela VD mas não existe em skus_custo
                    if (query && !sku.toLowerCase().includes(query)) continue;
                    totalProdutos++;
                    semCusto++;
                    tableBody.innerHTML += `<tr class="product-row"><td style="color:#f85149;">${sku} (SKU não encontrado)</td><td>${sku}</td><td colspan="8" style="color:#f85149;">SKU não cadastrado em skus_custo</td></tr>`;
                    continue;
                }

                if (query) {
                    if (!sku.toLowerCase().includes(query) && !skuInfo.descricao.toLowerCase().includes(query)) continue;
                }

                totalProdutos++;

                // Custo: override > custo_cif da empresa
                const custoOverride = item.custo_cif_override ? parseFloat(item.custo_cif_override) : null;
                const custoDB = currentEmpresa === 'TOOW' ? skuInfo.custo_cif_sp : skuInfo.custo_cif_rj;
                const custo = custoOverride || custoDB;

                if (custo <= 0) semCusto++;

                const costText = custo > 0 ? `R$ ${fmtR$(custo)}` : '<span style="color:#f85149;font-weight:600;">SEM CUSTO</span>';
                let pricesCells = '';
                if (custo > 0) {
                    margins.forEach(m => {
                        const pv = calcPV_VD(custo, m, currentEmpresa, false, 'SP', false);
                        pricesCells += `<td class="price">${pv > 0 ? 'R$ ' + fmtR$(pv) : '—'}</td>`;
                    });
                } else {
                    pricesCells = '<td class="price no-cost" colspan="5">—</td>';
                }

                const detailId = `detail-${sku.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const detailContent = buildDetailPanel(sku, skuInfo, custo, margins);

                tableBody.innerHTML += `
                    <tr class="product-row" onclick="toggleDetail('${detailId}', this)">
                        <td>${skuInfo.descricao}</td>
                        <td class="sku">${sku}</td>
                        <td>${skuInfo.is_combo ? 'COMBO' : ''}</td>
                        <td>${skuInfo.unidade}</td>
                        <td class="price ${custo > 0 ? '' : 'no-cost'}">${costText}</td>
                        ${pricesCells}
                    </tr>
                    <tr class="detail-row" id="${detailId}"><td colspan="10">${detailContent}</td></tr>
                `;
            }

            if (!tableBody.innerHTML) {
                tableBody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#6e7681;">Nenhum produto encontrado</td></tr>';
            }

            updateStatus(totalProdutos, semCusto, totalTitulos);
        }

        function updateStatus(produtos, semCusto, titulos) {
            const bar = document.getElementById('statusBar');
            bar.innerHTML = `
                <div class="stat"><span class="num">${produtos}</span> produtos</div>
                <div class="stat"><span class="num">${titulos}</span> seções</div>
                ${semCusto > 0 ? `<div class="stat" style="color:#f85149;"><span class="num" style="color:#f85149;">${semCusto}</span> sem custo</div>` : ''}
            `;
        }

        function toggleDetail(detailId, productRow) {
            const detailRow = document.getElementById(detailId);
            if (!detailRow) return;
            const wasOpen = detailRow.classList.contains('open');
            document.querySelectorAll('tr.detail-row.open').forEach(r => r.classList.remove('open'));
            document.querySelectorAll('tr.product-row.active-row').forEach(r => r.classList.remove('active-row'));
            if (!wasOpen) { detailRow.classList.add('open'); productRow.classList.add('active-row'); }
        }

        // ══════════════════════════════════════════════════════════
        // DETAIL PANEL (mantido do original — cards de referências, custo CIF, B2B)
        // ══════════════════════════════════════════════════════════
        function buildDetailPanel(sku, item, custo, margins) {
            const panelId = `panel-${sku.replace(/[^a-zA-Z0-9]/g, '')}`;
            const empresa = currentEmpresa;

            // Card 1: Referências ML
            const anuncios = anunciosPorSku[sku.toUpperCase()] || [];
            let refLines = '';
            if (anuncios.length > 0) {
                anuncios.forEach(a => {
                    const tipo = a.tipo === 'gold_pro' ? ' P' : a.tipo === 'gold_special' ? ' C' : '';
                    refLines += `<div class="detail-row-item"><span class="detail-label" style="max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.titulo}">${a.mlb_id}</span><span class="detail-value green">R$ ${fmtR$(a.preco)}${tipo}</span></div>`;
                });
            } else {
                refLines = '<div class="detail-row-item"><span class="detail-label" style="color:#6e7681;">Nenhum anúncio ativo</span></div>';
            }
            const card1 = `<div class="detail-section"><h4>Referências ML</h4>${refLines}</div>`;

            // Card 2: Custo CIF destrinchado
            const histKey = sku + '|' + empresa;
            const hist = custoHistPorSku[histKey] || custoHistPorSku[sku + '|GGE'] || null;
            let card2Content = '';
            if (hist) {
                const fob = parseFloat(hist.preco_fob) || 0, ipi = parseFloat(hist.ipi_valor) || 0, st = parseFloat(hist.st_valor) || 0;
                const freteC = parseFloat(hist.frete) || 0;
                let icmsC = parseFloat(hist.icms_credito) || 0, pisCofC = parseFloat(hist.pis_cofins_credito) || 0;
                const outros = parseFloat(hist.outros_custos) || 0;
                const cifRJ = parseFloat(hist.custo_cif_rj) || 0, cifSP = parseFloat(hist.custo_cif_sp) || 0;
                const cifFinal = empresa === 'TOOW' ? cifSP : cifRJ;
                const nf = hist.nota_fiscal || '—';
                const dataVig = hist.data_vigencia ? new Date(hist.data_vigencia + 'T12:00:00').toLocaleDateString('pt-BR') : '—';

                // Back-calculate créditos quando estão zerados mas CIF < bruto (migração legada)
                let creditosEstimados = false;
                if (empresa !== 'TOOW' && icmsC === 0 && pisCofC === 0 && fob > 0) {
                    const bruto = fob + ipi + st + freteC + outros;
                    if (cifFinal < bruto && cifFinal > 0) {
                        // Estimar créditos: ICMS 18% × FOB, PIS/COFINS 9,25% × (FOB + IPI)
                        icmsC = fob * 0.18;
                        pisCofC = (fob + ipi) * 0.0925;
                        creditosEstimados = true;
                    }
                }

                card2Content = `
                    <div class="detail-row-item"><span class="detail-label">FOB</span><span class="detail-value">R$ ${fmtR$(fob)}</span></div>
                    ${ipi > 0 ? `<div class="detail-row-item"><span class="detail-label">(+) IPI</span><span class="detail-value">R$ ${fmtR$(ipi)}</span></div>` : ''}
                    ${st > 0 ? `<div class="detail-row-item"><span class="detail-label">(+) ST</span><span class="detail-value">R$ ${fmtR$(st)}</span></div>` : ''}
                    ${freteC > 0 ? `<div class="detail-row-item"><span class="detail-label">(+) Frete compra</span><span class="detail-value">R$ ${fmtR$(freteC)}</span></div>` : ''}
                    ${empresa !== 'TOOW' ? `
                    <div style="border-top:1px solid #2a2d3a;margin-top:4px;padding-top:4px;">
                        <div class="detail-row-item"><span class="detail-label">(-) ICMS cred.${creditosEstimados ? ' *' : ''}</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(icmsC)}</span></div>
                        <div class="detail-row-item"><span class="detail-label">(-) PIS/COF cred.${creditosEstimados ? ' *' : ''}</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(pisCofC)}</span></div>
                    </div>` : ''}
                    <div class="detail-row-item" style="border-top:1px solid #f0883e40;margin-top:6px;padding-top:6px;">
                        <span class="detail-label" style="font-weight:700;">= CIF Final</span>
                        <span class="detail-value highlight" style="font-size:14px;">R$ ${fmtR$(cifFinal)}</span>
                    </div>
                    <div class="detail-formula">NF ${nf} · ${dataVig}${creditosEstimados ? '<br>* Créditos estimados (ICMS 18%, PIS/COF 9,25%)' : ''}</div>`;
            } else {
                card2Content = `
                    <div class="detail-row-item"><span class="detail-label">CIF RJ (fixo)</span><span class="detail-value">${item.custo_cif_rj > 0 ? 'R$ ' + fmtR$(item.custo_cif_rj) : '—'}</span></div>
                    <div class="detail-row-item"><span class="detail-label">CIF SP (fixo)</span><span class="detail-value">${item.custo_cif_sp > 0 ? 'R$ ' + fmtR$(item.custo_cif_sp) : '—'}</span></div>
                    <div class="detail-formula" style="color:#f85149;">Sem NF — custo fixo legado</div>`;
            }
            const card2 = `<div class="detail-section"><h4>Custo CIF</h4>${card2Content}</div>`;

            // Card 3: Preços por margem (resumo)
            let card3Lines = '';
            const isToow = empresa === 'TOOW';
            const icmsLabel = isToow ? 'Simples 8,65%' : 'ICMS 12% + PIS/COF 9,25%';
            if (custo > 0) {
                [50, 45, 40, 35, 30, 25, 20].forEach(mc => {
                    const pv = calcPV_VD(custo, mc, empresa, false, 'SP', false);
                    const lucro = pv > 0 ? (pv * (mc / 100)) : 0;
                    card3Lines += `<div class="detail-row-item"><span class="detail-label">MC ${mc}%</span><span class="detail-value green">R$ ${pv > 0 ? fmtR$(pv) : '—'} <span style="color:#8b949e;font-size:10px;">lucro R$ ${fmtR$(lucro)}</span></span></div>`;
                });
            } else {
                card3Lines = '<div class="detail-row-item"><span class="detail-label" style="color:#f85149;">Sem custo</span></div>';
            }
            const formulaLabel = isToow
                ? 'PV = Custo / (1 - Simples 8,65% - MC%)'
                : 'PV = Custo / (1 - ICMS 12% - PIS/COF 9,25% - MC%)';
            const card3 = `<div class="detail-section"><h4>Preços VD (Nac · Fora Estado)</h4>${card3Lines}<div class="detail-formula">${formulaLabel}</div></div>`;

            // Card 4: Memória de cálculo da VENDA (decomposição para MC 30%)
            let card4Content = '';
            if (custo > 0) {
                const d = decomporVendaVD(custo, 30, empresa, false, 'SP', false);
                if (d) {
                    card4Content = `
                        <div class="detail-row-item"><span class="detail-label" style="font-weight:700;">Preço de Venda</span><span class="detail-value green" style="font-size:14px;">R$ ${fmtR$(d.pv)}</span></div>
                        <div style="border-top:1px solid #2a2d3a;margin-top:4px;padding-top:4px;">
                        <div class="detail-row-item"><span class="detail-label">(-) Custo produto</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(d.custo)}</span></div>
                        ${isToow ? `
                        <div class="detail-row-item"><span class="detail-label">(-) Simples 8,65%</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(d.simples)}</span></div>
                        ` : `
                        <div class="detail-row-item"><span class="detail-label">(-) ICMS 12%</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(d.icms)}</span></div>
                        <div class="detail-row-item"><span class="detail-label">(-) PIS/COFINS 9,25%</span><span class="detail-value" style="color:#f85149;">-R$ ${fmtR$(d.pisCofins)}</span></div>
                        `}
                        </div>
                        <div class="detail-row-item" style="border-top:1px solid #3fb95040;margin-top:6px;padding-top:6px;">
                            <span class="detail-label" style="font-weight:700;">= MC 30%</span>
                            <span class="detail-value" style="color:#3fb950;font-size:14px;">R$ ${fmtR$(d.mc)}</span>
                        </div>
                        <div class="detail-row-item"><span class="detail-label" style="color:#8b949e;">Conferência</span><span class="detail-value" style="color:#8b949e;">R$ ${fmtR$(Math.abs(d.conferencia))} ${Math.abs(d.conferencia) < 0.02 ? '✓' : '⚠'}</span></div>`;
                }
            } else {
                card4Content = '<div class="detail-row-item"><span class="detail-label" style="color:#f85149;">Sem custo</span></div>';
            }
            const card4 = `<div class="detail-section"><h4>Memória da Venda (MC 30%)</h4>${card4Content}<div class="detail-formula">Cenário: Nacional · Fora do Estado · Ind/Rev (CNPJ)</div></div>`;

            return `<div class="detail-panel" data-sku="${sku}" data-custo="${custo}" data-empresa="${empresa}" id="${panelId}"><div class="detail-grid">${card1}${card2}${card3}${card4}</div></div>`;
        }

        // ══════════════════════════════════════════════════════════
        // EXCEL DOWNLOAD
        // ══════════════════════════════════════════════════════════
        function downloadExcel() {
            try {
                const wb = XLSX.utils.book_new();
                const data = [];
                const margins = [50, 45, 40, 35, 30];

                // Header
                data.push(['Tipo', 'SKU', 'Descrição', 'Custo CIF', 'MC 50%', 'MC 45%', 'MC 40%', 'MC 35%', 'MC 30%']);

                for (const item of tabelaVdItens) {
                    if (item.tipo === 'separador') {
                        data.push(['separador', '', '', '', '', '', '', '', '']);
                        continue;
                    }
                    if (item.tipo === 'titulo') {
                        data.push(['titulo', '', item.descricao_titulo || '', '', '', '', '', '', '']);
                        continue;
                    }
                    const sku = item.sku;
                    const skuInfo = skuData[sku];
                    const custoOverride = item.custo_cif_override ? parseFloat(item.custo_cif_override) : null;
                    const custoDB = skuInfo ? (currentEmpresa === 'TOOW' ? skuInfo.custo_cif_sp : skuInfo.custo_cif_rj) : 0;
                    const custo = custoOverride || custoDB;

                    const precos = margins.map(m => custo > 0 ? Math.round(calcPV_VD(custo, m, currentEmpresa, false, 'SP', false) * 100) / 100 : 0);
                    data.push([
                        'produto',
                        sku,
                        skuInfo ? skuInfo.descricao : '(não encontrado)',
                        custo,
                        ...precos
                    ]);
                }

                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!cols'] = [{ wch: 10 }, { wch: 20 }, { wch: 50 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
                XLSX.utils.book_append_sheet(wb, ws, 'Precificação');

                // Aba Memória de Cálculo (alinhada com Skill calculo-margem)
                const p = PREC_PARAMS[currentEmpresa];
                const pisLiq = currentEmpresa === 'TOOW' ? 0 : p.pis_cofins_pct * (1 - p.comissao_pct - p.ads_pct);
                const totalDed = currentEmpresa === 'TOOW'
                    ? p.comissao_pct + p.simples_pct + p.ads_pct
                    : p.comissao_pct + p.icms_pct + pisLiq + p.ads_pct;

                const mem = [
                    ['MEMÓRIA DE CÁLCULO — PRECIFICAÇÃO'],
                    ['Empresa:', currentEmpresa],
                    ['Regime:', currentEmpresa === 'TOOW' ? 'Simples Nacional (DAS 8,65%)' : 'Lucro Real'],
                    ['Data:', new Date().toLocaleDateString('pt-BR')],
                    [],
                    ['FÓRMULA (Skill calculo-margem § 4):'],
                    [currentEmpresa === 'TOOW'
                        ? 'PV = (Custo CIF + Frete) / (1 - Comissão% - Simples% - ADs% - MC%)'
                        : 'PV = (Custo CIF + Frete) / (1 - Comissão% - ICMS% - PIS/COFINS líq% - ADs% - MC%)'],
                    [],
                    ['DEDUÇÕES CONSIDERADAS:', 'Valor', 'Nota'],
                    ['Comissão ML:', (p.comissao_pct * 100).toFixed(1) + '%', '12% Clássico (padrão)'],
                    currentEmpresa === 'TOOW'
                        ? ['Simples Nacional (DAS):', (p.simples_pct * 100).toFixed(2) + '%', 'Substitui ICMS+PIS+COF+IRPJ+CSLL']
                        : ['ICMS débito:', (p.icms_pct * 100).toFixed(1) + '%', 'Default SP (mesmo estado)'],
                    currentEmpresa !== 'TOOW'
                        ? ['PIS/COFINS líquido:', (pisLiq * 100).toFixed(2) + '%', '= 9,25% × (1 - comissão% - ads%)']
                        : null,
                    ['ADs (publicidade):', (p.ads_pct * 100).toFixed(1) + '%', 'Sem ADs por default'],
                    ['Frete estimado:', 'R$ ' + p.frete_fixo.toFixed(2), 'Não incluso (varia por peso/preço)'],
                    [],
                    ['TOTAL DEDUÇÕES:', (totalDed * 100).toFixed(2) + '%'],
                    ['MARGEM MÁXIMA POSSÍVEL:', ((1 - totalDed) * 100).toFixed(2) + '%'],
                    [],
                    ['PREMISSAS:'],
                    ['- Compra do MESMO estado (sem DIFAL na compra)'],
                    ['- DIFAL na venda NÃO incluído (varia por UF destino + tipo documento)'],
                    ['- Frete do vendedor NÃO incluído (varia por peso + preço)'],
                    currentEmpresa !== 'TOOW' ? ['- PIS/COFINS: crédito sobre comissão ML e ADs (confirmado)'] : null,
                    ['- Para cálculo exato por venda realizada, usar página Margem'],
                    [],
                    ['INSTRUÇÕES DE EDIÇÃO:'],
                    ['- Coluna "Tipo": "produto" para SKU, "titulo" para cabeçalho de seção, "separador" para espaço vazio'],
                    ['- Para TÍTULO: preencha só Tipo e Descrição. SKU fica vazio.'],
                    ['- Para SEPARADOR: preencha só Tipo = "separador" (ou deixe a linha toda vazia).'],
                    ['- Para PRODUTO: preencha Tipo, SKU e opcionalmente Custo CIF.'],
                    ['- Se Custo CIF ficar vazio, usa o valor do banco Supabase.'],
                    ['- Se Custo CIF for preenchido, atualiza o banco ao importar.'],
                    ['- A ORDEM das linhas na planilha define a ordem na tabela.'],
                    ['- Para REMOVER um produto, apague a linha inteira.'],
                    ['- Para ADICIONAR, insira uma nova linha com Tipo e SKU.'],
                ].filter(Boolean);

                const memWs = XLSX.utils.aoa_to_sheet(mem);
                memWs['!cols'] = [{ wch: 38 }, { wch: 18 }, { wch: 45 }];
                XLSX.utils.book_append_sheet(wb, memWs, 'Memória de Cálculo');

                XLSX.writeFile(wb, `precificacao_${currentEmpresa}_${new Date().toISOString().split('T')[0]}.xlsx`);
                showToast('Excel baixado com sucesso!');
            } catch (error) {
                console.error('Erro ao baixar Excel:', error);
                showToast(`Erro: ${error.message}`, 'error');
            }
        }

        // ══════════════════════════════════════════════════════════
        // EXCEL UPLOAD + IMPORT
        // ══════════════════════════════════════════════════════════
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'array' });
                    const ws = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

                    // Processar linhas
                    const itens = [];
                    let ordem = 1;
                    const novosSkus = [];
                    const custosAlterados = [];

                    for (const row of rows) {
                        const tipo = (row['Tipo'] || row['tipo'] || 'produto').toString().trim().toLowerCase();
                        const sku = (row['SKU'] || row['sku'] || '').toString().trim().toUpperCase();
                        const desc = (row['Descrição'] || row['descricao'] || row['Descrição'] || '').toString().trim();
                        const custoRaw = row['Custo CIF'] || row['custo_cif'] || '';
                        const custoNum = custoRaw !== '' ? parseFloat(custoRaw) : null;

                        if (tipo === 'separador' || (tipo === '' && !sku && !desc)) {
                            itens.push({ ordem: ordem++, tipo: 'separador', sku: null, descricao_titulo: null, custo_cif_override: null });
                        } else if (tipo === 'titulo') {
                            itens.push({ ordem: ordem++, tipo: 'titulo', sku: null, descricao_titulo: desc || 'Sem título', custo_cif_override: null });
                        } else if (sku) {
                            const override = (custoNum !== null && custoNum > 0) ? custoNum : null;
                            itens.push({ ordem: ordem++, tipo: 'produto', sku: sku, descricao_titulo: null, custo_cif_override: override });

                            // Verificar se SKU é novo ou se custo mudou
                            if (!skuData[sku]) {
                                novosSkus.push(sku);
                            } else if (override !== null) {
                                const custoAtual = currentEmpresa === 'TOOW' ? skuData[sku].custo_cif_sp : skuData[sku].custo_cif_rj;
                                if (Math.abs(override - custoAtual) > 0.01) {
                                    custosAlterados.push({ sku, de: custoAtual, para: override });
                                }
                            }
                        }
                    }

                    // Comparar com estado atual
                    const skusAtuais = new Set(tabelaVdItens.filter(i => i.tipo === 'produto').map(i => i.sku));
                    const skusNovos = new Set(itens.filter(i => i.tipo === 'produto').map(i => i.sku));
                    const adicionados = [...skusNovos].filter(s => !skusAtuais.has(s));
                    const removidos = [...skusAtuais].filter(s => !skusNovos.has(s));

                    // Guardar para confirmação
                    pendingImport = { itens, novosSkus, custosAlterados, adicionados, removidos };

                    // Mostrar modal de confirmação
                    showImportModal(itens, novosSkus, custosAlterados, adicionados, removidos);
                } catch (error) {
                    console.error('Erro ao processar arquivo:', error);
                    showToast(`Erro ao processar: ${error.message}`, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        }

        function showImportModal(itens, novosSkus, custosAlterados, adicionados, removidos) {
            const totalProd = itens.filter(i => i.tipo === 'produto').length;
            const totalTit = itens.filter(i => i.tipo === 'titulo').length;

            let html = `
                <div class="summary-item"><span>Total de produtos</span><span style="color:#3fb950;font-weight:700;">${totalProd}</span></div>
                <div class="summary-item"><span>Seções/títulos</span><span style="font-weight:700;">${totalTit}</span></div>
            `;

            if (adicionados.length > 0) {
                html += `<div class="summary-item"><span style="color:#3fb950;">Produtos adicionados</span><span style="color:#3fb950;font-weight:700;">+${adicionados.length}</span></div>`;
                html += `<div style="padding:4px 0 8px 16px;font-size:12px;color:#8b949e;">${adicionados.join(', ')}</div>`;
            }
            if (removidos.length > 0) {
                html += `<div class="summary-item"><span style="color:#f85149;">Produtos removidos</span><span style="color:#f85149;font-weight:700;">-${removidos.length}</span></div>`;
                html += `<div style="padding:4px 0 8px 16px;font-size:12px;color:#8b949e;">${removidos.join(', ')}</div>`;
            }
            if (custosAlterados.length > 0) {
                html += `<div class="summary-item"><span style="color:#d29922;">Custos alterados</span><span style="color:#d29922;font-weight:700;">${custosAlterados.length}</span></div>`;
                custosAlterados.forEach(c => {
                    html += `<div style="padding:2px 0 2px 16px;font-size:12px;color:#8b949e;">${c.sku}: R$ ${fmtR$(c.de)} → R$ ${fmtR$(c.para)}</div>`;
                });
            }
            if (novosSkus.length > 0) {
                html += `<div class="summary-item" style="margin-top:8px;"><span style="color:#f85149;">SKUs não encontrados no banco</span><span style="color:#f85149;font-weight:700;">${novosSkus.length}</span></div>`;
                html += `<div style="padding:4px 0 8px 16px;font-size:12px;color:#f85149;">${novosSkus.join(', ')}<br><em>Estes SKUs serão incluídos na tabela VD mas não têm custo cadastrado.</em></div>`;
            }

            document.getElementById('importSummary').innerHTML = html;
            document.getElementById('importModal').classList.add('open');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('open');
            pendingImport = null;
        }

        async function confirmImport() {
            if (!pendingImport) return;
            const btn = document.getElementById('confirmImportBtn');
            btn.disabled = true;
            btn.textContent = 'Importando...';

            try {
                const empresa = currentEmpresa;
                const itens = pendingImport.itens;
                const custosAlterados = pendingImport.custosAlterados;

                // 1. Deletar itens antigos da empresa
                const delRes = await fetch(`${SUPABASE_URL}/rest/v1/tabela_vd_itens?empresa=eq.${empresa}`, {
                    method: 'DELETE',
                    headers: HEADERS
                });
                if (!delRes.ok) throw new Error(`Erro ao limpar tabela: ${delRes.status}`);

                // 2. Inserir novos itens em lotes de 50
                for (let i = 0; i < itens.length; i += 50) {
                    const batch = itens.slice(i, i + 50).map(it => ({
                        empresa: empresa,
                        ordem: it.ordem,
                        tipo: it.tipo,
                        sku: it.sku,
                        descricao_titulo: it.descricao_titulo,
                        custo_cif_override: it.custo_cif_override
                    }));

                    const insRes = await fetch(`${SUPABASE_URL}/rest/v1/tabela_vd_itens`, {
                        method: 'POST',
                        headers: HEADERS,
                        body: JSON.stringify(batch)
                    });
                    if (!insRes.ok) throw new Error(`Erro ao inserir lote ${i}: ${insRes.status}`);
                }

                // 3. Atualizar custos alterados em skus_custo
                for (const c of custosAlterados) {
                    const campo = empresa === 'TOOW' ? 'custo_cif_sp' : 'custo_cif_rj';
                    const updRes = await fetch(`${SUPABASE_URL}/rest/v1/skus_custo?sku=eq.${encodeURIComponent(c.sku)}`, {
                        method: 'PATCH',
                        headers: HEADERS,
                        body: JSON.stringify({ [campo]: c.para, atualizado_em: new Date().toISOString() })
                    });
                    if (!updRes.ok) console.warn(`Falha ao atualizar custo de ${c.sku}: ${updRes.status}`);
                    else {
                        // Atualizar em memória
                        if (skuData[c.sku]) skuData[c.sku][campo] = c.para;
                    }
                }

                // 4. Recarregar tabela VD e renderizar
                await loadTabelaVd();
                renderTable();

                closeImportModal();
                showToast(`Importação concluída! ${itens.filter(i=>i.tipo==='produto').length} produtos, ${itens.filter(i=>i.tipo==='titulo').length} seções.`);
            } catch (error) {
                console.error('Erro na importação:', error);
                showToast(`Erro: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirmar Importação';
            }
        }

        // ══════════════════════════════════════════════════════════
        // UTILS
        // ══════════════════════════════════════════════════════════
        function fmtR$(v) {
            return (Math.round(v * 100) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
