<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação B2B — Venda Direta | Controle Total</title>
    <script src="auth.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f1117;
            color: #c9d1d9;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #1a1d27;
            border-right: 1px solid #2a2d3a;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
            color: #f0883e;
        }

        .sidebar-logo span {
            margin-left: 8px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 12px;
        }

        .sidebar-nav a {
            display: block;
            padding: 10px 12px;
            color: #c9d1d9;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        .sidebar-nav a:hover {
            background-color: #2a2d3a;
        }

        .sidebar-nav a.active {
            background-color: #f0883e;
            color: #0f1117;
            font-weight: 600;
        }

        .toggle-sidebar {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: #1a1d27;
            border: 1px solid #2a2d3a;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Main Content */
        .main {
            margin-left: 250px;
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .main.full-width {
            margin-left: 0;
        }

        .header {
            background-color: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            padding: 30px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #f0883e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content {
            padding: 0 30px 30px;
            flex: 1;
        }

        /* Controls Bar */
        .controls-bar {
            display: grid;
            grid-template-columns: 150px 1fr auto auto;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            background-color: #1a1d27;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2d3a;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        select, input[type="text"], input[type="file"] {
            padding: 8px 12px;
            background-color: #0f1117;
            border: 1px solid #2a2d3a;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #f0883e;
        }

        .search-input {
            width: 100%;
        }

        .button {
            padding: 10px 16px;
            background-color: #f0883e;
            color: #0f1117;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .button:hover {
            background-color: #ff9d4d;
        }

        .button.secondary {
            background-color: #2a2d3a;
            color: #c9d1d9;
        }

        .button.secondary:hover {
            background-color: #3a3d4a;
        }

        input[type="file"] {
            display: none;
        }

        #uploadLabel {
            display: inline-block;
            cursor: pointer;
        }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2a2d3a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #0f1117;
        }

        thead {
            background-color: #1a1d27;
            border-bottom: 2px solid #2a2d3a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 0.5px;
        }

        th.price {
            text-align: right;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #2a2d3a;
            font-size: 14px;
        }

        /* Section Headers */
        .section-header {
            background-color: #1a1d27;
            padding: 14px 12px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            color: #f0883e;
            letter-spacing: 0.5px;
        }

        /* Category Headers (Machines) */
        .category-header {
            background-color: #1a1d27;
            padding: 14px 12px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            color: #f0883e;
            border-top: 2px solid #f0883e;
            border-bottom: 1px solid #2a2d3a;
            letter-spacing: 0.5px;
        }

        /* Subcategory Headers */
        .subcategory-header {
            background-color: #1e3a5f;
            padding: 12px;
            font-weight: 600;
            font-size: 12px;
            color: #a8c5dd;
            text-transform: uppercase;
            border-left: 3px solid #4a9eff;
        }

        .subcategory-header.insumo {
            background-color: #1e3f2e;
            color: #a8d9a1;
            border-left-color: #4aff6a;
        }

        /* Product Rows */
        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #1a1d27;
        }

        td.sku {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            color: #79c0ff;
            font-weight: 500;
        }

        td.price {
            text-align: right;
            font-weight: 500;
        }

        td.price.no-cost {
            color: #f85149;
            font-weight: 600;
        }

        /* Separator Row */
        .separator {
            background-color: #0f1117;
            height: 2px;
            padding: 0 !important;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #6e7681;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }

            .main {
                margin-left: 200px;
            }

            .controls-bar {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .toggle-sidebar {
                display: block;
            }

            .sidebar {
                width: 100%;
                z-index: 999;
            }

            .main {
                margin-left: 0;
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 0 15px 15px;
            }

            .controls-bar {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 8px;
                font-size: 12px;
            }

            .table-wrapper {
                font-size: 12px;
            }
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            color: #6e7681;
        }

        .spinner {
            border: 3px solid #2a2d3a;
            border-top: 3px solid #f0883e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 20px;
            background-color: #238636;
            color: #fff;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background-color: #da3633;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span>GGE</span>
        </div>
        <nav>
            <ul class="sidebar-nav">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/margem">Margem</a></li>
                <li><a href="/precificacao" class="active">Precificação</a></li>
                <li><a href="/saude">Saúde</a></li>
                <li><a href="/avaliacao">Avaliação</a></li>
            </ul>
        </nav>
    </aside>

    <button class="toggle-sidebar" id="toggleSidebar">☰</button>

    <!-- Main Content -->
    <main class="main" id="main">
        <!-- Header -->
        <header class="header">
            <h1>Precificação B2B — Venda Direta</h1>
        </header>

        <!-- Content -->
        <div class="content">
            <!-- Controls Bar -->
            <div class="controls-bar">
                <div class="control-group">
                    <label>Empresa</label>
                    <select id="empresaSelect">
                        <option value="GGE">GGE</option>
                        <option value="TOOW">TOOW</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Filtrar SKU ou Descrição</label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Digite para filtrar...">
                </div>
                <button class="button" id="downloadBtn">Baixar Excel</button>
                <div style="position: relative;">
                    <button class="button secondary" id="uploadBtn">Carregar Excel</button>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" />
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <div id="loadingState" class="loading" style="display: none;">

                            <th style="width: 80px;" class="price">Custo CIF</th>
                            <th style="width: 100px;" class="price">50% Margem</th>
                            <th style="width: 100px;" class="price">45% Margem</th>
                            <th style="width: 100px;" class="price">40% Margem</th>
                            <th style="width: 100px;" class="price">35% Margem</th>
                            <th style="width: 100px;" class="price">30% Margem</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Configuration
        const SUPABASE_URL = 'https://opceujqpqyvxsatzdarg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wY2V1anFwcXl2eHNhdHpkYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzIwMDEsImV4cCI6MjA4OTA0ODAwMX0.XKhgaNBJjo2_RQckjsY9kc';

        // Hierarchical structure
        const HIERARCHY = {
            'ALICATES': {
                'GRAMPEADORES ALICATE': {
                    type: 'machine',
                    skus: ['GDBTTP6', 'GDBTTB8', 'GDBTTP3']
                },
                'GRAMPOS PARA ALICATE': {
                    type: 'insumo',
                    skus: ['PACK501910', 'PACK211506', 'PACK211508', 'CXSP350K']
                }
            },
            'EMBALAGENS - LINHA BOX': {
                'MÁQUINAS BOX': {
                    type: 'machine',
                    skus: ['GDOR618', 'GDORBOXADB', 'GDORBOXHB', 'GDORBOXHB1']
                },
                'GRAMPOS BOX': {
                    type: 'insumo',
                    skus: ['GR3515CX5', 'GR3515CX10', 'GR3515CX20', 'GR3518CX5', 'GR3518CX10', 'GR3518CX20']
                }
            },
            'GRAMPOS INDUSTRIAIS - LEVES': {
                'GRAMPEADOR 80/W': {
                    type: 'machine',
                    skus: ['GDORPACARBRAS', 'GDORPACARTG', 'GDOR603', 'GDORDNZPS8016', 'GRMTX574209']
                },
                'GRAMPOS 80/W': {
                    type: 'insumo',
                    skus: ['UNGR8006', 'GR8006AFX10K', 'GR8006PACK', 'UNGR8008', 'GR8008AFX10K', 'GR8008PACK', 'UNGR8010', 'GR8010AFX10K', 'GR8010PACK', 'UNGR8013', 'GR8013AFX10K', 'GR8013PACK', 'UNGR8016', 'GR8016AFX7K']
                },
                'GRAMPO PCN': {
                    type: 'insumo',
                    skus: ['UNGRPCN08', 'UNGRPCN10', 'UNGRPCN13', 'UNGRPCN16', 'UNGRPCN19']
                }
            },
            'GRAMPOS INDUSTRIAIS - MÉDIOS': {
                'GRAMPEADOR 90 e 92': {
                    type: 'machine',
                    skus: ['GDOR609', 'GDOR621', 'GDORPACAR9230CTR', 'GDORPACAR9240', 'GDORPACAR9240RO']
                },
                'GRAMPOS 90': {
                    type: 'insumo',
                    skus: ['UNGR9015', 'UNGR9019', 'UNGR9025', 'UNGR9030', 'UNGR9035', 'UNGR9038']
                }
            },
            'GRAMPOS INDUSTRIAIS - PESADOS': {
                'GRAMPEADOR 14': {
                    type: 'machine',
                    skus: ['GDOR614', 'GDORPACAR1450', 'GDORPACAR1450C', 'GDORAFX851']
                },
                'GRAMPOS 14': {
                    type: 'insumo',
                    skus: ['GR1425', 'GR1430', 'GR1435', 'GR1438', 'GR1445', 'GR1450']
                }
            },
            'PINOS': {
                'GRAMPEADOR 14': {
                    type: 'machine',
                    skus: ['PNDORAFXF50', 'PNDORBATULT', 'PNMTX', 'PNDOR650', 'GDOR621']
                },
                'PINOS F': {
                    type: 'insumo',
                    skus: ['PNF10CX5', 'PNF15CX5', 'PNF20CX5', 'PNF25CX5', 'PNF30CX5', 'PNF35CX5', 'PNF40CX5', 'PNF45CX5', 'PNF50CX5']
                }
            },
            'MICRO PINOS - PINO 0.64': {
                'PREGADORES': {
                    type: 'machine',
                    skus: ['GDORAFXMP']
                },
                'MICROPINO 0.64': {
                    type: 'insumo',
                    skus: ['MICROPA12GGE', 'MICROPA15GGE', 'MICROPA25GGE']
                }
            },
            'PREGOS EM ROLO': {
                'PREGADORES': {
                    type: 'machine',
                    skus: ['PRDOR699']
                }
            }
        };

        // State
        let skuData = {};
        let filteredData = null;
        let currentEmpresa = 'GGE';

        // DOM Elements
        const empresaSelect = document.getElementById('empresaSelect');
        const searchInput = document.getElementById('searchInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const loadingState = document.getElementById('loadingState');
        const pricingTable = document.getElementById('pricingTable');
        const tableBody = document.getElementById('tableBody');
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadSkuData();
            setupEventListeners();
        });

        function setupEventListeners() {
            empresaSelect.addEventListener('change', (e) => {
                currentEmpresa = e.target.value;
                renderTable();
            });

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                renderTable(query);
            });

            downloadBtn.addEventListener('click', downloadExcel);
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileUpload);
            toggleSidebar.addEventListener('click', toggleSidebarVisibility);
        }

        function toggleSidebarVisibility() {
            sidebar.classList.toggle('collapsed');
            main.classList.toggle('full-width');
        }

        async function loadSkuData() {
            loadingState.style.display = 'flex';
            pricingTable.style.display = 'none';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/skus_custo?select=sku,descricao,custo_cif_rj,custo_cif_sp,unidade,is_combo`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                skuData = {};
                data.forEach(item => {
                    skuData[item.sku] = {
                        descricao: item.descricao || '',
                        custo_cif_rj: item.custo_cif_rj || 0,
                        custo_cif_sp: item.custo_cif_sp || 0,
                        unidade: item.unidade || '',
                        is_combo: item.is_combo || false
                    };
                });

                renderTable();
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showToast(`Erro ao carregar dados: ${error.message}`, 'error');
                loadingState.style.display = 'none';
            }
        }

        function renderTable(searchQuery = '') {
            loadingState.style.display = 'none';
            pricingTable.style.display = 'table';
            tableBody.innerHTML = '';

            const margins = currentEmpresa === 'GGE'
                ? [50, 45, 40, 35, 30]
                : [50, 45, 40, 35, 30];

            for (const [category, subcategories] of Object.entries(HIERARCHY)) {
                let categoryHasVisibleRows = false;
                let categoryHTML = '';

                // Add category header
                categoryHTML += `<tr><td colspan="10" class="category-header">${category}</td></tr>`;

                for (const [subcategory, config] of Object.entries(subcategories)) {
                    let subcategoryHasVisibleRows = false;
                    let subcategoryHTML = '';

                    // Add subcategory header
                    const headerClass = config.type === 'machine' ? '' : 'insumo';
                    subcategoryHTML += `<tr><td colspan="10" class="subcategory-header ${headerClass}">${subcategory}</td></tr>`;

                    // Process SKUs
                    for (const sku of config.skus) {
                        const item = skuData[sku];
                        if (!item) continue;

                        // Apply search filter
                        if (searchQuery) {
                            const matchesSku = sku.toLowerCase().includes(searchQuery);
                            const matchesDesc = item.descricao.toLowerCase().includes(searchQuery);
                            if (!matchesSku && !matchesDesc) continue;
                        }

                        subcategoryHasVisibleRows = true;
                        categoryHasVisibleRows = true;

                        const custo = currentEmpresa === 'GGE' ? item.custo_cif_rj : item.custo_cif_sp;
                        const row = createProductRow(sku, item, custo, margins);
                        subcategoryHTML += row;
                    }

                    if (subcategoryHasVisibleRows) {
                        categoryHTML += subcategoryHTML;
                    }
                }

                if (categoryHasVisibleRows) {
                    tableBody.innerHTML += categoryHTML;
                }
            }

            if (!tableBody.innerHTML) {
                tableBody.innerHTML = `<tr><td colspan="10" class="empty-state">Nenhum produto encontrado</td></tr>`;
            }
        }

        function createProductRow(sku, item, custo, margins) {
            const costText = custo > 0 ? `R$ ${formatPrice(custo)}` : '<span style="color: #f85149; font-weight: 600;">SEM CUSTO</span>';
            const costClass = custo > 0 ? '' : 'no-cost';

            let pricesCells = '';
            if (custo > 0) {
                margins.forEach(margin => {
                    const price = custo / (1 - margin / 100);
                    pricesCells += `<td class="price">R$ ${formatPrice(price)}</td>`;
                });
            } else {
                pricesCells = `<td colspan="5" class="price no-cost">SEM CUSTO</td>`;
            }

            return `
                <tr>
                    <td>${item.descricao}</td>
                    <td class="sku">${sku}</td>
                    <td>${item.is_combo ? 'COMBO' : ''}</td>
                    <td>${item.unidade}</td>
                    <td class="price ${costClass}">${costText}</td>
                    ${pricesCells}
                </tr>
            `;
        }

        function formatPrice(value) {
            return (Math.round(value * 100) / 100).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function downloadExcel() {
            try {
                const workbook = XLSX.utils.book_new();
                const sheetData = [];

                // Header
                sheetData.push(['SKU', 'Descrição', 'Custo CIF', 'Preço 50%', 'Preço 45%', 'Preço 40%', 'Preço 35%', 'Preço 30%']);

                // Data
                const margins = [50, 45, 40, 35, 30];
                for (const [category, subcategories] of Object.entries(HIERARCHY)) {
                    for (const [subcategory, config] of Object.entries(subcategories)) {
                        for (const sku of config.skus) {
                            const item = skuData[sku];
                            if (!item) continue;

                            const custo = currentEmpresa === 'GGE' ? item.custo_cif_rj : item.custo_cif_sp;
                            const prices = margins.map(m => custo > 0 ? custo / (1 - m / 100) : 0);

                            sheetData.push([
                                sku,
                                item.descricao,
                                custo,
                                ...prices
                            ]);
                        }
                    }
                }

                const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
                worksheet['!cols'] = [
                    { wch: 15 },
                    { wch: 35 },
                    { wch: 12 },
                    { wch: 12 },
                    { wch: 12 },
                    { wch: 12 },
                    { wch: 12 },
                    { wch: 12 }
                ];

                XLSX.utils.book_append_sheet(workbook, worksheet, 'Precificação');
                XLSX.writeFile(workbook, `precificacao_${currentEmpresa}_${new Date().toISOString().split('T')[0]}.xlsx`);

                showToast('Excel baixado com sucesso!');
            } catch (error) {
                console.error('Erro ao baixar Excel:', error);
                showToast(`Erro ao baixar Excel: ${error.message}`, 'error');
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

                    // Update costs in memory
                    let updateCount = 0;
                    data.forEach(row => {
                        const sku = row.SKU || row.sku;
                        const costCif = parseFloat(row['Custo CIF'] || row['custo_cif'] || 0);

                        if (sku && skuData[sku]) {
                            skuData[sku].custo_cif_rj = costCif;
                            skuData[sku].custo_cif_sp = costCif;
                            updateCount++;
                        }
                    });

                    renderTable();
                    showToast(`${updateCount} produtos atualizados com sucesso!`);
                } catch (error) {
                    console.error('Erro ao processar arquivo:', error);
                    showToast(`Erro ao processar arquivo: ${error.message}`, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
