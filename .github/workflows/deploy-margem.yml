name: Deploy margem.html
on: workflow_dispatch
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and commit
        run: |
          curl -s "https://opceujqpqyvxsatzdarg.supabase.co/functions/v1/serve-html" -o saude.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saude.html
          git diff --cached --quiet && echo "No changes" || (git commit -m "Deploy saude.html" && git push)
