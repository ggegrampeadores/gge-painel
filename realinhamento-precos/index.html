<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0f1117; color: #c9d1d9; font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* Sidebar */
.sidebar { position:fixed;left:0;top:0;height:100vh;width:48px;background-color:#0a0e14;border-right:1px solid #2a2d3a;padding:20px 0;transition:width .3s ease;z-index:1000;overflow-y:auto;overflow-x:hidden }
.sidebar:hover { width:250px }
.sidebar-header { display:flex;align-items:center;padding:0 12px;margin-bottom:30px;min-height:40px }
.sidebar-logo { display:flex;flex-direction:column;gap:4px }
.sidebar-logo-text { font-weight:700;font-size:20px;color:#58a6ff }
.sidebar-logo-sub { font-size:10px;color:#8b949e;line-height:1 }
.sidebar:not(:hover) .sidebar-logo-sub { display:none }
.sidebar-nav { display:flex;flex-direction:column;gap:8px;padding:0 8px }
.nav-item { display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;color:#8b949e;text-decoration:none;cursor:pointer;transition:all .2s;white-space:nowrap;font-size:14px;font-weight:500 }
.nav-item:hover { background-color:#161b22;color:#c9d1d9 }

/* Main */
.container { margin-left: 48px; min-height: 100vh; padding: 24px; max-width: 1260px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; color: #c9d1d9; }
h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #c9d1d9; }
.subtitle { font-size: 13px; color: #8b949e; margin-bottom: 24px; }
.loading { text-align: center; padding: 60px; color: #8b949e; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #2a2d3a; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #2a2d3a; background: #1a1d27; cursor: pointer; font-size: 13px; font-weight: 500; color: #8b949e; transition: all 0.15s; }
.tab:hover { border-color: #58a6ff; color: #c9d1d9; }
.tab.active { background: #1a3a5c; color: #58a6ff; border-color: #58a6ff; }

.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.metric { background: #1a1d27; border-radius: 12px; padding: 16px; border: 1px solid #2a2d3a; }
.metric .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.6px; }
.metric .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.green { color: #3fb950; } .red { color: #f85149; } .amber { color: #f0883e; } .blue { color: #58a6ff; } .muted { color: #8b949e; }

.cats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.cat-card { background: #1a1d27; border-radius: 12px; padding: 16px; border: 1px solid #2a2d3a; }
.cat-card h3 { font-size: 13px; font-weight: 600; color: #8b949e; margin-bottom: 4px; }
.cat-card .big { font-size: 20px; font-weight: 700; }

.card { background: #1a1d27; border-radius: 12px; border: 1px solid #2a2d3a; padding: 20px; margin-bottom: 20px; }
.card:hover { border-color: #3a3d4a; }
.card-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 8px; color: #8b949e; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2d3a; }
td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
tr:hover td { background: rgba(255,255,255,0.02); }
.r { text-align: right; }
.bold { font-weight: 600; }

.chip { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.chip-produto { background: rgba(88,166,255,0.15); color: #58a6ff; }
.chip-kit { background: rgba(188,148,255,0.15); color: #bc94ff; }
.chip-acessorio { background: rgba(63,185,80,0.15); color: #3fb950; }
.chip-below { background: rgba(248,81,73,0.15); color: #f85149; }
.chip-ok { background: rgba(63,185,80,0.15); color: #3fb950; }
.chip-between { background: rgba(240,136,62,0.15); color: #f0883e; }
.chip-paused { background: rgba(139,148,158,0.15); color: #8b949e; }

.conc-grid { display: grid; gap: 10px; }
.conc-card { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-radius: 10px; border: 1px solid #2a2d3a; background: #161b22; }
.conc-card .info .title { font-weight: 600; font-size: 13px; }
.conc-card .info .detail { font-size: 12px; color: #8b949e; margin-top: 2px; }
.conc-card .price { font-size: 20px; font-weight: 700; }

.chart-wrap { position: relative; height: 240px; }
.legend { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: #8b949e; }
.legend span { display: flex; align-items: center; gap: 5px; }
.legend .dot { width: 10px; height: 10px; border-radius: 3px; }

.empty { text-align: center; padding: 30px; color: #8b949e; font-size: 13px; }
.footer { text-align: center; font-size: 11px; color: #6e7681; margin-top: 32px; padding-top: 20px; border-top: 1px solid #2a2d3a; }

@media (max-width: 768px) {
  .cats { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .container { margin-left: 48px; padding: 16px; }
}
</style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="container">
  <h1>Realinhamento de precos</h1>
  <p class="subtitle">Analise por grupo de produto — dados live · Controle Total GGE</p>
  <div id="app"><div class="loading"><span class="spinner"></span> Carregando grupos...</div></div>
  <div class="footer">Pisos calculados com: comissao 17%, ADs 3,5%, ICMS medio 12%, DIFAL medio 6%, PIS/COFINS 9,25% (com creditos). Dados atualizados ao abrir a pagina.</div>
</div>

<script>
const SUPA_URL = 'https://opceujqpqyvxsatzdarg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wY2V1anFwcXl2eHNhdHpkYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzIwMDEsImV4cCI6MjA4OTA0ODAwMX0.XKhgaNBJF8xiHiGEWEs8HL1dq5KFJpo2_RQckjsY9kc';
const app = document.getElementById('app');

async function rpc(fnName, params = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/rpc/${fnName}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` },
    body: JSON.stringify(params)
  });
  if (!res.ok) throw new Error(`RPC ${fnName} failed: ${res.status}`);
  return res.json();
}

function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtDec(n, d=1) { return n == null ? '—' : Number(n).toLocaleString('pt-BR', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtPct(n) { return n == null ? '—' : fmtDec(n,1) + '%'; }

const freteColeta = {
  1:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,11.27],[100,119.99,13.12],[120,149.99,14.96],[150,199.99,16.81],[200,5000,18.65]],
  2:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,13.07],[100,119.99,15.27],[120,149.99,17.46],[150,199.99,19.66],[200,5000,21.85]],
  3:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,14.87],[100,119.99,17.42],[120,149.99,19.96],[150,199.99,22.51],[200,5000,25.05]],
  4:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,16.17],[100,119.99,18.87],[120,149.99,21.56],[150,199.99,24.26],[200,5000,26.95]],
  5:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,17.07],[100,119.99,19.92],[120,149.99,22.76],[150,199.99,25.61],[200,5000,28.45]],
  9:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,26.67],[100,119.99,31.12],[120,149.99,35.56],[150,199.99,40.01],[200,5000,44.45]],
  13:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,33.27],[100,119.99,38.82],[120,149.99,44.36],[150,199.99,49.91],[200,5000,55.45]],
  17:[[0,12.49,0.5],[12.5,28.99,6.25],[29,49.99,6.5],[50,78.99,6.75],[79,99.99,39.87],[100,119.99,46.52],[120,149.99,53.16],[150,199.99,59.81],[200,5000,66.45]],
};

function getFrete(preco, peso) {
  const faixas = Object.keys(freteColeta).map(Number).sort((a,b)=>a-b);
  let faixa = faixas[faixas.length-1];
  for (const f of faixas) { if (peso <= f) { faixa = f; break; } }
  const tab = freteColeta[faixa];
  for (const [pmin, pmax, fr] of tab) { if (preco >= pmin && preco <= pmax) return fr; }
  return tab[tab.length-1][2];
}

function calcPiso(custo, peso, mcTarget) {
  let pv = custo * 2;
  for (let i = 0; i < 50; i++) {
    const fr = getFrete(pv, peso);
    const pisLiqPct = 0.0925 * (1 - 0.17 - 0.035) - 0.0925 * fr / pv;
    const totalPct = 0.17 + 0.035 + 0.12 + 0.06 + pisLiqPct + mcTarget;
    const pvNew = (custo + fr) / (1 - totalPct);
    if (Math.abs(pvNew - pv) < 0.01) return Math.round(pvNew * 100) / 100;
    pv = pvNew;
  }
  return Math.round(pv * 100) / 100;
}

let adsChart = null;

async function init() {
  try {
    const grupos = await rpc('fn_realinhamento_grupos');
    if (!grupos || !grupos.length) { app.innerHTML = '<div class="empty">Nenhum grupo cadastrado.</div>'; return; }
    app.innerHTML = '<div class="tabs" id="tabs"></div><div id="content"></div>';
    const tabsEl = document.getElementById('tabs');
    grupos.forEach((g, i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.textContent = g.nome;
      tab.onclick = () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); loadGroup(g.id); };
      tabsEl.appendChild(tab);
    });
    loadGroup(grupos[0].id);
  } catch (e) { app.innerHTML = '<div class="empty">Erro ao carregar: ' + e.message + '</div>'; }
}

async function loadGroup(grupoId) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><span class="spinner"></span> Carregando dados...</div>';

  try {
    const d = await rpc('fn_realinhamento_grupo', { p_grupo_id: grupoId });
    const { skus, concorrentes, anuncios, vendas_30d, margens, ads, custos } = d;

    const custosMap = {};
    (custos||[]).forEach(c => { if (!custosMap[c.sku]) custosMap[c.sku] = {}; custosMap[c.sku][c.empresa] = Number(c.custo_cif_sp); });

    const vendasBySku = {};
    (vendas_30d||[]).forEach(v => { if (!vendasBySku[v.sku_vendedor]) vendasBySku[v.sku_vendedor] = { vendas: 0, receita: 0 }; vendasBySku[v.sku_vendedor].vendas += Number(v.vendas||0); vendasBySku[v.sku_vendedor].receita += Number(v.receita||0); });

    const adsBySku = {};
    (ads||[]).forEach(a => { if (!adsBySku[a.sku_vendedor]) adsBySku[a.sku_vendedor] = { gasto: 0, vendas_ads: 0 }; adsBySku[a.sku_vendedor].gasto += Number(a.gasto||0); adsBySku[a.sku_vendedor].vendas_ads += Number(a.vendas_ads||0); });

    const margemBySku = {};
    (margens||[]).forEach(m => { if (!margemBySku[m.sku_vendedor]) margemBySku[m.sku_vendedor] = { mc2_valor: 0, receita: 0 }; margemBySku[m.sku_vendedor].mc2_valor += Number(m.mc2_valor); margemBySku[m.sku_vendedor].receita += Number(m.receita); });
    Object.values(margemBySku).forEach(m => { m.mc2_pct = m.receita > 0 ? (m.mc2_valor / m.receita * 100) : 0; });

    const bestPrice = {};
    (anuncios||[]).forEach(a => { if (a.preco_atual && a.status !== 'closed' && (!bestPrice[a.sku_vendedor] || Number(a.preco_atual) < Number(bestPrice[a.sku_vendedor]))) bestPrice[a.sku_vendedor] = Number(a.preco_atual); });

    const totalVendas = Object.values(vendasBySku).reduce((s,v) => s + v.vendas, 0);
    const totalReceita = Object.values(vendasBySku).reduce((s,v) => s + v.receita, 0);
    const totalMC2 = Object.values(margemBySku).reduce((s,v) => s + v.mc2_valor, 0);
    const totalAds = Object.values(adsBySku).reduce((s,v) => s + v.gasto, 0);
    const saldo = totalMC2 - totalAds;

    const cats = { produto: {v:0,r:0,mc:0}, kit: {v:0,r:0,mc:0}, acessorio: {v:0,r:0,mc:0} };
    (skus||[]).forEach(s => { const vd = vendasBySku[s.sku]||{vendas:0,receita:0}; const md = margemBySku[s.sku]||{mc2_valor:0}; if (cats[s.tipo]) { cats[s.tipo].v += vd.vendas; cats[s.tipo].r += vd.receita; cats[s.tipo].mc += md.mc2_valor; } });

    let html = '';

    html += '<div class="metrics">';
    html += '<div class="metric"><div class="label">Vendas 30d</div><div class="value">' + totalVendas + '</div></div>';
    html += '<div class="metric"><div class="label">Receita 30d</div><div class="value">R$ ' + fmt(totalReceita) + '</div></div>';
    html += '<div class="metric"><div class="label">MC2 total</div><div class="value ' + (totalMC2>=0?'green':'red') + '">R$ ' + fmt(totalMC2) + '</div></div>';
    html += '<div class="metric"><div class="label">Gasto ADs</div><div class="value amber">R$ ' + fmt(totalAds) + '</div></div>';
    html += '<div class="metric"><div class="label">Saldo (MC2-ADs)</div><div class="value ' + (saldo>=0?'green':'red') + '">R$ ' + fmt(saldo) + '</div></div>';
    html += '</div>';

    html += '<div class="cats">';
    [['produto','Maquinas'],['kit','Kits'],['acessorio','Acessorios']].forEach(function(pair) {
      var k = pair[0], label = pair[1];
      var c = cats[k]; var pct = c.r > 0 ? c.mc/c.r*100 : 0;
      html += '<div class="cat-card"><h3>' + label + '</h3><div class="big">' + c.v + ' vendas</div><div style="font-size:12px;color:#8b949e">Receita: R$ ' + fmt(c.r) + '</div><div style="font-size:12px" class="' + (pct>=10?'green':pct>=0?'amber':'red') + '">MC2: ' + fmtPct(pct) + ' — R$ ' + fmt(c.mc) + '</div></div>';
    });
    html += '</div>';

    html += '<div class="card"><h2>Pisos de preco vs preco atual</h2><div class="card-scroll"><table>';
    html += '<tr><th>SKU</th><th>Tipo</th><th class="r">Custo</th><th class="r">Peso</th><th class="r">MC10%</th><th class="r">MC15%</th><th class="r">MC20%</th><th class="r">Atual</th><th class="r">MC2% real</th><th class="r">Vendas</th><th>Status</th></tr>';
    (skus||[]).forEach(function(s) {
      var peso = Number(s.peso||1); var custoGGE = custosMap[s.sku] ? custosMap[s.sku].GGE : null;
      var mc10 = custoGGE ? calcPiso(custoGGE, peso, 0.10) : null;
      var mc15 = custoGGE ? calcPiso(custoGGE, peso, 0.15) : null;
      var mc20 = custoGGE ? calcPiso(custoGGE, peso, 0.20) : null;
      var atual = bestPrice[s.sku]; var mg = margemBySku[s.sku]; var vd = vendasBySku[s.sku]||{vendas:0};
      var status='', statusCls='';
      if (atual && mc10) { if (atual<mc10){status='Abaixo MC10';statusCls='chip-below';} else if(atual<mc15){status='MC10-15';statusCls='chip-between';} else {status='MC15+';statusCls='chip-ok';} }
      var mcClass = mg ? (mg.mc2_pct>=15?'green':mg.mc2_pct>=10?'amber':'red') : 'muted';
      var tipoCls = s.tipo==='kit'?'chip-kit':s.tipo==='acessorio'?'chip-acessorio':'chip-produto';
      html += '<tr><td class="bold">' + s.sku + '</td><td><span class="chip ' + tipoCls + '">' + s.tipo + '</span></td><td class="r">' + (custoGGE?fmt(custoGGE):'—') + '</td><td class="r">' + fmtDec(peso,1) + 'kg</td><td class="r">' + (mc10?fmt(mc10):'—') + '</td><td class="r">' + (mc15?fmt(mc15):'—') + '</td><td class="r">' + (mc20?fmt(mc20):'—') + '</td><td class="r bold">' + (atual?fmt(atual):'—') + '</td><td class="r ' + mcClass + '">' + (mg?fmtPct(mg.mc2_pct):'s/venda') + '</td><td class="r">' + vd.vendas + '</td><td><span class="chip ' + statusCls + '">' + status + '</span></td></tr>';
    });
    html += '</table></div></div>';

    var activeAnuncios = (anuncios||[]).filter(function(a){return a.status==='active'||a.status==='paused';});
    html += '<div class="card"><h2>Anuncios ativos (' + activeAnuncios.length + ')</h2><div class="card-scroll"><table>';
    html += '<tr><th>MLB</th><th>SKU</th><th>Conta</th><th>Tipo</th><th>Logistica</th><th class="r">Preco</th><th class="r">Vendas 30d</th><th class="r">ADs R$</th><th class="r">Vendas ADs</th></tr>';
    activeAnuncios.forEach(function(a) {
      var vRow = (vendas_30d||[]).find(function(v){return v.mlb_id===a.mlb_id;})||{}; var aRow = (ads||[]).find(function(ad){return ad.mlb_id===a.mlb_id;})||{};
      var v30 = Number(vRow.vendas||0); var gasto = Number(aRow.gasto||0); var vAds = Number(aRow.vendas_ads||0);
      var tipo = a.tipo_listagem==='gold_pro'?'Premium':'Classico'; var modo = a.modo_logistica==='fulfillment'?'Full':'Coleta';
      var badge = a.status==='paused'?' <span class="chip chip-paused">pausado</span>':'';
      html += '<tr><td style="font-size:12px">' + a.mlb_id + badge + '</td><td>' + a.sku_vendedor + '</td><td style="font-size:12px">' + (a.conta_nome||'') + '</td><td>' + tipo + '</td><td>' + modo + '</td><td class="r bold">' + (a.preco_atual?fmt(Number(a.preco_atual)):'—') + '</td><td class="r ' + (v30>0?'bold':'muted') + '">' + v30 + '</td><td class="r ' + (gasto>50?(vAds>0?'':'red'):'muted') + '">' + (gasto>0?fmt(gasto):'—') + '</td><td class="r ' + (vAds>0?'green bold':'muted') + '">' + vAds + '</td></tr>';
    });
    html += '</table></div></div>';

    var adsSkus = [];
    var seen = {};
    (ads||[]).forEach(function(a){ if (!seen[a.sku_vendedor]) { seen[a.sku_vendedor]=true; adsSkus.push(a.sku_vendedor); } });

    if (adsSkus.length > 0) {
      html += '<div class="card"><h2>Eficiencia de ADs por SKU</h2><div class="chart-wrap"><canvas id="adsCanvas"></canvas></div>';
      html += '<div class="legend"><span><span class="dot" style="background:#f85149"></span>Gasto R$</span><span><span class="dot" style="background:#3fb950"></span>Vendas ADs</span></div></div>';
    }

    html += '<div class="card"><h2>Concorrentes registrados (' + (concorrentes||[]).length + ')</h2>';
    if (!concorrentes||!concorrentes.length) { html += '<div class="empty">Nenhum concorrente registrado. Envie MLBs na conversa para adicionar.</div>'; }
    else { html += '<div class="conc-grid">'; concorrentes.forEach(function(c) {
      html += '<div class="conc-card"><div class="info"><div class="title">' + (c.titulo||c.mlb_id||'Concorrente') + '</div><div class="detail">' + (c.vendedor||'') + (c.diferencial?' — '+c.diferencial:'') + '</div><div class="detail">' + (c.observacoes||'') + '</div><div class="detail muted">' + (c.mlb_id||'') + (c.catalog_id?' · Catalogo: '+c.catalog_id:'') + '</div></div><div class="price">' + (c.preco_observado?'R$ '+fmt(c.preco_observado):'<span class="muted" style="font-size:12px">Preco nao coletado</span>') + '</div></div>';
    }); html += '</div>'; }
    html += '</div>';

    content.innerHTML = html;

    if (adsSkus.length > 0) {
      var gastoArr = adsSkus.map(function(sku){ return adsBySku[sku] ? adsBySku[sku].gasto : 0; });
      var vendasArr = adsSkus.map(function(sku){ return adsBySku[sku] ? adsBySku[sku].vendas_ads : 0; });
      if (adsChart) adsChart.destroy();
      adsChart = new Chart(document.getElementById('adsCanvas'), {
        type: 'bar',
        data: { labels: adsSkus, datasets: [
          { label: 'Gasto', data: gastoArr, backgroundColor: '#f85149', borderRadius: 4, yAxisID: 'y' },
          { label: 'Vendas ADs', data: vendasArr, backgroundColor: '#3fb950', borderRadius: 4, yAxisID: 'y1' }
        ]},
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { display: false } },
            y: { position: 'left', ticks: { color: '#8b949e' }, title: { display: true, text: 'R$', color: '#8b949e', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y1: { position: 'right', ticks: { color: '#8b949e' }, title: { display: true, text: 'Vendas', color: '#8b949e', font: { size: 11 } }, grid: { display: false }, min: 0 }
          }
        }
      });
    }
  } catch (e) { content.innerHTML = '<div class="empty">Erro: ' + e.message + '</div>'; }
}

init();
</script>
</body>
</html>
