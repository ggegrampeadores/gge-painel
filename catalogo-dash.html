<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Catalogos · Controle Total GGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="/config.js"></script>
  <script src="dados.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        'gge-bg':'#0f1117','gge-card':'#1a1d2e','gge-border':'#2a2d3e',
        'gge-text':'#e2e8f0','gge-muted':'#94a3b8','gge-accent':'#6366f1',
        'gge-green':'#22c55e','gge-red':'#ef4444','gge-yellow':'#eab308',
        'gge-orange':'#f97316','gge-cyan':'#22d3ee',
      }}}
    }
  </script>
  <style>
    body { background:#0f1117; color:#e2e8f0; font-family:'Inter',system-ui,sans-serif; margin:0; }
    .fade-in { animation: fadeIn .3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    #loading-fallback { display:flex;align-items:center;justify-content:center;min-height:60vh;color:#94a3b8;font-size:14px; }
    #loading-fallback .spinner { width:24px;height:24px;border:3px solid #2a2d3e;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-right:12px; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
  <script src="auth.js" defer></script>
  <script src="sidebar.js" defer></script>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <div id="root">
      <div id="loading-fallback">
        <div class="spinner"></div>
        <span>Carregando Dashboard Catalogos...</span>
      </div>
    </div>
  </div>

  <script>
    // Fallback: se React/Babel nao carregarem em 15s, mostra erro
    window._ggeTimeout = setTimeout(function() {
      var root = document.getElementById('root');
      if (root && root.querySelector('#loading-fallback')) {
        root.innerHTML = '<div style="max-width:600px;margin:80px auto;padding:24px;background:#1a1d2e;border:1px solid #ef4444;border-radius:12px;text-align:center;">' +
          '<p style="color:#ef4444;font-size:16px;font-weight:600;margin-bottom:8px;">Erro ao carregar a pagina</p>' +
          '<p style="color:#94a3b8;font-size:13px;">Os scripts externos (React/Babel) nao carregaram. Tente recarregar a pagina (F5).</p>' +
          '<button onclick="location.reload()" style="margin-top:16px;padding:8px 24px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">Recarregar</button>' +
          '</div>';
      }
    }, 15000);
  </script>

  <script type="text/babel">
    clearTimeout(window._ggeTimeout);

    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Cell, LineChart, Line, Legend, AreaChart, Area } = Recharts;

    const SB_URL = window.GGE_SUPABASE_URL;
    const SB_KEY = window.GGE_SUPABASE_KEY;
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    const fmtN = n => n == null ? '—' : Number(n).toLocaleString('pt-BR');
    const fmtR = n => n == null ? '—' : 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtP = n => n == null ? '—' : Number(n).toFixed(1) + '%';

    function Delta({ atual, anterior, formato, inverter }) {
      if (anterior == null || anterior === 0) return <span className="text-xs text-gge-muted">—</span>;
      const diff = atual - anterior;
      const pct = (diff / Math.abs(anterior)) * 100;
      const positivo = inverter ? diff < 0 : diff > 0;
      const cor = diff === 0 ? 'text-gge-muted' : positivo ? 'text-gge-green' : 'text-gge-red';
      const seta = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
      return (
        <span className={`text-xs font-semibold ${cor}`}>
          {seta} {formato === 'brl' ? fmtR(Math.abs(diff)) : formato === 'pct' ? fmtP(Math.abs(pct)) : fmtN(Math.abs(diff))}
        </span>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        async function load() {
          try {
            const { data: result, error: err } = await sb.rpc('fn_catalogo_dash_resumo');
            if (err) throw err;
            setData(result);
          } catch(e) { setError(e.message); }
          setLoading(false);
        }
        load();
      }, []);

      if (loading) return (
        <div className="max-w-7xl mx-auto p-6">
          <h1 className="text-2xl font-bold mb-6">Dashboard Catalogos</h1>
          <div className="grid grid-cols-4 gap-4 mb-6">
            {[1,2,3,4].map(i => <div key={i} className="bg-gge-card border border-gge-border rounded-xl h-28 animate-pulse" />)}
          </div>
          <div className="bg-gge-card border border-gge-border rounded-xl h-64 animate-pulse" />
        </div>
      );

      if (error) return (
        <div className="max-w-7xl mx-auto p-6">
          <h1 className="text-2xl font-bold mb-6">Dashboard Catalogos</h1>
          <div className="bg-red-900/20 border border-red-700/40 rounded-xl p-4 text-red-400">
            <p className="font-semibold mb-1">Erro ao carregar dados</p>
            <p className="text-sm">{error}</p>
            <button onClick={() => location.reload()} className="mt-3 px-4 py-2 bg-gge-accent text-white rounded-lg text-sm">Recarregar</button>
          </div>
        </div>
      );

      const comp = data.competicao || {};
      const vendas = data.vendas || {};
      const evolucao = data.evolucao || [];
      const topCompeting = data.top_competing || [];

      const totalComp = (comp.winning || 0) + (comp.competing || 0) + (comp.sharing || 0);
      const winPct = totalComp > 0 ? ((comp.winning || 0) / totalComp * 100) : 0;

      const periodos = ['1d', '3d', '7d', '10d', '15d', '30d'];

      return (
        <div className="max-w-7xl mx-auto p-6">
          <div className="mb-6">
            <h1 className="text-2xl font-bold">Dashboard Catalogos</h1>
            <p className="text-sm text-gge-muted mt-1">
              Visao consolidada da competicao e performance dos anuncios em catalogo
              {comp.data && <span> · Dados de competicao: {new Date(comp.data + 'T12:00:00').toLocaleDateString('pt-BR')}</span>}
            </p>
          </div>

          {/* KPIs */}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-6">
            <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
              <div className="text-xs text-gge-muted font-medium mb-1">Vencendo</div>
              <div className="text-3xl font-bold text-gge-green">{fmtN(comp.winning)}</div>
              <div className="text-xs text-gge-muted mt-1">{fmtP(winPct)} do total</div>
            </div>
            <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
              <div className="text-xs text-gge-muted font-medium mb-1">Competindo</div>
              <div className="text-3xl font-bold text-gge-orange">{fmtN(comp.competing)}</div>
              <div className="text-xs text-gge-muted mt-1">gap medio {fmtP(comp.gap_medio)}</div>
            </div>
            <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
              <div className="text-xs text-gge-muted font-medium mb-1">Empatados</div>
              <div className="text-3xl font-bold text-gge-cyan">{fmtN(comp.sharing)}</div>
              <div className="text-xs text-gge-muted mt-1">dividindo 1o lugar</div>
            </div>
            <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
              <div className="text-xs text-gge-muted font-medium mb-1">Gap Total p/ Vencer</div>
              <div className="text-3xl font-bold text-gge-red">{fmtR(comp.gap_total)}</div>
              <div className="text-xs text-gge-muted mt-1">soma dos gaps de preco</div>
            </div>
            <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
              <div className="text-xs text-gge-muted font-medium mb-1">Total em Catalogo</div>
              <div className="text-3xl font-bold text-white">{fmtN(comp.total)}</div>
              <div className="text-xs text-gge-muted mt-1">anuncios ativos</div>
            </div>
          </div>

          {/* Barra de progresso */}
          <div className="bg-gge-card border border-gge-border rounded-xl p-5 mb-6 fade-in">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-semibold text-white">Distribuicao Buy Box</h3>
              <span className="text-xs text-gge-muted">{fmtN(totalComp)} anuncios com dados de competicao</span>
            </div>
            <div className="h-6 rounded-full overflow-hidden flex bg-white/5">
              {comp.winning > 0 && (
                <div className="h-full bg-gge-green flex items-center justify-center transition-all" style={{width: `${(comp.winning / totalComp * 100)}%`}}>
                  <span className="text-[10px] font-bold text-white">{comp.winning}</span>
                </div>
              )}
              {comp.sharing > 0 && (
                <div className="h-full bg-gge-cyan flex items-center justify-center transition-all" style={{width: `${(comp.sharing / totalComp * 100)}%`}}>
                  <span className="text-[10px] font-bold text-white">{comp.sharing}</span>
                </div>
              )}
              {comp.competing > 0 && (
                <div className="h-full bg-gge-orange flex items-center justify-center transition-all" style={{width: `${(comp.competing / totalComp * 100)}%`}}>
                  <span className="text-[10px] font-bold text-white">{comp.competing}</span>
                </div>
              )}
            </div>
            <div className="flex gap-6 mt-2 text-[10px]">
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-gge-green"></span> Vencendo</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-gge-cyan"></span> Empatados</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-gge-orange"></span> Competindo</span>
            </div>
          </div>

          {/* Vendas por Periodo */}
          <div className="bg-gge-card border border-gge-border rounded-xl p-5 mb-6 fade-in">
            <h3 className="text-sm font-semibold text-white mb-4">Vendas por Periodo (Catalogos)</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gge-border text-xs text-gge-muted">
                    <th className="text-left py-2 px-3 font-medium">Periodo</th>
                    <th className="text-right py-2 px-3 font-medium">Vendas</th>
                    <th className="text-right py-2 px-3 font-medium">Receita</th>
                    <th className="text-right py-2 px-3 font-medium">MC2</th>
                    <th className="text-right py-2 px-3 font-medium">Margem %</th>
                    <th className="text-right py-2 px-3 font-medium">Ticket Medio</th>
                    <th className="text-right py-2 px-3 font-medium">MC2/Venda</th>
                  </tr>
                </thead>
                <tbody>
                  {periodos.map((p, i) => {
                    const v = vendas[p] || {};
                    const vd = Number(v.vendas) || 0;
                    const rc = Number(v.receita) || 0;
                    const mc = Number(v.mc2) || 0;
                    const margem = rc > 0 ? (mc / rc * 100) : 0;
                    const ticket = vd > 0 ? rc / vd : 0;
                    const mc_venda = vd > 0 ? mc / vd : 0;
                    return (
                      <tr key={p} className={`border-b border-gge-border/30 ${i === periodos.length - 1 ? 'bg-gge-accent/5' : ''}`}>
                        <td className="py-2.5 px-3 font-semibold text-white">{p}</td>
                        <td className="py-2.5 px-3 text-right text-white">{fmtN(vd)}</td>
                        <td className="py-2.5 px-3 text-right text-white">{fmtR(rc)}</td>
                        <td className={`py-2.5 px-3 text-right font-semibold ${mc >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtR(mc)}</td>
                        <td className={`py-2.5 px-3 text-right ${margem >= 5 ? 'text-gge-green' : margem >= 0 ? 'text-gge-yellow' : 'text-gge-red'}`}>{fmtP(margem)}</td>
                        <td className="py-2.5 px-3 text-right text-gge-muted">{fmtR(ticket)}</td>
                        <td className={`py-2.5 px-3 text-right ${mc_venda >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtR(mc_venda)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Evolucao (grafico) */}
          {evolucao.length > 1 && (
            <div className="bg-gge-card border border-gge-border rounded-xl p-5 mb-6 fade-in">
              <h3 className="text-sm font-semibold text-white mb-3">Evolucao da Competicao</h3>
              <ResponsiveContainer width="100%" height={220}>
                <AreaChart data={evolucao} margin={{left:10,right:10,top:5,bottom:5}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2a2d3e" />
                  <XAxis dataKey="data" tick={{fill:'#94a3b8',fontSize:11}} />
                  <YAxis tick={{fill:'#94a3b8',fontSize:11}} />
                  <Tooltip contentStyle={{background:'#1a1d2e',border:'1px solid #2a2d3e',borderRadius:'8px'}} labelStyle={{color:'#fff'}} />
                  <Legend wrapperStyle={{fontSize:'11px'}} />
                  <Area type="monotone" dataKey="winning" name="Vencendo" stackId="1" stroke="#22c55e" fill="#22c55e" fillOpacity={0.3} />
                  <Area type="monotone" dataKey="sharing" name="Empatados" stackId="1" stroke="#22d3ee" fill="#22d3ee" fillOpacity={0.3} />
                  <Area type="monotone" dataKey="competing" name="Competindo" stackId="1" stroke="#f97316" fill="#f97316" fillOpacity={0.3} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          )}

          {evolucao.length <= 1 && (
            <div className="bg-gge-card border border-gge-yellow/20 rounded-xl p-5 mb-6 fade-in text-center">
              <p className="text-sm text-gge-muted">O grafico de evolucao aparecera quando houver mais de 1 dia de dados de competicao coletados.</p>
              <p className="text-xs text-gge-muted mt-1">Dados atuais: {evolucao.length} dia(s)</p>
            </div>
          )}

          {/* Top Competing */}
          {topCompeting.length > 0 && (
            <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-sm font-semibold text-white">Maiores Gaps de Preco (competindo)</h3>
                <span className="text-xs text-gge-muted">Quanto falta para vencer cada catalogo</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-gge-border text-xs text-gge-muted">
                      <th className="text-left py-2 px-3 font-medium">Anuncio</th>
                      <th className="text-left py-2 px-3 font-medium">Conta</th>
                      <th className="text-center py-2 px-3 font-medium">Modo</th>
                      <th className="text-right py-2 px-3 font-medium">Nosso Preco</th>
                      <th className="text-right py-2 px-3 font-medium">Price to Win</th>
                      <th className="text-right py-2 px-3 font-medium">Gap R$</th>
                      <th className="text-right py-2 px-3 font-medium">Gap %</th>
                      <th className="text-center py-2 px-3 font-medium">Competidores</th>
                    </tr>
                  </thead>
                  <tbody>
                    {topCompeting.map((t, i) => (
                      <tr key={t.mlb_id} className={`border-b border-gge-border/30 ${i < 3 ? 'bg-gge-red/[0.04]' : ''}`}>
                        <td className="py-2 px-3 max-w-[200px]">
                          <div className="text-xs text-white truncate">{t.titulo}</div>
                          <div className="text-[10px] text-gge-muted">{t.sku_vendedor || t.mlb_id}</div>
                        </td>
                        <td className="py-2 px-3 text-xs text-gge-muted">{t.conta_nome}</td>
                        <td className="py-2 px-3 text-center">
                          <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold border ${t.modo_logistica === 'fulfillment' ? 'bg-cyan-900/40 text-cyan-400 border-cyan-700/50' : 'bg-gge-bg text-gge-muted border-gge-border'}`}>
                            {t.modo_logistica === 'fulfillment' ? 'Full' : 'Col'}
                          </span>
                        </td>
                        <td className="py-2 px-3 text-right text-white">{fmtR(t.nosso_preco)}</td>
                        <td className="py-2 px-3 text-right text-gge-green font-semibold">{fmtR(t.price_to_win)}</td>
                        <td className="py-2 px-3 text-right text-gge-red font-bold">{fmtR(t.gap_preco)}</td>
                        <td className="py-2 px-3 text-right text-gge-orange">{fmtP(t.gap_pct)}</td>
                        <td className="py-2 px-3 text-center text-gge-muted">{fmtN(t.competitors_sharing)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
