<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Total GGE — Painel de Margem</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gge: {
              bg: '#0f1117',
              card: '#1a1d2e',
              border: '#2a2d3e',
              accent: '#6366f1',
              green: '#22c55e',
              red: '#ef4444',
              yellow: '#eab308',
              blue: '#3b82f6',
              muted: '#94a3b8',
              text: '#e2e8f0',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f1117; color: #e2e8f0; margin: 0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d2e; }
    ::-webkit-scrollbar-thumb { background: #3a3d4e; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-load { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em;
      -webkit-appearance: none; -moz-appearance: none; appearance: none; padding-right: 2.5rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend } = Recharts;

    // ── Supabase Client ──
    const SUPABASE_URL = 'https://opceujqpqyvxsatzdarg.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wY2V1anFwcXl2eHNhdHpkYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzIwMDEsImV4cCI6MjA4OTA0ODAwMX0.XKhgaNBJF8xiHiGEWEs8HL1dq5KFJpo2_RQckjsY9kc';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Helpers ──
    const fmt = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtInt = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR');
    const fmtPct = (v) => v == null ? '—' : Number(v).toFixed(1) + '%';
    const fmtMes = (m) => { const d = new Date(m + 'T12:00:00'); return d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' }); };

    const GRUPO_COLORS = {
      P1: '#ef4444', P2: '#f97316', P3: '#a855f7',
      L1: '#fbbf24', L2: '#a3e635', L3: '#4ade80',
      L4: '#22d3ee', L5: '#3b82f6', L6: '#6366f1'
    };
    const GRUPO_LABELS = {
      P1: 'P1 — Prejuízo estrutural', P2: 'P2 — Prejuízo por ADs',
      P3: 'P3 — Só ADs, sem vendas',
      L1: 'L1 — 0-5%', L2: 'L2 — 5-10%', L3: 'L3 — 10-15%',
      L4: 'L4 — 15-20%', L5: 'L5 — 20-25%', L6: 'L6 — >25%'
    };
    const GRUPO_ORDER = ['P1','P2','P3','L1','L2','L3','L4','L5','L6'];

    const TIPO_LISTAGEM_LABELS = {
      'gold_special': 'Premium',
      'gold_pro': 'Clássico',
      'Desconhecido': 'Desconhecido'
    };
    const labelTipo = (t) => TIPO_LISTAGEM_LABELS[t] || t;

    // ── Loading skeleton ──
    function Skeleton({ className }) {
      return <div className={`bg-gge-border rounded pulse-load ${className || ''}`} />;
    }

    // ── Metric Card ──
    function MetricCard({ label, value, sub, color, icon }) {
      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <div className="flex items-center justify-between mb-2">
            <span className="text-gge-muted text-sm font-medium">{label}</span>
            {icon && <span className="text-2xl opacity-60">{icon}</span>}
          </div>
          <div className={`text-2xl font-bold ${color || 'text-white'}`}>{value}</div>
          {sub && <div className="text-gge-muted text-xs mt-1">{sub}</div>}
        </div>
      );
    }

    // ── Filter Select ──
    function FilterSelect({ label, value, onChange, options, allLabel, labelFn }) {
      const getLabel = labelFn || (o => o);
      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs text-gge-muted font-medium uppercase tracking-wider">{label}</label>
          <select
            value={value}
            onChange={e => onChange(e.target.value)}
            className="bg-gge-card border border-gge-border text-gge-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gge-accent transition-colors"
          >
            <option value="">{allLabel || 'Todos'}</option>
            {options.map(o => <option key={o} value={o}>{getLabel(o)}</option>)}
          </select>
        </div>
      );
    }

    // ── Grupo Badge ──
    function GrupoBadge({ grupo }) {
      const bg = GRUPO_COLORS[grupo] || '#666';
      return (
        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
              style={{ backgroundColor: bg + '22', color: bg, border: `1px solid ${bg}44` }}>
          {grupo}
        </span>
      );
    }

    // ── Groups Summary Table ──
    function GroupsSummary({ data }) {
      const groups = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const g = row.grupo;
          if (!map[g]) map[g] = { grupo: g, anuncios: 0, vendas: 0, receita: 0, margem: 0, custo_ads: 0 };
          map[g].anuncios++;
          map[g].vendas += Number(row.qtd_vendas) || 0;
          map[g].receita += Number(row.receita) || 0;
          map[g].margem += Number(row.margem_valor) || 0;
          map[g].custo_ads += Number(row.custo_ads) || 0;
        });
        return GRUPO_ORDER.filter(g => map[g]).map(g => ({
          ...map[g],
          mc_pct: map[g].receita > 0 ? (map[g].margem / map[g].receita * 100) : 0
        }));
      }, [data]);

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl overflow-hidden fade-in">
          <div className="px-5 py-4 border-b border-gge-border">
            <h3 className="text-lg font-semibold text-white">Segmentação por Grupo</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gge-muted text-xs uppercase tracking-wider">
                  <th className="text-left px-5 py-3">Grupo</th>
                  <th className="text-right px-4 py-3">Anúncios</th>
                  <th className="text-right px-4 py-3">Vendas</th>
                  <th className="text-right px-4 py-3">Receita</th>
                  <th className="text-right px-4 py-3">ADs</th>
                  <th className="text-right px-4 py-3">Margem R$</th>
                  <th className="text-right px-5 py-3">MC %</th>
                </tr>
              </thead>
              <tbody>
                {groups.map((g, i) => (
                  <tr key={g.grupo} className={`border-t border-gge-border/50 hover:bg-white/5 transition-colors ${i % 2 === 0 ? '' : 'bg-white/[0.02]'}`}>
                    <td className="px-5 py-3"><GrupoBadge grupo={g.grupo} /></td>
                    <td className="text-right px-4 py-3 text-gge-text">{fmtInt(g.anuncios)}</td>
                    <td className="text-right px-4 py-3 text-gge-text">{fmtInt(g.vendas)}</td>
                    <td className="text-right px-4 py-3 text-white font-medium">R$ {fmt(g.receita)}</td>
                    <td className="text-right px-4 py-3 text-gge-yellow">R$ {fmt(g.custo_ads)}</td>
                    <td className={`text-right px-4 py-3 font-medium ${g.margem >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                      R$ {fmt(g.margem)}
                    </td>
                    <td className={`text-right px-5 py-3 font-bold ${g.mc_pct >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                      {fmtPct(g.mc_pct)}
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-gge-border font-bold">
                  <td className="px-5 py-3 text-white">TOTAL</td>
                  <td className="text-right px-4 py-3 text-white">{fmtInt(groups.reduce((s,g) => s+g.anuncios, 0))}</td>
                  <td className="text-right px-4 py-3 text-white">{fmtInt(groups.reduce((s,g) => s+g.vendas, 0))}</td>
                  <td className="text-right px-4 py-3 text-white">R$ {fmt(groups.reduce((s,g) => s+g.receita, 0))}</td>
                  <td className="text-right px-4 py-3 text-gge-yellow">R$ {fmt(groups.reduce((s,g) => s+g.custo_ads, 0))}</td>
                  {(() => { const tm = groups.reduce((s,g) => s+g.margem, 0); const tr = groups.reduce((s,g) => s+g.receita, 0);
                    return (<>
                      <td className={`text-right px-4 py-3 ${tm >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>R$ {fmt(tm)}</td>
                      <td className={`text-right px-5 py-3 ${tm >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtPct(tr > 0 ? tm/tr*100 : 0)}</td>
                    </>);
                  })()}
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      );
    }

    // ── Groups Bar Chart ──
    function GroupsChart({ data }) {
      const chartData = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const g = row.grupo;
          if (!map[g]) map[g] = { grupo: g, receita: 0, margem: 0 };
          map[g].receita += Number(row.receita) || 0;
          map[g].margem += Number(row.margem_valor) || 0;
        });
        return GRUPO_ORDER.filter(g => map[g]).map(g => map[g]);
      }, [data]);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 shadow-xl">
            <p className="font-semibold text-white mb-1">{GRUPO_LABELS[d.grupo] || d.grupo}</p>
            <p className="text-sm text-gge-muted">Receita: <span className="text-white">R$ {fmt(d.receita)}</span></p>
            <p className="text-sm text-gge-muted">Margem: <span className={d.margem >= 0 ? 'text-gge-green' : 'text-gge-red'}>R$ {fmt(d.margem)}</span></p>
          </div>
        );
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <h3 className="text-lg font-semibold text-white mb-4">Margem por Grupo (R$)</h3>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2a2d3e" />
              <XAxis dataKey="grupo" tick={{ fill: '#94a3b8', fontSize: 12 }} axisLine={{ stroke: '#2a2d3e' }} />
              <YAxis tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={{ stroke: '#2a2d3e' }}
                     tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
              <Tooltip content={<CustomTooltip />} />
              <Bar dataKey="margem" radius={[6, 6, 0, 0]}>
                {chartData.map((entry, i) => (
                  <Cell key={i} fill={GRUPO_COLORS[entry.grupo] || '#666'} opacity={0.85} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ── Distribution Pie ──
    function DistributionPie({ data, title, field, labelFn }) {
      const pieData = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const rawKey = row[field] || 'Desconhecido';
          const displayKey = labelFn ? labelFn(rawKey) : rawKey;
          if (!map[displayKey]) map[displayKey] = { name: displayKey, value: 0 };
          map[displayKey].value += Number(row.receita) || 0;
        });
        return Object.values(map).sort((a,b) => b.value - a.value);
      }, [data, field, labelFn]);

      const COLORS = ['#6366f1','#22c55e','#3b82f6','#eab308','#ef4444','#a855f7','#f97316','#14b8a6'];

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <h3 className="text-lg font-semibold text-white mb-4">{title}</h3>
          <ResponsiveContainer width="100%" height={250}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%"
                   outerRadius={85} innerRadius={45} paddingAngle={2}
                   stroke="#1a1d2e" strokeWidth={2}>
                {pieData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
              </Pie>
              <Tooltip formatter={v => `R$ ${fmt(v)}`}
                       contentStyle={{ backgroundColor: '#1a1d2e', border: '1px solid #2a2d3e', borderRadius: 8, color: '#e2e8f0' }} />
              <Legend wrapperStyle={{ fontSize: 12, color: '#94a3b8' }} />
            </PieChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ── Top Anúncios Table ──
    function TopAnuncios({ data, mode }) {
      const sorted = useMemo(() => {
        const filtered = data.filter(d => Number(d.receita) > 0);
        if (mode === 'lucro') return [...filtered].sort((a,b) => Number(b.margem_valor) - Number(a.margem_valor)).slice(0, 10);
        if (mode === 'prejuizo') return [...filtered].sort((a,b) => Number(a.margem_valor) - Number(b.margem_valor)).slice(0, 10);
        return [...filtered].sort((a,b) => Number(b.receita) - Number(a.receita)).slice(0, 10);
      }, [data, mode]);

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl overflow-hidden fade-in">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gge-muted text-xs uppercase tracking-wider">
                  <th className="text-left px-4 py-3 w-12">#</th>
                  <th className="text-left px-4 py-3">Anúncio</th>
                  <th className="text-right px-4 py-3">Vendas</th>
                  <th className="text-right px-4 py-3">Receita</th>
                  <th className="text-right px-4 py-3">Margem</th>
                  <th className="text-right px-4 py-3">MC%</th>
                  <th className="text-center px-4 py-3">Grupo</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((row, i) => {
                  const mc = Number(row.receita) > 0 ? Number(row.margem_valor)/Number(row.receita)*100 : 0;
                  return (
                    <tr key={row.mlb_id + '-' + i} className="border-t border-gge-border/50 hover:bg-white/5 transition-colors">
                      <td className="px-4 py-2.5 text-gge-muted">{i+1}</td>
                      <td className="px-4 py-2.5">
                        <div className="text-white text-sm font-medium truncate max-w-xs" title={row.titulo}>{row.titulo}</div>
                        <div className="text-gge-muted text-xs">{row.sku_vendedor || '—'} · {row.mlb_id}</div>
                      </td>
                      <td className="text-right px-4 py-2.5 text-gge-text">{fmtInt(row.qtd_vendas)}</td>
                      <td className="text-right px-4 py-2.5 text-white">R$ {fmt(row.receita)}</td>
                      <td className={`text-right px-4 py-2.5 font-medium ${Number(row.margem_valor) >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        R$ {fmt(row.margem_valor)}
                      </td>
                      <td className={`text-right px-4 py-2.5 font-bold ${mc >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtPct(mc)}</td>
                      <td className="text-center px-4 py-2.5"><GrupoBadge grupo={row.grupo} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Main App ──
    function App() {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [rawData, setRawData] = useState([]);
      const [meses, setMeses] = useState([]);
      const [contas, setContas] = useState([]);

      // Filters
      const [mesSel, setMesSel] = useState('');
      const [contaSel, setContaSel] = useState('');
      const [tipoSel, setTipoSel] = useState('');
      const [modeSel, setModeSel] = useState('');
      const [kitSel, setKitSel] = useState('');
      const [catSel, setCatSel] = useState('');
      const [fornSel, setFornSel] = useState('');
      const [pontoSel, setPontoSel] = useState('');
      const [idadeSel, setIdadeSel] = useState('');
      const [topMode, setTopMode] = useState('lucro');

      // Fetch data
      useEffect(() => {
        async function load() {
          setLoading(true);
          setError(null);
          try {
            // Fetch all data (the view is already aggregated by mlb_id+month)
            const { data, error: err } = await supabase
              .from('vw_margem_segmentada')
              .select('*')
              .order('mes', { ascending: false });
            if (err) throw err;
            setRawData(data || []);

            // Extract unique months and contas
            const ms = [...new Set(data.map(d => d.mes))].sort((a,b) => b.localeCompare(a));
            const cs = [...new Set(data.map(d => d.conta_nome))].sort();
            setMeses(ms);
            setContas(cs);

            // Default to most recent month
            if (ms.length > 0 && !mesSel) setMesSel(ms[0]);
          } catch (e) {
            setError(e.message || 'Erro ao carregar dados');
          }
          setLoading(false);
        }
        load();
      }, []);

      // Filtered data
      const filtered = useMemo(() => {
        return rawData.filter(d => {
          if (mesSel && d.mes !== mesSel) return false;
          if (contaSel && d.conta_nome !== contaSel) return false;
          if (tipoSel && d.tipo_listagem !== tipoSel) return false;
          if (modeSel && d.modo_logistica !== modeSel) return false;
          if (kitSel && d.kit_produto !== kitSel) return false;
          if (catSel && d.catalogo_anuncio !== catSel) return false;
          if (fornSel && d.fornecedor !== fornSel) return false;
          if (pontoSel && d.ponto_saida !== pontoSel) return false;
          if (idadeSel && d.idade_anuncio !== idadeSel) return false;
          return true;
        });
      }, [rawData, mesSel, contaSel, tipoSel, modeSel, kitSel, catSel, fornSel, pontoSel, idadeSel]);

      // Totals
      const totals = useMemo(() => {
        const t = { anuncios: 0, vendas: 0, receita: 0, margem: 0, ads: 0, frete: 0, custo: 0, comissao: 0, prejuizo_count: 0 };
        filtered.forEach(d => {
          t.anuncios++;
          t.vendas += Number(d.qtd_vendas) || 0;
          t.receita += Number(d.receita) || 0;
          t.margem += Number(d.margem_valor) || 0;
          t.ads += Number(d.custo_ads) || 0;
          t.frete += Number(d.custo_frete) || 0;
          t.custo += Number(d.custo_produto) || 0;
          t.comissao += Number(d.comissao) || 0;
          if (Number(d.margem_valor) < 0) t.prejuizo_count++;
        });
        t.mc_pct = t.receita > 0 ? (t.margem / t.receita * 100) : 0;
        return t;
      }, [filtered]);

      // Unique filter options from current month
      const filterOpts = useMemo(() => {
        const mesData = rawData.filter(d => !mesSel || d.mes === mesSel);
        return {
          tipos: [...new Set(mesData.map(d => d.tipo_listagem))].sort(),
          modos: [...new Set(mesData.map(d => d.modo_logistica))].sort(),
          kits: [...new Set(mesData.map(d => d.kit_produto))].sort(),
          cats: [...new Set(mesData.map(d => d.catalogo_anuncio))].sort(),
          forns: [...new Set(mesData.map(d => d.fornecedor))].sort(),
          pontos: [...new Set(mesData.map(d => d.ponto_saida))].sort(),
          idades: [...new Set(mesData.map(d => d.idade_anuncio))].sort(),
        };
      }, [rawData, mesSel]);

      if (error) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="bg-gge-card border border-red-500/30 rounded-xl p-8 max-w-md text-center">
              <div className="text-4xl mb-4">⚠️</div>
              <h2 className="text-xl font-bold text-white mb-2">Erro ao carregar</h2>
              <p className="text-gge-muted text-sm">{error}</p>
              <button onClick={() => window.location.reload()}
                      className="mt-4 px-4 py-2 bg-gge-accent text-white rounded-lg text-sm hover:bg-gge-accent/80 transition-colors">
                Tentar novamente
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="border-b border-gge-border bg-gge-card/50 backdrop-blur-sm sticky top-0 z-50">
            <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gge-accent rounded-xl flex items-center justify-center text-white font-bold text-lg">G</div>
                <div>
                  <h1 className="text-lg font-bold text-white tracking-tight">Controle Total GGE</h1>
                  <p className="text-xs text-gge-muted">Painel de Margem de Contribuição</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                {mesSel && <span className="text-sm text-gge-muted">Dados de <span className="text-white font-medium">{fmtMes(mesSel)}</span></span>}
                <div className="w-2 h-2 rounded-full bg-gge-green animate-pulse" title="Conectado ao Supabase"></div>
              </div>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto px-6 py-6 space-y-6">
            {/* Filters */}
            <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-sm font-semibold text-white">Filtros</span>
                <span className="text-xs text-gge-muted">({fmtInt(filtered.length)} anúncios)</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-10 gap-3">
                <FilterSelect label="Mês" value={mesSel} onChange={setMesSel} options={meses} allLabel="Todos os meses" labelFn={fmtMes} />
                <FilterSelect label="Conta" value={contaSel} onChange={setContaSel} options={contas} />
                <FilterSelect label="Listagem" value={tipoSel} onChange={setTipoSel} options={filterOpts.tipos} labelFn={labelTipo} />
                <FilterSelect label="Logística" value={modeSel} onChange={setModeSel} options={filterOpts.modos} />
                <FilterSelect label="Tipo" value={kitSel} onChange={setKitSel} options={filterOpts.kits} />
                <FilterSelect label="Catálogo" value={catSel} onChange={setCatSel} options={filterOpts.cats} />
                <FilterSelect label="Fornecedor" value={fornSel} onChange={setFornSel} options={filterOpts.forns} />
                <FilterSelect label="Pto Saída" value={pontoSel} onChange={setPontoSel} options={filterOpts.pontos} />
                <FilterSelect label="Idade" value={idadeSel} onChange={setIdadeSel} options={filterOpts.idades} />
                <div className="flex items-end">
                  <button onClick={() => { setContaSel(''); setTipoSel(''); setModeSel(''); setKitSel(''); setCatSel(''); setFornSel(''); setPontoSel(''); setIdadeSel(''); }}
                          className="w-full px-3 py-2 text-sm text-gge-muted border border-gge-border rounded-lg hover:bg-white/5 transition-colors">
                    Limpar
                  </button>
                </div>
              </div>
            </div>

            {loading ? (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                {[...Array(6)].map((_, i) => <Skeleton key={i} className="h-28" />)}
              </div>
            ) : (
              <>
                {/* KPI Cards */}
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                  <MetricCard label="Receita" value={`R$ ${fmt(totals.receita)}`} icon="💰" />
                  <MetricCard label="Margem (MC)" value={`R$ ${fmt(totals.margem)}`}
                              color={totals.margem >= 0 ? 'text-gge-green' : 'text-gge-red'}
                              sub={`${fmtPct(totals.mc_pct)} da receita`} icon="📈" />
                  <MetricCard label="Vendas" value={fmtInt(totals.vendas)} sub={`${fmtInt(totals.anuncios)} anúncios`} icon="🛒" />
                  <MetricCard label="Comissão ML" value={`R$ ${fmt(totals.comissao)}`}
                              sub={totals.receita > 0 ? `${fmtPct(totals.comissao/totals.receita*100)} da receita` : ''}
                              icon="🏪" />
                  <MetricCard label="Frete" value={`R$ ${fmt(totals.frete)}`} icon="🚚" />
                  <MetricCard label="Em Prejuízo" value={fmtInt(totals.prejuizo_count)}
                              color="text-gge-red"
                              sub={`de ${fmtInt(totals.anuncios)} anúncios`} icon="⚠️" />
                </div>

                {/* Charts Row */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                  <div className="lg:col-span-2">
                    <GroupsChart data={filtered} />
                  </div>
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Receita por Ponto de Saída" field="ponto_saida" />
                </div>

                {/* Groups Table */}
                <GroupsSummary data={filtered} />

                {/* Distribution charts */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Fornecedor" field="fornecedor" />
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Tipo Listagem" field="tipo_listagem" labelFn={labelTipo} />
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Logística" field="modo_logistica" />
                </div>

                {/* Top Anúncios */}
                <div>
                  <div className="flex items-center gap-4 mb-3">
                    <h3 className="text-lg font-semibold text-white">Top 10 Anúncios</h3>
                    <div className="flex gap-1">
                      {[['lucro', 'Maior Lucro'], ['prejuizo', 'Maior Prejuízo'], ['receita', 'Maior Receita']].map(([k, label]) => (
                        <button key={k} onClick={() => setTopMode(k)}
                                className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${topMode === k ? 'bg-gge-accent text-white' : 'bg-gge-card border border-gge-border text-gge-muted hover:text-white'}`}>
                          {label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <TopAnuncios data={filtered} mode={topMode} />
                </div>

                {/* Footer */}
                <div className="text-center text-gge-muted text-xs py-8 border-t border-gge-border">
                  <p>Controle Total GGE — Dados carregados do Supabase em tempo real</p>
                  <p className="mt-1">Fórmula: Receita - Comissão - Frete - Custo Produto - ADs - DIFAL(1.6%) - PIS/COFINS(9.25%) + Créditos PIS/COFINS(9.25% × (Comissão+ADs))</p>
                </div>
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
