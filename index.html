<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Total GGE — Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222532;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-muted: #8b8fa3;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,.12);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,.12);
    --red: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #1e2235 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #fff;
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #e4e4e7, #a1a1aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header h1 span { font-weight: 400; color: var(--text-muted); -webkit-text-fill-color: var(--text-muted); }
  .filter-bar {
    display: flex; align-items: center; gap: 10px;
  }
  .filter-bar label { font-size: 13px; color: var(--text-muted); }
  .filter-bar select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer;
    outline: none; transition: border-color .2s;
  }
  .filter-bar select:hover { border-color: var(--accent); }
  .container { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }
  .section-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; width: 4px; height: 16px; border-radius: 2px;
    background: var(--accent);
  }
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 900px) { .proj-grid { grid-template-columns: 1fr; } }
  .proj-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    transition: all .25s;
    position: relative;
    overflow: hidden;
  }
  .proj-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
  .proj-card .badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-30 { background: var(--blue-bg); color: var(--blue); }
  .badge-15 { background: var(--yellow-bg); color: var(--yellow); }
  .badge-7  { background: var(--orange-bg); color: var(--orange); }
  .proj-card .label {
    font-size: 12px; color: var(--text-muted); margin-bottom: 4px;
  }
  .proj-card .value {
    font-size: 28px; font-weight: 700; margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .proj-card .sub {
    font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;
  }
  .proj-card .sub .avg {
    color: var(--accent-light); font-weight: 600;
  }
  .month-detail {
    font-size: 12px; color: var(--text-muted); margin-top: 8px;
    line-height: 1.6;
  }
  .month-detail strong { color: var(--text); font-weight: 600; }
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 900px) { .summary-row { grid-template-columns: repeat(3, 1fr); } }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
  }
  .summary-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .summary-card .value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .summary-card .change { font-size: 12px; margin-top: 4px; }
  .change.up { color: var(--green); }
  .change.down { color: var(--red); }
  .panels-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) { .panels-grid { grid-template-columns: 1fr; } }
  .panel-link {
    display: flex; align-items: center; gap: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    text-decoration: none; color: var(--text);
    transition: all .25s;
    cursor: pointer;
  }
  .panel-link:hover {
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
  }
  .panel-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .panel-icon.margem { background: linear-gradient(135deg, rgba(34,197,94,.15), rgba(34,197,94,.05)); color: var(--green); }
  .panel-icon.preco  { background: linear-gradient(135deg, rgba(99,102,241,.15), rgba(99,102,241,.05)); color: var(--accent-light); }
  .panel-link h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .panel-link p  { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
  .panel-arrow {
    margin-left: auto; font-size: 20px; color: var(--text-muted);
    transition: transform .2s, color .2s;
  }
  .panel-link:hover .panel-arrow { transform: translateX(4px); color: var(--accent); }
  .hist-table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .hist-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .hist-table th {
    background: rgba(99,102,241,.06);
    padding: 12px 16px; text-align: left;
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); border-bottom: 1px solid var(--border);
  }
  .hist-table td {
    padding: 11px 16px; border-bottom: 1px solid rgba(42,45,58,.5);
    font-variant-numeric: tabular-nums;
  }
  .hist-table tr:last-child td { border-bottom: none; }
  .hist-table tr:hover td { background: rgba(99,102,241,.04); }
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 15px;
  }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    text-align: center; padding: 20px;
    font-size: 12px; color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">GGE</div>
    <h1>Controle Total <span>— Dashboard</span></h1>
  </div>
  <div class="filter-bar">
    <label>Conta:</label>
    <select id="contaFilter" onchange="applyFilter()">
      <option value="all">Consolidado</option>
      <option value="GGE-GRAMPEADORES">GGE-GRAMPEADORES</option>
      <option value="GGESP">GGESP</option>
      <option value="TOOWCOMERCIAL">TOOWCOMERCIAL</option>
    </select>
  </div>
</div>
<div class="container" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div>Carregando dados...</div>
  </div>
</div>
<div class="footer">Controle Total GGE &copy; 2026 — Atualizado em tempo real via Supabase</div>
<script>
const SUPABASE_URL = 'https://opceujqpqyvxsatzdarg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wY2V1anFwcXl2eHNhdHpkYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzIwMDEsImV4cCI6MjA4OTA0ODAwMX0.XKhgaNBJF8xiHiGEWEs8HL1dq5KFJpo2_RQckjsY9kc';
const CONTAS_MAP = {
  'e761652f-07fa-49d2-a6c7-1b738862ab08': 'GGE-GRAMPEADORES',
  '304d2ad4-a3e7-449b-9073-1b7d54cbfa0c': 'GGESP',
  '8284ee61-87f9-4162-9f1f-542587fbbf53': 'TOOWCOMERCIAL'
};
let rawDailyData = [];
let rawMonthlyData = [];
function fmt(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtN(v) { return Number(v).toLocaleString('pt-BR'); }
function fmtPct(v) { return Number(v).toFixed(1) + '%'; }
async function sbQuery(endpoint, params) {
  const url = new URL(SUPABASE_URL + '/rest/v1/' + endpoint);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  return r.json();
}
async function loadData() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const d31 = new Date(today); d31.setDate(d31.getDate() - 31);
  const d31Str = d31.toISOString().slice(0,10);
  const [dailyRaw, monthly] = await Promise.all([
    sbQuery('vendas', {
      select: 'conta_id,data_venda,preco_total,status',
      'data_venda': 'gte.' + d31Str + 'T00:00:00',
      'status': 'in.(paid,partially_refunded)',
      limit: '50000'
    }),
    sbQuery('vw_saldo_vendas', {
      select: '*', order: 'mes.desc', limit: '30'
    })
  ]);
  const dailyMap = {};
  dailyRaw.forEach(r => {
    const conta = CONTAS_MAP[r.conta_id] || r.conta_id;
    const dia = r.data_venda.slice(0,10);
    if (dia >= todayStr) return;
    const key = conta + '|' + dia;
    if (!dailyMap[key]) dailyMap[key] = {conta, dia, faturamento: 0, qtd: 0};
    dailyMap[key].faturamento += Number(r.preco_total);
    dailyMap[key].qtd += 1;
  });
  rawDailyData = Object.values(dailyMap).sort((a,b) => b.dia.localeCompare(a.dia));
  rawMonthlyData = monthly;
  applyFilter();
}
function filterDaily(data, conta) {
  if (conta === 'all') return data;
  return data.filter(d => d.conta === conta);
}
function filterMonthly(data, conta) {
  if (conta === 'all') {
    const byMonth = {};
    data.forEach(r => {
      const m = r.mes;
      if (!byMonth[m]) byMonth[m] = {
        mes: m, conta_nome: 'Consolidado',
        faturamento_bruto: 0, cancelamentos: 0, saldo_vendas: 0,
        qtd_vendas: 0, qtd_cancelamentos: 0, comissao_ml_total: 0
      };
      byMonth[m].faturamento_bruto += Number(r.faturamento_bruto);
      byMonth[m].cancelamentos += Number(r.cancelamentos);
      byMonth[m].saldo_vendas += Number(r.saldo_vendas);
      byMonth[m].qtd_vendas += Number(r.qtd_vendas);
      byMonth[m].qtd_cancelamentos += Number(r.qtd_cancelamentos);
      byMonth[m].comissao_ml_total += Number(r.comissao_ml_total);
    });
    return Object.values(byMonth).sort((a,b) => b.mes.localeCompare(a.mes));
  }
  return data.filter(r => r.conta_nome === conta);
}
function calcProjections(daily, conta) {
  const filtered = filterDaily(daily, conta);
  const byDay = {};
  filtered.forEach(d => {
    if (!byDay[d.dia]) byDay[d.dia] = {dia: d.dia, faturamento: 0, qtd: 0};
    byDay[d.dia].faturamento += d.faturamento;
    byDay[d.dia].qtd += d.qtd;
  });
  const days = Object.values(byDay).sort((a,b) => b.dia.localeCompare(a.dia));
  const calc = (n) => {
    const slice = days.slice(0, n);
    if (slice.length === 0) return {avg: 0, proj30: 0, n: 0, avgQtd: 0};
    const total = slice.reduce((s,d) => s + d.faturamento, 0);
    const totalQtd = slice.reduce((s,d) => s + d.qtd, 0);
    return {avg: total/slice.length, avgQtd: totalQtd/slice.length, proj30: (total/slice.length)*30, n: slice.length, total};
  };
  return { d30: calc(30), d15: calc(15), d7: calc(7) };
}
function calcMonthProjections(daily, conta) {
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const daysPassed = today.getDate() - 1;
  const daysRemaining = daysInMonth - daysPassed;
  const monthStr = today.toISOString().slice(0,7);
  const filtered = filterDaily(daily, conta);
  const mtdDays = {};
  filtered.forEach(d => {
    if (d.dia.startsWith(monthStr)) {
      if (!mtdDays[d.dia]) mtdDays[d.dia] = 0;
      mtdDays[d.dia] += d.faturamento;
    }
  });
  const mtdTotal = Object.values(mtdDays).reduce((s,v) => s + v, 0);
  const proj = calcProjections(daily, conta);
  const calcMonth = (wd) => ({
    mtd: mtdTotal, avgDay: wd.avg, daysRemaining, daysPassed, daysInMonth,
    projected: mtdTotal + (wd.avg * daysRemaining), mtdDayCount: Object.keys(mtdDays).length
  });
  return { d30: calcMonth(proj.d30), d15: calcMonth(proj.d15), d7: calcMonth(proj.d7) };
}
function applyFilter() {
  const conta = document.getElementById('contaFilter').value;
  const proj = calcProjections(rawDailyData, conta);
  const mProj = calcMonthProjections(rawDailyData, conta);
  const monthly = filterMonthly(rawMonthlyData, conta);
  const now = new Date();
  const curMonthStr = now.toISOString().slice(0,7) + '-01';
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonthStr = lastMonthDate.toISOString().slice(0,10);
  const curMonth = monthly.find(m => m.mes === curMonthStr);
  const lastMonth = monthly.find(m => m.mes === lastMonthStr);
  document.getElementById('mainContent').innerHTML = buildDashboard(proj, mProj, monthly, curMonth, lastMonth);
}
function buildDashboard(proj, mProj, monthly, curMonth, lastMonth) {
  const now = new Date();
  const MN = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const cm = MN[now.getMonth()], cy = now.getFullYear();
  let ch = '';
  if (lastMonth && curMonth) {
    const p = ((Number(curMonth.faturamento_bruto)/Number(lastMonth.faturamento_bruto))-1)*100;
    ch = '<div class="change '+(p>=0?'up':'down')+'">'+(p>=0?'&#9650;':'&#9660;')+' '+Math.abs(p).toFixed(1)+'% vs mês anterior</div>';
  }
  let sc = '';
  if (curMonth) {
    sc = '<div class="summary-row"><div class="summary-card"><div class="label">Faturamento Bruto ('+cm+')</div><div class="value">'+fmt(curMonth.faturamento_bruto)+'</div>'+ch+'</div><div class="summary-card"><div class="label">Vendas Realizadas</div><div class="value">'+fmtN(curMonth.qtd_vendas)+'</div></div><div class="summary-card"><div class="label">Cancelamentos</div><div class="value">'+fmt(curMonth.cancelamentos)+'</div><div class="change" style="color:var(--text-muted)">'+fmtPct(Number(curMonth.cancelamentos)/(Number(curMonth.faturamento_bruto)+Number(curMonth.cancelamentos))*100)+' do bruto+canc</div></div><div class="summary-card"><div class="label">Comissão ML</div><div class="value">'+fmt(curMonth.comissao_ml_total)+'</div><div class="change" style="color:var(--text-muted)">'+fmtPct(Number(curMonth.comissao_ml_total)/Number(curMonth.saldo_vendas)*100)+' do saldo</div></div></div>';
  } else {
    sc = '<div class="summary-row"><div class="summary-card"><div class="label">Faturamento ('+cm+')</div><div class="value" style="color:var(--text-muted)">Sem dados ainda</div></div><div class="summary-card"><div class="label">Vendas</div><div class="value">—</div></div><div class="summary-card"><div class="label">Cancelamentos</div><div class="value">—</div></div><div class="summary-card"><div class="label">Comissão ML</div><div class="value">—</div></div></div>';
  }
  const p30 = '<div class="section-title">Projeção 30 Dias</div><div class="proj-grid">'+projCard('Últimos 30 dias',proj.d30,'30',30)+projCard('Últimos 15 dias',proj.d15,'15',15)+projCard('Últimos 7 dias',proj.d7,'7',7)+'</div>';
  const mp = '<div class="section-title">Projeção do Mês ('+cm+' '+cy+')</div><div class="proj-grid">'+monthProjCard('Base: últimos 30 dias',mProj.d30,'30')+monthProjCard('Base: últimos 15 dias',mProj.d15,'15')+monthProjCard('Base: últimos 7 dias',mProj.d7,'7')+'</div>';
  const pl = '<div class="section-title">Painéis</div><div class="panels-grid"><a class="panel-link" href="margem.html"><div class="panel-icon margem">&#128200;</div><div><h3>Painel I — Margem</h3><p>Análise de margem por anúncio, custos, frete, comissão e impostos por conta ML</p></div><div class="panel-arrow">&#8594;</div></a><a class="panel-link" href="precificacao.html"><div class="panel-icon preco">&#128176;</div><div><h3>Painel II — Precificação</h3><p>Precificação B2B e Marketplace com cálculo reverso de MC</p></div><div class="panel-arrow">&#8594;</div></a><a class="panel-link" href="avaliacao.html"><div class="panel-icon" style="background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.05));color:var(--blue);">&#128202;</div><div><h3>Avaliação de Produtos</h3><p>Simulador de compra com upload Excel e cálculo por conta ML</p></div><div class="panel-arrow">&#8594;</div></a></div>';
  const hr = monthly.slice(0,6).map(m => {
    const md = new Date(m.mes+'T12:00:00');
    const ml = MN[md.getMonth()]+'/'+md.getFullYear();
    const cp = Number(m.saldo_vendas)>0?(Number(m.comissao_ml_total)/Number(m.saldo_vendas)*100).toFixed(1):'0.0';
    const xp = (Number(m.cancelamentos)/(Number(m.faturamento_bruto)+Number(m.cancelamentos))*100).toFixed(1);
    return '<tr><td>'+ml+'</td><td>'+fmt(m.faturamento_bruto)+'</td><td>'+fmtN(m.qtd_vendas)+'</td><td>'+fmt(m.cancelamentos)+' <span style="color:var(--text-muted)">('+xp+'%)</span></td><td>'+fmt(m.comissao_ml_total)+' <span style="color:var(--text-muted)">('+cp+'%)</span></td><td>'+fmt(Number(m.saldo_vendas)/Number(m.qtd_vendas))+'</td></tr>';
  }).join('');
  const ht = '<div class="section-title">Histórico Mensal</div><div class="hist-table-wrap"><table class="hist-table"><thead><tr><th>Mês</th><th>Faturamento Bruto</th><th>Vendas</th><th>Cancelamentos</th><th>Comissão ML</th><th>Ticket Médio</th></tr></thead><tbody>'+hr+'</tbody></table></div>';
  return sc+p30+mp+pl+ht;
}
function projCard(label, data, badge, n) {
  const bc = badge==='30'?'badge-30':badge==='15'?'badge-15':'badge-7';
  return '<div class="proj-card"><div class="badge '+bc+'">'+n+' dias</div><div class="label">'+label+'</div><div class="value">'+fmt(data.proj30)+'</div><div class="sub">Média diária: <span class="avg">'+fmt(data.avg)+'</span></div><div class="sub" style="margin-top:4px">'+fmtN(Math.round(data.avgQtd))+' vendas/dia &middot; '+data.n+' dias amostrados</div></div>';
}
function monthProjCard(label, data, badge) {
  const bc = badge==='30'?'badge-30':badge==='15'?'badge-15':'badge-7';
  return '<div class="proj-card"><div class="badge '+bc+'">'+label.replace('Base: ú','Ú')+'</div><div class="label">'+label+'</div><div class="value">'+fmt(data.projected)+'</div><div class="month-detail"><strong>'+fmt(data.mtd)+'</strong> realizados em '+data.daysPassed+' dia'+(data.daysPassed!==1?'s':'')+'<br>+ <strong>'+fmt(data.avgDay)+'</strong>/dia &times; '+data.daysRemaining+' dias restantes<br>Mês: '+data.daysInMonth+' dias (faltam '+data.daysRemaining+')</div></div>';
}
loadData().catch(err => {
  document.getElementById('mainContent').innerHTML = '<div class="loading" style="color:var(--red)">Erro ao carregar dados: '+err.message+'</div>';
});
</script>
</body>
</html>
