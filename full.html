<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Full · Controle Total GGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dados.js" onerror="console.warn('dados.js not found, continuing without it')"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        'gge-bg':'#0f1117','gge-card':'#1a1d2e','gge-border':'#2a2d3e',
        'gge-text':'#e2e8f0','gge-muted':'#94a3b8','gge-accent':'#6366f1',
        'gge-green':'#22c55e','gge-red':'#ef4444','gge-yellow':'#eab308',
        'gge-orange':'#f97316','gge-cyan':'#22d3ee',
      }}}
    }
  </script>
  <style>
    body { background:#0f1117; color:#e2e8f0; font-family:'Inter',system-ui,sans-serif; }
    .fade-in { animation: fadeIn .3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .row-hover:hover { background:rgba(99,102,241,.08); }
    .tab-active { border-bottom:2px solid #6366f1; color:#fff; }
    .tab-inactive { border-bottom:2px solid transparent; color:#94a3b8; }
    .tab-inactive:hover { color:#e2e8f0; }
    .sortable { cursor:pointer; user-select:none; }
    .sortable:hover { color:#6366f1; }
  </style>
  <script src="sidebar.js" defer></script>
</head>
<body>
<script>
  (function() {
    var auth = sessionStorage.getItem('gge_auth');
    if (auth !== 'gge2026') { window.location.href = '/'; return; }
  })();
</script>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <div id="root">
      <div style="display:flex;justify-content:center;align-items:center;height:80vh;color:#94a3b8;">
        <div style="text-align:center">
          <div style="font-size:2rem;margin-bottom:1rem;">&#9881;</div>
          <div>Carregando Controle Full...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { ComposedChart, Bar, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

    const SB_URL = window.GGE_SUPABASE_URL;
    const SB_KEY = window.GGE_SUPABASE_KEY;
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    // ── Fetch ALL rows (paginacao automatica) ──
    async function fetchAll(buildQuery) {
      const PAGE = 1000;
      let allRows = [];
      let from = 0;
      while (true) {
        const { data, error } = await buildQuery().range(from, from + PAGE - 1);
        if (error) throw error;
        if (!data || data.length === 0) break;
        allRows = allRows.concat(data);
        if (data.length < PAGE) break;
        from += PAGE;
      }
      return allRows;
    }

    // ── Helpers ──
    const fmtN = n => n == null ? '--' : Number(n).toLocaleString('pt-BR');
    const fmtP = n => n == null ? '--' : Number(n).toFixed(1).replace('.', ',') + '%';
    const fmtR = n => n == null ? '--' : 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const PERIODOS = [
      { v: '7d', l: '7 dias' },
      { v: '15d', l: '15 dias' },
      { v: '30d', l: '30 dias' },
      { v: 'mes_atual', l: 'Mês atual' },
      { v: 'mes_passado', l: 'Mês passado' },
      { v: '90d', l: '90 dias' },
    ];

    function getRange(p) {
      const now = new Date();
      const today = new Date(now.toLocaleDateString('en-CA', { timeZone: 'America/Sao_Paulo' }) + 'T12:00:00');
      const todayStr = today.toISOString().slice(0, 10);
      let from, to = todayStr;
      switch (p) {
        case '7d': from = new Date(today - 7 * 864e5); break;
        case '15d': from = new Date(today - 15 * 864e5); break;
        case '30d': from = new Date(today - 30 * 864e5); break;
        case 'mes_atual':
          from = new Date(today.getFullYear(), today.getMonth(), 1); break;
        case 'mes_passado':
          from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
          to = new Date(today.getFullYear(), today.getMonth(), 0).toISOString().slice(0, 10);
          break;
        case '90d': from = new Date(today - 90 * 864e5); break;
        default: from = new Date(today - 30 * 864e5);
      }
      return { from: (typeof from === 'string' ? from : from.toISOString().slice(0, 10)), to };
    }

    // ── Components ──
    function Badge({ text, color }) {
      const cls = {
        green: 'bg-green-900/40 text-green-400 border-green-700/50',
        red: 'bg-red-900/40 text-red-400 border-red-700/50',
        yellow: 'bg-yellow-900/40 text-yellow-400 border-yellow-700/50',
        orange: 'bg-orange-900/40 text-orange-400 border-orange-700/50',
        muted: 'bg-gge-bg text-gge-muted border-gge-border',
        cyan: 'bg-cyan-900/40 text-cyan-400 border-cyan-700/50',
      };
      return <span className={`text-[10px] px-1.5 py-0.5 rounded border font-medium whitespace-nowrap ${cls[color] || cls.muted}`}>{text}</span>;
    }

    function KpiCard({ title, value, sub, color, icon }) {
      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">{icon}</span>
            <span className="text-xs text-gge-muted font-medium">{title}</span>
          </div>
          <div className={`text-2xl font-bold ${color || 'text-white'}`}>{value}</div>
          {sub && <div className="text-xs text-gge-muted mt-1">{sub}</div>}
        </div>
      );
    }

    function Skeleton({ className }) {
      return <div className={`bg-gge-card border border-gge-border rounded-xl animate-pulse ${className || 'h-24'}`} />;
    }

    // ── Week grouping helper ──
    function getWeekKey(dateStr) {
      const d = new Date(dateStr);
      const day = d.getUTCDay();
      const diff = d.getUTCDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), diff));
      return monday.toISOString().slice(0, 10);
    }

    // ── Main App ──
    function App() {
      const [periodo, setPeriodo] = useState('30d');
      const [tab, setTab] = useState('visao');
      const [loading, setLoading] = useState(true);
      const [vendas, setVendas] = useState([]);
      const [anuncios, setAnuncios] = useState([]);
      const [estoqueDiario, setEstoqueDiario] = useState([]);
      const [vendasLong, setVendasLong] = useState([]);
      const [fullMlbs, setFullMlbs] = useState(new Set());
      const [ruptExpanded, setRuptExpanded] = useState(false);
      const [sortCol, setSortCol] = useState('falta7');
      const [sortDir, setSortDir] = useState('desc');
      const [erroMsg, setErroMsg] = useState(null);
      const [stockQuality, setStockQuality] = useState(null);

      // Fetch data
      useEffect(() => {
        (async () => {
          setLoading(true);
          setErroMsg(null);
          try {
            const { from, to } = getRange(periodo);
            const range90 = getRange('90d');

            // 1. Buscar anúncios ativos (inclui modo_logistica)
            const anunciosData = await fetchAll(() =>
              sb.from('anuncios').select('mlb_id, titulo, sku_vendedor, modo_logistica, preco_atual, status, estoque_declarado')
                .eq('status', 'active')
            );

            // 2. Identificar MLBs Full
            const fullSet = new Set();
            anunciosData.forEach(a => {
              if (a.modo_logistica && a.modo_logistica.toLowerCase().includes('fulfillment')) {
                fullSet.add(a.mlb_id);
              }
            });

            // 3. Buscar vendas do período (mat_margem_canonica tem dados históricos)
            //    Colunas corretas: receita, margem_valor (NÃO receita_total, mc2)
            const vendasData = await fetchAll(() =>
              sb.from('mat_margem_canonica')
                .select('mlb_id, receita, margem_valor, data_venda, quantidade')
                .gte('data_venda', from)
                .lte('data_venda', to + 'T23:59:59')
            );

            // 4. Vendas 90d para rupturas
            const vendasLongData = await fetchAll(() =>
              sb.from('mat_margem_canonica')
                .select('mlb_id, receita, margem_valor, data_venda, quantidade')
                .gte('data_venda', range90.from)
                .lte('data_venda', range90.to + 'T23:59:59')
            );

            // 5. Estoque diário (último snapshot)
            const { data: estoqueData } = await sb.from('estoque_diario')
              .select('*')
              .order('id', { ascending: false })
              .limit(1000);

            // 6. Stock Quality metrics (sistema em camadas: site > calculado)
            const { data: sqData } = await sb.from('stock_quality_metrics')
              .select('*')
              .eq('conta_id', 'e761652f-07fa-49d2-a6c7-1b738862ab08')
              .order('coletado_em', { ascending: false })
              .limit(10);

            if (sqData && sqData.length > 0) {
              // Preferir fonte='site', senão usar 'calculado'
              const siteRow = sqData.find(r => r.fonte === 'site');
              const calcRow = sqData.find(r => r.fonte === 'calculado');
              setStockQuality(siteRow || calcRow);
            }

            setAnuncios(anunciosData || []);
            setFullMlbs(fullSet);
            setVendas(vendasData || []);
            setVendasLong(vendasLongData || []);
            setEstoqueDiario(estoqueData || []);
            console.log(`[Full] ${fullSet.size} MLBs Full, ${(vendasData||[]).length} vendas no período, ${(estoqueData||[]).length} estoque registros`);
          } catch (e) {
            console.error('Erro ao carregar dados:', e);
            setErroMsg('Erro ao carregar dados: ' + e.message);
          }
          setLoading(false);
        })();
      }, [periodo]);

      // ── Filtrar vendas Full vs Coleta ──
      const vendasFull = useMemo(() => vendas.filter(v => fullMlbs.has(v.mlb_id)), [vendas, fullMlbs]);
      const vendasColeta = useMemo(() => vendas.filter(v => !fullMlbs.has(v.mlb_id)), [vendas, fullMlbs]);
      const anunciosFull = useMemo(() => anuncios.filter(a => fullMlbs.has(a.mlb_id)), [anuncios, fullMlbs]);

      // Estoque dos itens Full
      const estoqueFull = useMemo(() => {
        // Pegar ultimo registro por mlb_id
        const latest = {};
        estoqueDiario.forEach(e => {
          if (fullMlbs.has(e.mlb_id)) {
            if (!latest[e.mlb_id] || e.id > latest[e.mlb_id].id) {
              latest[e.mlb_id] = e;
            }
          }
        });
        return Object.values(latest);
      }, [estoqueDiario, fullMlbs]);

      // KPIs
      const kpis = useMemo(() => {
        const receita = vendasFull.reduce((s, v) => s + (Number(v.receita) || 0), 0);
        const margem = vendasFull.reduce((s, v) => s + (Number(v.margem_valor) || 0), 0);
        const margemPct = receita > 0 ? (margem / receita) * 100 : 0;
        const ativos = anunciosFull.length;
        const venderam = new Set(vendasFull.map(v => v.mlb_id)).size;
        // Para Full: usar SOMENTE qty_disponivel_full (qty_disponivel_proprio é inflado)
        const getEstoqueFull = (i) => {
          const qf = Number(i.qty_disponivel_full) || 0;
          if (qf > 0) return qf;
          const an = anunciosFull.find(a => a.mlb_id === i.mlb_id);
          return an ? (Number(an.estoque_declarado) || 0) : 0;
        };
        const estoqueTotal = estoqueFull.reduce((s, i) => s + getEstoqueFull(i), 0);
        const zerados = estoqueFull.filter(i => getEstoqueFull(i) === 0).length;
        const qtdVendas = vendasFull.reduce((s, v) => s + (Number(v.quantidade) || 1), 0);
        const ticket = qtdVendas > 0 ? receita / qtdVendas : 0;
        return { receita, margem, margemPct, ativos, venderam, estoqueTotal, zerados, ticket, qtdVendas };
      }, [vendasFull, anunciosFull, estoqueFull]);

      // Rupturas
      const rupturas = useMemo(() => {
        const vendasFullLong = vendasLong.filter(v => fullMlbs.has(v.mlb_id));
        const vendasPorMlb = {};
        vendasFullLong.forEach(v => {
          const mlb = v.mlb_id;
          if (!vendasPorMlb[mlb]) vendasPorMlb[mlb] = { qty: 0, receita: 0, lastSale: null };
          vendasPorMlb[mlb].qty += Number(v.quantidade) || 1;
          vendasPorMlb[mlb].receita += Number(v.receita) || 0;
          if (!vendasPorMlb[mlb].lastSale || v.data_venda > vendasPorMlb[mlb].lastSale) {
            vendasPorMlb[mlb].lastSale = v.data_venda;
          }
        });

        const result = [];
        estoqueFull.forEach(item => {
          // Para Full: usar SOMENTE qty_disponivel_full
          const qf = Number(item.qty_disponivel_full) || 0;
          const an = anuncios.find(a => a.mlb_id === item.mlb_id);
          const qtd = qf > 0 ? qf : (an ? (Number(an.estoque_declarado) || 0) : 0);
          if (qtd > 0) return; // Não está em ruptura

          const vs = vendasPorMlb[item.mlb_id];
          if (!vs || vs.qty === 0) return; // Nunca vendeu, não é ruptura relevante

          const anuncio = anuncios.find(a => a.mlb_id === item.mlb_id) || {};
          const lastSaleDate = new Date(vs.lastSale);
          const today = new Date();
          const diasParado = Math.max(0, Math.floor((today - lastSaleDate) / 864e5));
          const perdaDia = vs.receita / 90;

          result.push({
            mlb_id: item.mlb_id,
            sku: anuncio.sku_vendedor || '--',
            titulo: anuncio.titulo || item.mlb_id,
            vendas90: vs.qty,
            receita90: vs.receita,
            diasParado,
            perdaDia,
          });
        });

        return result.sort((a, b) => b.perdaDia - a.perdaDia);
      }, [estoqueFull, anuncios, vendasLong, fullMlbs]);

      const perdaRupturaTotal = useMemo(() => rupturas.reduce((s, r) => s + r.perdaDia * r.diasParado, 0), [rupturas]);

      // Weekly chart
      const weeklyData = useMemo(() => {
        const weeks = {};
        vendasFull.forEach(v => {
          const wk = getWeekKey(v.data_venda);
          if (!weeks[wk]) weeks[wk] = { semana: wk, receita: 0, margem: 0 };
          weeks[wk].receita += Number(v.receita) || 0;
          weeks[wk].margem += Number(v.margem_valor) || 0;
        });
        return Object.values(weeks)
          .sort((a, b) => a.semana.localeCompare(b.semana))
          .map(w => ({ ...w, margemPct: w.receita > 0 ? (w.margem / w.receita) * 100 : 0 }));
      }, [vendasFull]);

      // Full vs Coleta comparison
      const comparison = useMemo(() => {
        const calc = (arr, label) => {
          const receita = arr.reduce((s, v) => s + (Number(v.receita) || 0), 0);
          const margem = arr.reduce((s, v) => s + (Number(v.margem_valor) || 0), 0);
          const margemPct = receita > 0 ? (margem / receita) * 100 : 0;
          const qtd = arr.reduce((s, v) => s + (Number(v.quantidade) || 1), 0);
          const ticket = qtd > 0 ? receita / qtd : 0;
          return { label, vendas: qtd, receita, margem, margemPct, ticket };
        };
        return [calc(vendasFull, 'Full'), calc(vendasColeta, 'Coleta')];
      }, [vendasFull, vendasColeta]);

      // Espaço Full atribuído
      const LIMITE_FULL = 18020;
      const espacoFull = useMemo(() => {
        // Para Full: usar SOMENTE qty_disponivel_full (qty_disponivel_proprio é inflado)
        const getQty = (i) => {
          const qf = Number(i.qty_disponivel_full) || 0;
          if (qf > 0) return qf;
          const an = anunciosFull.find(a => a.mlb_id === i.mlb_id);
          return an ? (Number(an.estoque_declarado) || 0) : 0;
        };
        const emUso = estoqueFull.reduce((s, i) => s + getQty(i), 0);
        return { limite: LIMITE_FULL, emUso, pctUsado: LIMITE_FULL > 0 ? (emUso / LIMITE_FULL) * 100 : 0 };
      }, [estoqueFull, anunciosFull]);

      // Estoque & Reposição tab
      const estoqueData = useMemo(() => {
        // Usar 30d fixo para velocidade de venda (independente do período selecionado)
        const range30 = getRange('30d');
        const dias30 = Math.max(1, Math.round((new Date(range30.to) - new Date(range30.from)) / 864e5));

        // Vendas 30d para cálculo de velocidade (usa vendasLong que tem 90d)
        const vendasPorMlb = {};
        vendasLong.filter(v => fullMlbs.has(v.mlb_id)).forEach(v => {
          const dv = v.data_venda ? v.data_venda.slice(0, 10) : '';
          if (dv >= range30.from && dv <= range30.to) {
            if (!vendasPorMlb[v.mlb_id]) vendasPorMlb[v.mlb_id] = { qty: 0, receita: 0, margem: 0 };
            vendasPorMlb[v.mlb_id].qty += Number(v.quantidade) || 1;
            vendasPorMlb[v.mlb_id].receita += Number(v.receita) || 0;
            vendasPorMlb[v.mlb_id].margem += Number(v.margem_valor) || 0;
          }
        });

        function calcItem(mlb, estoque, anuncio) {
          const vs = vendasPorMlb[mlb] || { qty: 0, receita: 0, margem: 0 };
          const velDia = vs.qty / dias30;
          const emTransito = 0; // TODO: dados de envio inbound ainda não coletados
          const hojeTransito = estoque + emTransito;
          const falta7 = Math.max(0, Math.ceil(velDia * 7) - hojeTransito);
          const falta14 = Math.max(0, Math.ceil(velDia * 14) - hojeTransito);
          const falta21 = Math.max(0, Math.ceil(velDia * 21) - hojeTransito);
          const falta28 = Math.max(0, Math.ceil(velDia * 28) - hojeTransito);
          const margemPct = vs.receita > 0 ? (vs.margem / vs.receita) * 100 : 0;

          let alerta, alertaCor;
          if (estoque <= 0) { alerta = 'Zerado'; alertaCor = 'red'; }
          else if (falta7 > 0) { alerta = 'Crítico'; alertaCor = 'red'; }
          else if (falta14 > 0) { alerta = 'Urgente'; alertaCor = 'orange'; }
          else if (falta28 > 0) { alerta = 'Atenção'; alertaCor = 'yellow'; }
          else { alerta = 'OK'; alertaCor = 'green'; }

          return {
            mlb_id: mlb, sku: (anuncio && anuncio.sku_vendedor) || '--',
            titulo: (anuncio && anuncio.titulo) || mlb,
            estoque, emTransito, hojeTransito,
            vendas30: vs.qty,
            falta7, falta14, falta21, falta28,
            margemPct, alerta, alertaCor,
          };
        }

        const items = [];
        const processed = new Set();

        // Primeiro: itens com estoque registrado
        // Para Full: usar SOMENTE qty_disponivel_full (qty_disponivel_proprio é inflado para algoritmo ML)
        // Se qty_disponivel_full = 0, usar estoque_declarado do anúncio como fallback
        estoqueFull.forEach(item => {
          const mlb = item.mlb_id;
          processed.add(mlb);
          const anuncio = anuncios.find(a => a.mlb_id === mlb);
          const qtyFull = Number(item.qty_disponivel_full) || 0;
          const estoque = qtyFull > 0 ? qtyFull : (anuncio ? (Number(anuncio.estoque_declarado) || 0) : 0);
          items.push(calcItem(mlb, estoque, anuncio));
        });

        // Segundo: anúncios Full sem registro de estoque
        anunciosFull.forEach(a => {
          if (processed.has(a.mlb_id)) return;
          const estoque = Number(a.estoque_declarado) || 0;
          items.push(calcItem(a.mlb_id, estoque, a));
        });

        return items.sort((a, b) => b.falta7 - a.falta7);
      }, [estoqueFull, anunciosFull, anuncios, vendasLong, fullMlbs, periodo]);

      // Sort
      const sortedEstoque = useMemo(() => {
        const arr = [...estoqueData];
        arr.sort((a, b) => {
          let va = a[sortCol], vb = b[sortCol];
          if (typeof va === 'string') va = va.toLowerCase();
          if (typeof vb === 'string') vb = vb.toLowerCase();
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
        return arr;
      }, [estoqueData, sortCol, sortDir]);

      const handleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('asc'); }
      };

      const SortIcon = ({ col }) => {
        if (sortCol !== col) return <span className="text-gge-muted/40 ml-1">&#8597;</span>;
        return <span className="text-gge-accent ml-1">{sortDir === 'asc' ? '▲' : '▼'}</span>;
      };

      // ── Custom Tooltip for chart ──
      const ChartTooltip = ({ active, payload, label }) => {
        if (!active || !payload) return null;
        return (
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 text-xs shadow-xl">
            <div className="text-gge-muted mb-1">Semana de {new Date(label + 'T00:00:00').toLocaleDateString('pt-BR')}</div>
            {payload.map((p, i) => (
              <div key={i} className="flex justify-between gap-4">
                <span style={{ color: p.color }}>{p.name}</span>
                <span className="font-bold text-white">
                  {p.name === 'MC%' ? fmtP(p.value) : fmtR(p.value)}
                </span>
              </div>
            ))}
          </div>
        );
      };

      if (loading) {
        return (
          <div className="p-6" style={{ marginLeft: '48px' }}>
            <div className="max-w-[1400px] mx-auto space-y-4">
              <Skeleton className="h-16 w-full" />
              <div className="grid grid-cols-6 gap-4">
                {[...Array(6)].map((_, i) => <Skeleton key={i} />)}
              </div>
              <div className="grid grid-cols-2 gap-4">

                            </td>
                            <td className={`text-right py-2 px-2 ${item.falta28 > 0 ? 'text-gge-yellow' : 'text-gge-green'}`}>
                              {item.falta28 > 0 ? fmtN(item.falta28) : '-'}
                            </td>
                            <td className={`text-right py-2 px-2 ${item.margemPct >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtP(item.margemPct)}</td>
                            <td className="text-center py-2 px-2"><Badge text={item.alerta} color={item.alertaCor} /></td>
                          </tr>
                        ))}
                        {sortedEstoque.length === 0 && (
                          <tr>
                            <td colSpan={12} className="text-center text-gge-muted py-8">Nenhum item encontrado no inventário Full.</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
