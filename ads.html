<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ads - Controle Total GGE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
    .main-with-sidebar { margin-left: 48px; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 20px; }
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filters select, .filters input { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
    .filters label { color: #8b949e; font-size: 0.8rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card .label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
    .card .value { font-size: 1.4rem; font-weight: 700; }
    .card .delta { font-size: 0.8rem; margin-top: 4px; }
    .up { color: #3fb950; } .down { color: #f85149; } .neutral { color: #d29922; }
    .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .chart-container h2 { font-size: 1rem; margin-bottom: 12px; }
    .chart-wrapper { position: relative; height: 240px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .badge { background: #f85149; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-ok { background: #3fb950; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th { background: #161b22; border-bottom: 2px solid #30363d; padding: 8px 6px; text-align: left; color: #8b949e; font-weight: 600; position: sticky; top: 0; cursor: pointer; white-space: nowrap; }
    thead th:hover { color: #58a6ff; }
    tbody td { padding: 7px 6px; border-bottom: 1px solid #21262d; }
    tbody tr:hover { background: #161b22; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .mlb-link { color: #58a6ff; text-decoration: none; }
    .mlb-link:hover { text-decoration: underline; }
    .roas-bad { color: #f85149; font-weight: 600; }
    .roas-ok { color: #d29922; }
    .roas-good { color: #3fb950; font-weight: 600; }
    .conta-tag { font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
    .conta-gge { background: #1f3d2a; color: #3fb950; }
    .conta-toow { background: #3d2f1f; color: #d29922; }
    .conta-ggesp { background: #1f2d3d; color: #58a6ff; }
    .loading { text-align: center; padding: 60px; color: #8b949e; }
    .table-scroll { max-height: 500px; overflow-y: auto; border: 1px solid #30363d; border-radius: 8px; }
    .summary-row td { font-weight: 700; background: #161b22; border-top: 2px solid #30363d; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <h1>Product Ads</h1>
    <p class="subtitle">Performance de anuncios patrocinados</p>

    <div class="filters">
      <div><label>Conta</label><br>
        <select id="filtro-conta">
          <option value="todas">Todas</option>
          <option value="GGE-GRAMPEADORES">GGE</option>
          <option value="TOOWCOMERCIAL">TOOW</option>
          <option value="GGESP">GGESP</option>
        </select>
      </div>
      <div><label>Periodo</label><br>
        <select id="filtro-periodo">
          <option value="7">7 dias</option>
          <option value="15">15 dias</option>
          <option value="30" selected>30 dias</option>
        </select>
      </div>
      <div><label>Gasto minimo</label><br>
        <input type="number" id="filtro-gasto-min" value="5" min="0" step="5" style="width:80px;">
      </div>
    </div>

    <div class="cards" id="cards-container"><div class="loading">Carregando...</div></div>

    <div class="chart-container">
      <h2>Evolucao Diaria</h2>
      <div class="chart-wrapper"><canvas id="chart-diario"></canvas></div>
    </div>

    <div class="section" id="alertas-section" style="display:none;">
      <h2>Sangradores <span class="badge" id="alertas-count">0</span></h2>
      <p style="color:#8b949e;font-size:0.8rem;margin-bottom:10px;">Anuncios com gasto > R$20 e zero vendas via Ads no periodo</p>
      <div class="table-scroll" style="max-height:300px;">
        <table id="tabela-alertas">
          <thead><tr><th>MLB</th><th>Produto</th><th>Conta</th><th class="num">Gasto</th><th class="num">Cliques</th><th class="num">CPC</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <h2>Ranking por MLB <span class="badge badge-ok" id="ranking-count">0</span></h2>
      <div class="table-scroll">
        <table id="tabela-ranking">
          <thead><tr>
            <th data-col="mlb">MLB</th>
            <th data-col="titulo">Produto</th>
            <th data-col="conta">Conta</th>
            <th data-col="gasto" class="num">Gasto</th>
            <th data-col="receita" class="num">Receita</th>
            <th data-col="roas" class="num">ROAS</th>
            <th data-col="acos" class="num">ACOS%</th>
            <th data-col="cliques" class="num">Cliques</th>
            <th data-col="vendas" class="num">Vendas</th>
            <th data-col="cpc" class="num">CPC</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="sidebar.js" defer></script>
  <script>
  (function(){
    var auth = sessionStorage.getItem('gge_auth');
    if (auth !== 'gge2026') { window.location.href = '/'; return; }
  })();

  var sb = supabase.createClient(window.GGE_SUPABASE_URL, window.GGE_SUPABASE_KEY);
  var chartInstance = null;
  var allData = [];
  var contasMap = {};

  async function loadContas() {
    var { data } = await sb.from('contas').select('id, nome');
    (data || []).forEach(function(c) { contasMap[c.id] = c.nome; });
  }

  function gc(nome) {
    if (!nome) return 'conta-gge';
    if (nome.indexOf('TOOW') >= 0) return 'conta-toow';
    if (nome.indexOf('SP') >= 0) return 'conta-ggesp';
    return 'conta-gge';
  }
  function rc(r) { return r <= 0 ? 'roas-bad' : r < 3 ? 'roas-bad' : r < 5 ? 'roas-ok' : 'roas-good'; }
  function fmt(v) { return 'R$ ' + Number(v||0).toFixed(2).replace('.', ','); }
  function fN(v, d) { return Number(v||0).toFixed(d||1).replace('.', ','); }

  async function loadData() {
    var dias = parseInt(document.getElementById('filtro-periodo').value);
    var dataMin = new Date(); dataMin.setDate(dataMin.getDate() - dias);
    var dStr = dataMin.toISOString().split('T')[0];

    var { data: raw } = await sb.from('ads_diario')
      .select('mlb_id, data_referencia, gasto_ads, receita_ads, cliques_ads, vendas_diretas_ads, cpc')
      .gte('data_referencia', dStr).order('data_referencia', { ascending: true });

    var mlbs = [...new Set((raw||[]).map(function(r){return r.mlb_id;}))];
    var anuncioMap = {};
    // Buscar em lotes de 200
    for (var i = 0; i < mlbs.length; i += 200) {
      var batch = mlbs.slice(i, i+200);
      var { data: an } = await sb.from('anuncios').select('mlb_id, titulo, conta_id').in('mlb_id', batch);
      (an||[]).forEach(function(a){ anuncioMap[a.mlb_id] = a; });
    }

    allData = (raw||[]).map(function(r){
      var a = anuncioMap[r.mlb_id] || {};
      r.titulo = a.titulo || r.mlb_id;
      r.conta_id = a.conta_id || '';
      r.conta_nome = contasMap[a.conta_id] || '';
      return r;
    });
    render();
  }

  function render() {
    var conta = document.getElementById('filtro-conta').value;
    var gastoMin = parseFloat(document.getElementById('filtro-gasto-min').value) || 0;

    var filtered = allData.filter(function(d){
      if (conta !== 'todas' && d.conta_nome !== conta) return false;
      return true;
    });

    var byMlb = {}, byDay = {};
    filtered.forEach(function(d){
      var g = Number(d.gasto_ads)||0, r = Number(d.receita_ads)||0;
      var c = Number(d.cliques_ads)||0, v = Number(d.vendas_diretas_ads)||0;
      if (!byMlb[d.mlb_id]) byMlb[d.mlb_id] = {mlb:d.mlb_id, titulo:d.titulo, conta:d.conta_nome, gasto:0, receita:0, cliques:0, vendas:0};
      byMlb[d.mlb_id].gasto += g; byMlb[d.mlb_id].receita += r;
      byMlb[d.mlb_id].cliques += c; byMlb[d.mlb_id].vendas += v;
      var dia = d.data_referencia;
      if (!byDay[dia]) byDay[dia] = {gasto:0, receita:0};
      byDay[dia].gasto += g; byDay[dia].receita += r;
    });

    var mlbList = Object.values(byMlb).filter(function(m){return m.gasto >= gastoMin;});
    mlbList.forEach(function(m){
      m.roas = m.gasto > 0 ? m.receita / m.gasto : 0;
      m.acos = m.receita > 0 ? m.gasto / m.receita * 100 : (m.gasto > 0 ? 999 : 0);
      m.cpc = m.cliques > 0 ? m.gasto / m.cliques : 0;
    });

    var tG = mlbList.reduce(function(s,m){return s+m.gasto;},0);
    var tR = mlbList.reduce(function(s,m){return s+m.receita;},0);
    var tC = mlbList.reduce(function(s,m){return s+m.cliques;},0);
    var tV = mlbList.reduce(function(s,m){return s+m.vendas;},0);
    var roasG = tG > 0 ? tR/tG : 0;
    var acosG = tR > 0 ? tG/tR*100 : 0;
    var cpcG = tC > 0 ? tG/tC : 0;
    var nAds = mlbList.filter(function(m){return m.gasto>0;}).length;

    document.getElementById('cards-container').innerHTML =
      '<div class="card"><div class="label">Gasto Total</div><div class="value">'+fmt(tG)+'</div><div class="delta neutral">'+nAds+' MLBs ativos</div></div>'+
      '<div class="card"><div class="label">Receita Ads</div><div class="value">'+fmt(tR)+'</div><div class="delta '+(tV>0?'up':'down')+'">'+tV+' vendas diretas</div></div>'+
      '<div class="card"><div class="label">ROAS</div><div class="value '+rc(roasG)+'">'+fN(roasG,2)+'x</div><div class="delta '+(roasG>=5?'up':roasG>=3?'neutral':'down')+'">'+(roasG>=5?'Saudavel':roasG>=3?'Aceitavel':'Abaixo')+'</div></div>'+
      '<div class="card"><div class="label">ACOS</div><div class="value">'+fN(acosG,1)+'%</div><div class="delta '+(acosG<=15?'up':acosG<=25?'neutral':'down')+'">'+(acosG<=15?'Excelente':acosG<=25?'Bom':'Alto')+'</div></div>'+
      '<div class="card"><div class="label">CPC Medio</div><div class="value">'+fmt(cpcG)+'</div><div class="delta neutral">'+tC+' cliques</div></div>';

    // Chart
    var dias = Object.keys(byDay).sort();
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('chart-diario').getContext('2d'), {
      type:'bar',
      data:{
        labels: dias.map(function(d){var p=d.split('-');return p[2]+'/'+p[1];}),
        datasets:[
          {label:'Gasto', data:dias.map(function(d){return byDay[d].gasto;}), backgroundColor:'rgba(248,81,73,0.7)', borderRadius:3, order:2},
          {label:'Receita', data:dias.map(function(d){return byDay[d].receita;}), type:'line', borderColor:'#3fb950', backgroundColor:'rgba(63,185,80,0.1)', tension:0.3, fill:true, pointRadius:2, order:1}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}},
        scales:{
          x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},
          y:{ticks:{color:'#8b949e',callback:function(v){return 'R$'+v;}},grid:{color:'#21262d'}}
        }
      }
    });

    // Alertas
    var sang = mlbList.filter(function(m){return m.gasto>=20 && m.receita===0;}).sort(function(a,b){return b.gasto-a.gasto;});
    var alertasSec = document.getElementById('alertas-section');
    if (sang.length > 0) {
      alertasSec.style.display = '';
      document.getElementById('alertas-count').textContent = sang.length;
      document.querySelector('#tabela-alertas tbody').innerHTML = sang.map(function(m){
        return '<tr><td><a href="https://www.mercadolivre.com.br/p/'+m.mlb+'" target="_blank" class="mlb-link">'+m.mlb+'</a></td>'+
          '<td>'+m.titulo.substring(0,50)+'</td>'+
          '<td><span class="conta-tag '+gc(m.conta)+'">'+m.conta+'</span></td>'+
          '<td class="num roas-bad">'+fmt(m.gasto)+'</td>'+
          '<td class="num">'+m.cliques+'</td>'+
          '<td class="num">'+fmt(m.cpc)+'</td></tr>';
      }).join('');
    } else { alertasSec.style.display='none'; }

    // Ranking
    mlbList.sort(function(a,b){return b.gasto-a.gasto;});
    document.getElementById('ranking-count').textContent = mlbList.length;
    var tbR = document.querySelector('#tabela-ranking tbody');
    tbR.innerHTML = mlbList.map(function(m){
      var ac = m.acos>=999 ? '∞' : fN(m.acos,1)+'%';
      return '<tr><td><a href="https://www.mercadolivre.com.br/p/'+m.mlb+'" target="_blank" class="mlb-link">'+m.mlb+'</a></td>'+
        '<td>'+m.titulo.substring(0,45)+'</td>'+
        '<td><span class="conta-tag '+gc(m.conta)+'">'+m.conta+'</span></td>'+
        '<td class="num">'+fmt(m.gasto)+'</td>'+
        '<td class="num">'+fmt(m.receita)+'</td>'+
        '<td class="num '+rc(m.roas)+'">'+fN(m.roas,2)+'x</td>'+
        '<td class="num '+(m.acos>30?'roas-bad':m.acos>15?'roas-ok':'roas-good')+'">'+ac+'</td>'+
        '<td class="num">'+m.cliques+'</td>'+
        '<td class="num">'+m.vendas+'</td>'+
        '<td class="num">'+fmt(m.cpc)+'</td></tr>';
    }).join('');
    tbR.innerHTML += '<tr class="summary-row"><td colspan="3">TOTAL</td><td class="num">'+fmt(tG)+'</td><td class="num">'+fmt(tR)+'</td><td class="num '+rc(roasG)+'">'+fN(roasG,2)+'x</td><td class="num">'+fN(acosG,1)+'%</td><td class="num">'+tC+'</td><td class="num">'+tV+'</td><td class="num">'+fmt(cpcG)+'</td></tr>';

    // Sort headers
    document.querySelectorAll('#tabela-ranking thead th').forEach(function(th){
      th.onclick = function(){
        var col = th.getAttribute('data-col'); if(!col) return;
        var dir = th.getAttribute('data-dir')==='asc' ? 'desc' : 'asc';
        th.setAttribute('data-dir', dir);
        mlbList.sort(function(a,b){
          var va=a[col], vb=b[col];
          if(typeof va==='string') return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
          return dir==='asc'?va-vb:vb-va;
        });
        render();
      };
    });
  }

  document.getElementById('filtro-conta').onchange = render;
  document.getElementById('filtro-periodo').onchange = function(){ loadData(); };
  document.getElementById('filtro-gasto-min').onchange = render;

  loadContas().then(function(){ loadData(); });
  </script>
</body>
</html>
