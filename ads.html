<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADs — Controle Total GGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gge-bg': '#0f1117',
            'gge-card': '#1a1d2e',
            'gge-border': '#2a2d3e',
            'gge-text': '#e2e8f0',
            'gge-muted': '#94a3b8',
            'gge-accent': '#6366f1',
            'gge-green': '#22c55e',
            'gge-red': '#ef4444',
            'gge-yellow': '#eab308',
            'gge-orange': '#f97316',
            'gge-cyan': '#22d3ee',
            'gge-blue': '#3b82f6',
            'gge-purple': '#a855f7',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-load { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d2e; }
    ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d4e; }
  </style>
  <script src="auth.js" defer></script>
  <script src="sidebar.js" defer></script>
</head>
<body>
  <div class="main-with-sidebar">
    <div id="root"></div>
  </div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const sb = window.supabase.createClient(window.GGE_SUPABASE_URL, window.GGE_SUPABASE_KEY);

    // ── Helpers ──
    const fmt = v => v == null ? '—' : Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtInt = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');
    const fmtPct = v => v == null ? '—' : Number(v).toFixed(1) + '%';

    const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
    const fmtDate = d => d.toISOString().slice(0, 10);
    const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };

    const PERIODOS = [
      { value: '7d', label: '7 dias' },
      { value: '15d', label: '15 dias' },
      { value: '30d', label: '30 dias' },
      { value: 'mes_atual', label: 'Mês atual' },
      { value: 'mes_passado', label: 'Mês passado' },
      { value: '90d', label: '90 dias' },
    ];

    function getDateRange(p) {
      const t = today();
      if (p === 'mes_atual') return { start: fmtDate(new Date(t.getFullYear(), t.getMonth(), 1)), end: fmtDate(addDays(t, -1)) };
      if (p === 'mes_passado') return { start: fmtDate(new Date(t.getFullYear(), t.getMonth()-1, 1)), end: fmtDate(new Date(t.getFullYear(), t.getMonth(), 0)) };
      const days = parseInt(p);
      const end = addDays(t, -1);
      return { start: fmtDate(addDays(end, -(days-1))), end: fmtDate(end) };
    }

    // ── Parâmetros default do semáforo (5 níveis) ──
    const DEFAULT_PARAMS = {
      // 🟣 Investir Bem Mais — gasto muito baixo, ótimo retorno
      investirMais_gastoReceitaMax: 4,       // Invest/Receita < 4%
      investirMais_mc2Min: 50,               // MC2 > R$ 50
      investirMais_vendasAdsMin: 3,          // >= 3 vendas via ADs
      // 🟢 Investir Mais — gasto baixo, bom retorno
      bom_gastoReceitaMax: 8,                // Invest/Receita < 8%
      bom_mc2Min: 0,                         // MC2 > 0
      bom_vendasAdsMin: 1,                   // >= 1 venda via ADs
      // 🔵 Manter — performance aceitável
      manter_gastoReceitaMax: 15,            // Invest/Receita < 15%
      manter_mc2Min: -20,                    // MC2 > -R$ 20
      manter_vendasAdsMin: 1,                // >= 1 venda via ADs
      // 🟡 Reduzir — gasto alto relativo ao retorno
      reduzir_gastoReceitaMax: 25,           // Invest/Receita < 25%
      reduzir_vendasAdsMin: 1,               // >= 1 venda
      // 🔴 Parar — acima desses limites, ou sem vendas
      parar_gastoSemVendaMin: 30,            // Gasto > R$ 30 sem nenhuma venda via ADs
      parar_mc2MaxNeg: -50,                  // MC2 < -R$ 50 com gasto alto
      parar_gastoMc2NegMin: 20,              // Gasto mínimo para considerar MC2 negativo como "Parar"
      // 🔵 Oportunidade — sem ADs mas com vendas orgânicas
      oportunidade_vendasOrgMin: 5,          // >= 5 vendas orgânicas para sugerir testar ADs
    };

    // Carregar params do localStorage ou usar default
    function loadParams() {
      try {
        const saved = localStorage.getItem('gge_ads_params');
        if (saved) return { ...DEFAULT_PARAMS, ...JSON.parse(saved) };
      } catch {}
      return { ...DEFAULT_PARAMS };
    }
    function saveParams(p) {
      try { localStorage.setItem('gge_ads_params', JSON.stringify(p)); } catch {}
    }

    // ── Semáforo: lógica de recomendação (5 níveis) ──
    const SINAIS = {
      investirMais: { cor: 'purple', texto: 'Investir Bem Mais', icon: '🟣', prio: 5 },
      bom:          { cor: 'green',  texto: 'Investir Mais',     icon: '🟢', prio: 4 },
      manter:       { cor: 'blue',   texto: 'Manter',            icon: '🔵', prio: 3 },
      reduzir:      { cor: 'yellow', texto: 'Reduzir',           icon: '🟡', prio: 2 },
      parar:        { cor: 'red',    texto: 'Parar',             icon: '🔴', prio: 1 },
      oportunidade: { cor: 'cyan',   texto: 'Oportunidade',      icon: '💡', prio: 6 },
      neutro:       { cor: 'muted',  texto: '—',                 icon: '',   prio: 0 },
    };

    function calcRecomendacao(row, params) {
      const P = params || DEFAULT_PARAMS;
      const { gasto, receitaTotal, vendasTotal, vendasAds, mc2, gastoReceitaPct, adsMargPct } = row;

      // Sem gasto = oportunidade (se vende bem organicamente)
      if (gasto <= 0) {
        if (vendasTotal >= P.oportunidade_vendasOrgMin) return { ...SINAIS.oportunidade };
        return { ...SINAIS.neutro };
      }

      // 🔴 PARAR: gasto alto sem retorno
      if (vendasAds === 0 && gasto > P.parar_gastoSemVendaMin) return { ...SINAIS.parar };
      if (mc2 < P.parar_mc2MaxNeg && gasto > P.parar_gastoMc2NegMin) return { ...SINAIS.parar };
      if (gastoReceitaPct > P.reduzir_gastoReceitaMax && vendasAds < P.reduzir_vendasAdsMin) return { ...SINAIS.parar };

      // 🟣 INVESTIR BEM MAIS: muito eficiente
      if (gastoReceitaPct < P.investirMais_gastoReceitaMax && mc2 > P.investirMais_mc2Min && vendasAds >= P.investirMais_vendasAdsMin) return { ...SINAIS.investirMais };

      // 🟢 INVESTIR MAIS: eficiente
      if (gastoReceitaPct < P.bom_gastoReceitaMax && mc2 > P.bom_mc2Min && vendasAds >= P.bom_vendasAdsMin) return { ...SINAIS.bom };

      // 🔵 MANTER: aceitável
      if (gastoReceitaPct < P.manter_gastoReceitaMax && mc2 > P.manter_mc2Min && vendasAds >= P.manter_vendasAdsMin) return { ...SINAIS.manter };

      // 🟡 REDUZIR: gasto alto mas ainda tem alguma conversão
      if (gastoReceitaPct < P.reduzir_gastoReceitaMax && vendasAds >= P.reduzir_vendasAdsMin) return { ...SINAIS.reduzir };

      // Se não encaixou em nenhum dos anteriores, é Parar
      return { ...SINAIS.parar };
    }

    // ── Fetcher paginado ──
    async function fetchAll(queryFn) {
      let all = [], from = 0, size = 1000, done = false;
      while (!done) {
        const { data, error } = await queryFn().range(from, from + size - 1);
        if (error) throw error;
        if (!data || data.length === 0) break;
        all = all.concat(data);
        if (data.length < size) done = true;
        from += size;
      }
      return all;
    }

    // ── App ──
    // ── Painel de Parâmetros ──
    function ParamsPanel({ params, setParams, onClose }) {
      const [local, setLocal] = useState({ ...params });
      const set = (k, v) => setLocal(p => ({ ...p, [k]: Number(v) }));
      const apply = () => { setParams(local); saveParams(local); onClose(); };
      const reset = () => { setLocal({ ...DEFAULT_PARAMS }); };

      const Field = ({ label, field, suffix = '', step = '1' }) => (
        <div className="flex items-center justify-between gap-2">
          <label className="text-xs text-gge-muted flex-1">{label}</label>
          <div className="flex items-center gap-1">
            <input type="number" value={local[field]} step={step}
              onChange={e => set(field, e.target.value)}
              className="w-20 bg-gge-bg border border-gge-border rounded px-2 py-1 text-xs text-gge-text text-right focus:border-gge-accent outline-none" />
            {suffix && <span className="text-[10px] text-gge-muted w-6">{suffix}</span>}
          </div>
        </div>
      );

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-gge-card border border-gge-border rounded-xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-5" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold text-gge-text">Calibrar Parâmetros</h2>
              <button onClick={onClose} className="text-gge-muted hover:text-gge-text text-xl">&times;</button>
            </div>

            <div className="space-y-5">
              {/* Investir Bem Mais */}
              <div className="border-l-2 border-purple-500 pl-3">
                <div className="text-sm font-semibold text-purple-400 mb-2">🟣 Investir Bem Mais</div>
                <div className="space-y-2">
                  <Field label="Invest/Receita máximo" field="investirMais_gastoReceitaMax" suffix="%" />
                  <Field label="MC2 mínimo (R$)" field="investirMais_mc2Min" suffix="R$" />
                  <Field label="Vendas via ADs mínimo" field="investirMais_vendasAdsMin" />
                </div>
              </div>

              {/* Investir Mais */}
              <div className="border-l-2 border-green-500 pl-3">
                <div className="text-sm font-semibold text-green-400 mb-2">🟢 Investir Mais</div>
                <div className="space-y-2">
                  <Field label="Invest/Receita máximo" field="bom_gastoReceitaMax" suffix="%" />
                  <Field label="MC2 mínimo (R$)" field="bom_mc2Min" suffix="R$" />
                  <Field label="Vendas via ADs mínimo" field="bom_vendasAdsMin" />
                </div>
              </div>

              {/* Manter */}
              <div className="border-l-2 border-blue-500 pl-3">
                <div className="text-sm font-semibold text-blue-400 mb-2">🔵 Manter Investimento</div>
                <div className="space-y-2">
                  <Field label="Invest/Receita máximo" field="manter_gastoReceitaMax" suffix="%" />
                  <Field label="MC2 mínimo (R$)" field="manter_mc2Min" suffix="R$" />
                  <Field label="Vendas via ADs mínimo" field="manter_vendasAdsMin" />
                </div>
              </div>

              {/* Reduzir */}
              <div className="border-l-2 border-yellow-500 pl-3">
                <div className="text-sm font-semibold text-yellow-400 mb-2">🟡 Reduzir Investimento</div>
                <div className="space-y-2">
                  <Field label="Invest/Receita máximo" field="reduzir_gastoReceitaMax" suffix="%" />
                  <Field label="Vendas via ADs mínimo" field="reduzir_vendasAdsMin" />
                </div>
              </div>

              {/* Parar */}
              <div className="border-l-2 border-red-500 pl-3">
                <div className="text-sm font-semibold text-red-400 mb-2">🔴 Parar Investimento</div>
                <div className="space-y-2">
                  <Field label="Gasto sem vendas p/ parar (R$)" field="parar_gastoSemVendaMin" suffix="R$" />
                  <Field label="MC2 negativo máximo (R$)" field="parar_mc2MaxNeg" suffix="R$" />
                  <Field label="Gasto mín. p/ considerar MC2 neg." field="parar_gastoMc2NegMin" suffix="R$" />
                </div>
              </div>

              {/* Oportunidade */}
              <div className="border-l-2 border-cyan-500 pl-3">
                <div className="text-sm font-semibold text-cyan-400 mb-2">💡 Oportunidade</div>
                <div className="space-y-2">
                  <Field label="Vendas orgânicas mínimo" field="oportunidade_vendasOrgMin" />
                </div>
              </div>
            </div>

            <div className="flex gap-3 mt-6 pt-4 border-t border-gge-border">
              <button onClick={reset} className="px-4 py-2 text-xs text-gge-muted hover:text-gge-text border border-gge-border rounded-lg hover:bg-gge-bg transition-all">
                Restaurar Padrão
              </button>
              <div className="flex-1"></div>
              <button onClick={onClose} className="px-4 py-2 text-xs text-gge-muted border border-gge-border rounded-lg hover:bg-gge-bg">Cancelar</button>
              <button onClick={apply} className="px-4 py-2 text-xs bg-gge-accent text-white rounded-lg font-medium hover:bg-gge-accent/80 transition-all">Aplicar</button>
            </div>
          </div>
        </div>
      );
    }

    function AdsPage() {
      const [periodo, setPeriodo] = useState('30d');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [adsData, setAdsData] = useState([]);
      const [vendasData, setVendasData] = useState([]);
      const [anuncios, setAnuncios] = useState([]);
      const [margemData, setMargemData] = useState([]);
      const [sortKey, setSortKey] = useState('gasto');
      const [sortDir, setSortDir] = useState('desc');
      const [filtroSinal, setFiltroSinal] = useState('all');
      const [search, setSearch] = useState('');
      const [params, setParams] = useState(loadParams);
      const [showParams, setShowParams] = useState(false);

      useEffect(() => { loadData(); }, [periodo]);

      async function loadData() {
        setLoading(true);
        setError(null);
        try {
          const range = getDateRange(periodo);
          const [ads, vendas, anunciosRes, margem] = await Promise.all([
            fetchAll(() => sb.from('ads_diario').select('mlb_id, gasto_ads, receita_ads, vendas_diretas_ads, cliques_ads, impressoes_ads').gte('data_referencia', range.start).lte('data_referencia', range.end)),
            fetchAll(() => sb.from('vendas').select('mlb_id, preco_total, quantidade, status').gte('data_venda', range.start + 'T00:00:00').lte('data_venda', range.end + 'T23:59:59').neq('status', 'cancelled')),
            sb.from('anuncios').select('mlb_id, titulo, sku_vendedor, status, tipo_listagem, preco_atual, conta_id').then(r => r.data || []),
            fetchAll(() => sb.from('vw_margem_canonica').select('mlb_id, margem_valor, receita, custo_ads_rateado').gte('data_venda', range.start + 'T00:00:00').lte('data_venda', range.end + 'T23:59:59')),
          ]);
          setAdsData(ads);
          setVendasData(vendas);
          setAnuncios(anunciosRes);
          setMargemData(margem);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      // ── Mapas auxiliares ──
      const anuncioMap = useMemo(() => {
        const m = {};
        anuncios.forEach(a => { m[a.mlb_id] = a; });
        return m;
      }, [anuncios]);

      // Vendas totais por MLB
      const vendasPorMlb = useMemo(() => {
        const m = {};
        vendasData.forEach(v => {
          if (!m[v.mlb_id]) m[v.mlb_id] = { receita: 0, vendas: 0, unidades: 0 };
          m[v.mlb_id].receita += Number(v.preco_total || 0);
          m[v.mlb_id].vendas += 1;
          m[v.mlb_id].unidades += Number(v.quantidade || 1);
        });
        return m;
      }, [vendasData]);

      // Margem por MLB
      const margemPorMlb = useMemo(() => {
        const m = {};
        margemData.forEach(r => {
          if (!m[r.mlb_id]) m[r.mlb_id] = { mc2: 0, receita: 0, ads: 0 };
          m[r.mlb_id].mc2 += Number(r.margem_valor || 0);
          m[r.mlb_id].receita += Number(r.receita || 0);
          m[r.mlb_id].ads += Number(r.custo_ads_rateado || 0);
        });
        return m;
      }, [margemData]);

      // ── Tabela de decisão: unificar tudo ──
      const tabelaDecisao = useMemo(() => {
        // Agregar ads por MLB
        const adsPorMlb = {};
        adsData.forEach(r => {
          if (!adsPorMlb[r.mlb_id]) adsPorMlb[r.mlb_id] = { gasto: 0, receitaAds: 0, vendasAds: 0, cliques: 0, impressoes: 0 };
          adsPorMlb[r.mlb_id].gasto += Number(r.gasto_ads || 0);
          adsPorMlb[r.mlb_id].receitaAds += Number(r.receita_ads || 0);
          adsPorMlb[r.mlb_id].vendasAds += Number(r.vendas_diretas_ads || 0);
          adsPorMlb[r.mlb_id].cliques += Number(r.cliques_ads || 0);
          adsPorMlb[r.mlb_id].impressoes += Number(r.impressoes_ads || 0);
        });

        // Todos os MLBs que têm ADs OU vendas
        const mlbs = new Set([...Object.keys(adsPorMlb), ...Object.keys(vendasPorMlb)]);
        const rows = [];

        mlbs.forEach(mlb => {
          const ads = adsPorMlb[mlb] || { gasto: 0, receitaAds: 0, vendasAds: 0, cliques: 0, impressoes: 0 };
          const vd = vendasPorMlb[mlb] || { receita: 0, vendas: 0, unidades: 0 };
          const mg = margemPorMlb[mlb] || { mc2: 0, receita: 0, ads: 0 };
          const an = anuncioMap[mlb] || {};

          const receitaTotal = vd.receita;
          const vendasTotal = vd.vendas;
          const vendasOrg = Math.max(0, vendasTotal - ads.vendasAds);
          const gastoReceitaPct = receitaTotal > 0 ? (ads.gasto / receitaTotal) * 100 : (ads.gasto > 0 ? 999 : 0);
          const depAds = vendasTotal > 0 ? (ads.vendasAds / vendasTotal) * 100 : 0;
          // MC2 sem ads = MC2 + custo_ads (para ver quanto ads come da margem)
          const mc2SemAds = mg.mc2 + mg.ads;
          const adsMargPct = mc2SemAds > 0 ? (ads.gasto / mc2SemAds) * 100 : (ads.gasto > 0 ? 999 : 0);
          const acos = ads.receitaAds > 0 ? (ads.gasto / ads.receitaAds) * 100 : null;

          const row = {
            mlb, gasto: ads.gasto, receitaAds: ads.receitaAds, vendasAds: ads.vendasAds,
            cliques: ads.cliques, impressoes: ads.impressoes,
            receitaTotal, vendasTotal, vendasOrg, gastoReceitaPct, depAds,
            mc2: mg.mc2, mc2SemAds, adsMargPct, acos,
            titulo: an.titulo || mlb, sku: an.sku_vendedor || '—', status: an.status,
          };
          row.rec = calcRecomendacao(row, params);
          rows.push(row);
        });

        return rows;
      }, [adsData, vendasPorMlb, margemPorMlb, anuncioMap, params]);

      // ── Filtro e ordenação ──
      const tabelaFiltrada = useMemo(() => {
        let rows = tabelaDecisao;

        // Filtro por sinal
        if (filtroSinal === 'parar') rows = rows.filter(r => r.rec.cor === 'red');
        else if (filtroSinal === 'reduzir') rows = rows.filter(r => r.rec.cor === 'yellow');
        else if (filtroSinal === 'manter') rows = rows.filter(r => r.rec.cor === 'blue');
        else if (filtroSinal === 'bom') rows = rows.filter(r => r.rec.cor === 'green');
        else if (filtroSinal === 'investirMais') rows = rows.filter(r => r.rec.cor === 'purple');
        else if (filtroSinal === 'oportunidade') rows = rows.filter(r => r.rec.cor === 'cyan');
        else if (filtroSinal === 'com_ads') rows = rows.filter(r => r.gasto > 0);

        // Busca
        if (search) {
          const q = search.toLowerCase();
          rows = rows.filter(r => r.titulo.toLowerCase().includes(q) || r.sku.toLowerCase().includes(q) || r.mlb.toLowerCase().includes(q));
        }

        // Ordenação
        rows = [...rows].sort((a, b) => {
          let av, bv;
          if (sortKey === 'rec') { av = a.rec.prio; bv = b.rec.prio; }
          else { av = a[sortKey] ?? -Infinity; bv = b[sortKey] ?? -Infinity; }
          return sortDir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
        });

        return rows;
      }, [tabelaDecisao, filtroSinal, search, sortKey, sortDir]);

      // ── KPIs consolidados ──
      const kpis = useMemo(() => {
        const comAds = tabelaDecisao.filter(r => r.gasto > 0);
        const gastoTotal = comAds.reduce((s, r) => s + r.gasto, 0);
        const receitaTotalAds = comAds.reduce((s, r) => s + r.receitaTotal, 0);
        const mc2Total = comAds.reduce((s, r) => s + r.mc2, 0);
        const vendasAdsTotal = comAds.reduce((s, r) => s + r.vendasAds, 0);
        const vendasTotalAll = comAds.reduce((s, r) => s + r.vendasTotal, 0);
        const parar = comAds.filter(r => r.rec.cor === 'red').length;
        const reduzir = comAds.filter(r => r.rec.cor === 'yellow').length;
        const manter = comAds.filter(r => r.rec.cor === 'blue').length;
        const bom = comAds.filter(r => r.rec.cor === 'green').length;
        const investirMais = comAds.filter(r => r.rec.cor === 'purple').length;
        const oportunidades = tabelaDecisao.filter(r => r.rec.cor === 'cyan').length;
        return {
          gastoTotal, receitaTotalAds, mc2Total,
          eficiencia: receitaTotalAds > 0 ? (gastoTotal / receitaTotalAds * 100) : 0,
          vendasAdsTotal, vendasTotalAll,
          depMedia: vendasTotalAll > 0 ? (vendasAdsTotal / vendasTotalAll * 100) : 0,
          totalComAds: comAds.length, parar, reduzir, manter, bom, investirMais, oportunidades,
        };
      }, [tabelaDecisao]);

      // ── Sort handler ──
      function doSort(key) {
        if (sortKey === key) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
        else { setSortKey(key); setSortDir('desc'); }
      }
      function SortArrow({ col }) {
        if (sortKey !== col) return <span className="text-gge-border ml-0.5">↕</span>;
        return <span className="text-gge-accent ml-0.5">{sortDir === 'asc' ? '▲' : '▼'}</span>;
      }

      // ── Render ──
      if (error) return (
        <div className="p-6 max-w-7xl mx-auto">
          <div className="bg-red-900/30 border border-red-700 rounded-lg p-6 text-center">
            <p className="text-gge-red font-semibold mb-2">Erro ao carregar dados</p>
            <p className="text-gge-muted text-sm">{error}</p>
            <button onClick={loadData} className="mt-4 px-4 py-2 bg-gge-accent text-white rounded-lg text-sm">Tentar novamente</button>
          </div>
        </div>
      );

      return (
        <div className="p-4 md:p-6 max-w-[1500px] mx-auto fade-in">
          {showParams && <ParamsPanel params={params} setParams={setParams} onClose={() => setShowParams(false)} />}
          {/* Header */}
          <div className="mb-4">
            <h1 className="text-xl md:text-2xl font-bold text-gge-text">ADs — Decisão de Investimento</h1>
            <p className="text-sm text-gge-muted mt-1">Onde investir, onde parar, onde está o retorno</p>
          </div>

          {/* Filtros */}
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 mb-4 flex flex-wrap gap-3 items-end">
            <div>
              <label className="text-[10px] text-gge-muted uppercase tracking-wider block mb-1">Período</label>
              <select value={periodo} onChange={e => setPeriodo(e.target.value)}
                className="bg-gge-bg border border-gge-border rounded px-3 py-1.5 text-sm text-gge-text focus:border-gge-accent outline-none">
                {PERIODOS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] text-gge-muted uppercase tracking-wider block mb-1">Busca</label>
              <input type="text" placeholder="Título, SKU ou MLB..." value={search} onChange={e => setSearch(e.target.value)}
                className="bg-gge-bg border border-gge-border rounded px-3 py-1.5 text-sm text-gge-text focus:border-gge-accent outline-none w-56" />
            </div>
          </div>

          {loading ? (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              {[...Array(4)].map((_, i) => <div key={i} className="bg-gge-card border border-gge-border rounded-lg p-4"><div className="h-12 pulse-load bg-gge-border rounded"></div></div>)}
            </div>
          ) : (
            <>
              {/* KPI Cards — 4 essenciais */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div className="bg-gge-card border border-gge-border rounded-lg p-4">
                  <div className="text-[10px] text-gge-muted uppercase tracking-wider mb-1">Gasto Total em ADs</div>
                  <div className="text-lg font-bold text-gge-red">R$ {fmt(kpis.gastoTotal)}</div>
                  <div className="text-xs text-gge-muted mt-1">{kpis.totalComAds} anúncios com ADs</div>
                </div>
                <div className="bg-gge-card border border-gge-border rounded-lg p-4">
                  <div className="text-[10px] text-gge-muted uppercase tracking-wider mb-1">Gasto / Receita Total</div>
                  <div className="text-lg font-bold" style={{ color: kpis.eficiencia < 8 ? '#22c55e' : kpis.eficiencia < 15 ? '#eab308' : '#ef4444' }}>{fmtPct(kpis.eficiencia)}</div>
                  <div className="text-xs text-gge-muted mt-1">Quanto da receita vai para ADs</div>
                </div>
                <div className="bg-gge-card border border-gge-border rounded-lg p-4">
                  <div className="text-[10px] text-gge-muted uppercase tracking-wider mb-1">Dependência de ADs</div>
                  <div className="text-lg font-bold text-gge-orange">{fmtPct(kpis.depMedia)}</div>
                  <div className="text-xs text-gge-muted mt-1">{fmtInt(kpis.vendasAdsTotal)} de {fmtInt(kpis.vendasTotalAll)} vendas via ADs</div>
                </div>
                <div className="bg-gge-card border border-gge-border rounded-lg p-4">
                  <div className="text-[10px] text-gge-muted uppercase tracking-wider mb-1">MC2 (com ADs)</div>
                  <div className="text-lg font-bold" style={{ color: kpis.mc2Total >= 0 ? '#22c55e' : '#ef4444' }}>R$ {fmt(kpis.mc2Total)}</div>
                  <div className="text-xs text-gge-muted mt-1">Margem líquida dos anúncios com ADs</div>
                </div>
              </div>

              {/* Semáforo summary + filtro */}
              <div className="flex flex-wrap gap-2 mb-4 items-center">
                {[
                  { key: 'com_ads', label: `Todos (${kpis.totalComAds})`, color: 'gge-text' },
                  { key: 'parar', label: `🔴 Parar (${kpis.parar})`, color: 'gge-red' },
                  { key: 'reduzir', label: `🟡 Reduzir (${kpis.reduzir})`, color: 'gge-yellow' },
                  { key: 'manter', label: `🔵 Manter (${kpis.manter})`, color: 'gge-blue' },
                  { key: 'bom', label: `🟢 Investir+ (${kpis.bom})`, color: 'gge-green' },
                  { key: 'investirMais', label: `🟣 Investir++ (${kpis.investirMais})`, color: 'purple' },
                  { key: 'oportunidade', label: `💡 Oportunidade (${kpis.oportunidades})`, color: 'gge-cyan' },
                ].map(f => (
                  <button key={f.key}
                    onClick={() => setFiltroSinal(prev => prev === f.key ? 'all' : f.key)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium border transition-all ${
                      filtroSinal === f.key
                        ? 'bg-gge-accent/20 border-gge-accent text-white'
                        : 'bg-gge-card border-gge-border text-gge-muted hover:border-gge-accent/50'
                    }`}>
                    {f.label}
                  </button>
                ))}
                <button onClick={() => setShowParams(true)}
                  className="ml-auto px-3 py-1.5 rounded-full text-xs font-medium border border-gge-border text-gge-muted hover:border-gge-accent/50 hover:text-gge-text transition-all"
                  title="Calibrar parâmetros do semáforo">
                  ⚙️ Calibrar
                </button>
              </div>

              {/* ══ TABELA DE DECISÃO ══ */}
              <div className="bg-gge-card border border-gge-border rounded-lg overflow-hidden mb-6">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="text-gge-muted text-[10px] uppercase tracking-wider bg-gge-bg">
                        {[
                          { key: 'rec', label: 'Sinal', w: '60px' },
                          { key: 'titulo', label: 'Anúncio', w: '220px' },
                          { key: 'gasto', label: 'Investido' },
                          { key: 'receitaTotal', label: 'Receita Total' },
                          { key: 'gastoReceitaPct', label: 'Invest/Receita' },
                          { key: 'vendasTotal', label: 'Vendas' },
                          { key: 'vendasAds', label: 'Via ADs' },
                          { key: 'vendasOrg', label: 'Orgânicas' },
                          { key: 'depAds', label: 'Dep. ADs' },
                          { key: 'mc2', label: 'MC2' },
                          { key: 'adsMargPct', label: 'ADs/Margem' },
                          { key: 'acos', label: 'ACOS' },
                        ].map(col => (
                          <th key={col.key}
                            className="px-2 py-2.5 text-left cursor-pointer hover:text-gge-text transition-colors whitespace-nowrap"
                            style={col.w ? { width: col.w } : {}}
                            onClick={() => doSort(col.key)}>
                            {col.label}<SortArrow col={col.key} />
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {tabelaFiltrada.length === 0 ? (
                        <tr><td colSpan={12} className="text-center text-gge-muted py-8">Nenhum anúncio encontrado</td></tr>
                      ) : tabelaFiltrada.map((r, i) => {
                        const recColor = r.rec.cor === 'red' ? 'bg-red-900/10' : r.rec.cor === 'purple' ? 'bg-purple-900/10' : r.rec.cor === 'green' ? 'bg-green-900/10' : r.rec.cor === 'blue' ? 'bg-blue-900/10' : r.rec.cor === 'cyan' ? 'bg-cyan-900/10' : '';
                        return (
                          <tr key={r.mlb} className={`border-t border-gge-border/30 hover:bg-gge-accent/5 transition-colors ${recColor}`}>
                            <td className="px-2 py-2 text-center text-sm" title={r.rec.texto}>{r.rec.icon}</td>
                            <td className="px-2 py-2">
                              <div className="text-xs text-gge-text truncate max-w-[220px]" title={r.titulo}>{r.titulo}</div>
                              <div className="text-[10px] text-gge-muted font-mono">{r.sku}</div>
                            </td>
                            <td className="px-2 py-2 text-xs font-medium text-gge-red text-right">R$ {fmt(r.gasto)}</td>
                            <td className="px-2 py-2 text-xs text-right">{r.receitaTotal > 0 ? `R$ ${fmt(r.receitaTotal)}` : '—'}</td>
                            <td className="px-2 py-2 text-xs font-bold text-right" style={{
                              color: r.gastoReceitaPct === 0 ? '#94a3b8' : r.gastoReceitaPct < 8 ? '#22c55e' : r.gastoReceitaPct < 15 ? '#eab308' : '#ef4444'
                            }}>
                              {r.gasto > 0 ? (r.gastoReceitaPct >= 999 ? '∞' : fmtPct(r.gastoReceitaPct)) : '—'}
                            </td>
                            <td className="px-2 py-2 text-xs text-center font-medium">{fmtInt(r.vendasTotal)}</td>
                            <td className="px-2 py-2 text-xs text-center text-gge-cyan">{r.vendasAds > 0 ? fmtInt(r.vendasAds) : '—'}</td>
                            <td className="px-2 py-2 text-xs text-center text-gge-green">{r.vendasOrg > 0 ? fmtInt(r.vendasOrg) : '—'}</td>
                            <td className="px-2 py-2 text-xs text-right" style={{
                              color: r.depAds === 0 ? '#94a3b8' : r.depAds > 70 ? '#ef4444' : r.depAds > 40 ? '#eab308' : '#22c55e'
                            }}>
                              {r.vendasTotal > 0 ? fmtPct(r.depAds) : '—'}
                            </td>
                            <td className="px-2 py-2 text-xs font-medium text-right" style={{ color: r.mc2 >= 0 ? '#22c55e' : '#ef4444' }}>
                              {r.mc2 !== 0 ? `R$ ${fmt(r.mc2)}` : '—'}
                            </td>
                            <td className="px-2 py-2 text-xs text-right" style={{
                              color: r.adsMargPct === 0 ? '#94a3b8' : r.adsMargPct < 20 ? '#22c55e' : r.adsMargPct < 50 ? '#eab308' : '#ef4444'
                            }}>
                              {r.gasto > 0 && r.mc2SemAds > 0 ? fmtPct(r.adsMargPct) : '—'}
                            </td>
                            <td className="px-2 py-2 text-xs text-right" style={{
                              color: r.acos == null ? '#94a3b8' : r.acos < 8 ? '#22c55e' : r.acos < 15 ? '#eab308' : '#ef4444'
                            }}>
                              {r.acos != null ? fmtPct(r.acos) : '—'}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="px-3 py-2 bg-gge-bg/50 border-t border-gge-border text-xs text-gge-muted">
                  {tabelaFiltrada.length} anúncio(s) — {filtroSinal !== 'all' ? `filtro: ${filtroSinal}` : 'todos'}
                </div>
              </div>

              {/* Legenda */}
              <div className="bg-gge-card border border-gge-border rounded-lg p-4 mb-8">
                <h3 className="text-xs font-bold text-gge-muted uppercase tracking-wider mb-3">Como interpretar</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2 text-xs text-gge-muted">
                  <div>
                    <p className="mb-2"><strong className="text-gge-text">Invest/Receita</strong> — de cada R$ 100 de receita, quanto foi gasto em ADs. <span className="text-gge-green">{'<'}8% bom</span> · <span className="text-gge-yellow">8-15% atenção</span> · <span className="text-gge-red">{'>'}15% alto</span></p>
                    <p className="mb-2"><strong className="text-gge-text">Dep. ADs</strong> — % das vendas que vieram via ADs. <span className="text-gge-green">{'<'}40% saudável</span> · <span className="text-gge-yellow">40-70% dependente</span> · <span className="text-gge-red">{'>'}70% viciado</span></p>
                    <p><strong className="text-gge-text">ADs/Margem</strong> — quanto do lucro bruto (sem ads) é consumido pelo gasto em ADs. <span className="text-gge-green">{'<'}20% eficiente</span> · <span className="text-gge-red">{'>'}50% inviável</span></p>
                  </div>
                  <div>
                    <p className="mb-2">🔴 <strong className="text-gge-red">Parar</strong> — gasto alto sem conversão ou margem muito negativa. Pausar campanha.</p>
                    <p className="mb-2">🟡 <strong className="text-gge-yellow">Reduzir</strong> — retorno insuficiente para o nível de gasto atual. Diminuir lance/orçamento.</p>
                    <p className="mb-2">🔵 <strong className="text-gge-blue">Manter</strong> — performance aceitável. Manter investimento atual e monitorar.</p>
                    <p className="mb-2">🟢 <strong className="text-gge-green">Investir Mais</strong> — bom retorno. Considerar aumentar o investimento.</p>
                    <p className="mb-2">🟣 <strong style={{color:'#a855f7'}}>Investir Bem Mais</strong> — excelente eficiência. Prioridade máxima para aumento de orçamento.</p>
                    <p>💡 <strong className="text-gge-cyan">Oportunidade</strong> — produto com vendas orgânicas sem ADs. Potencial para testar campanha.</p>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdsPage />);
  </script>
</body>
</html>
