      const [pontoSel, setPontoSel] = useState('');
      const [idadeSel, setIdadeSel] = useState('');
      const [topMode, setTopMode] = useState('lucro');
      const [drillMlb, setDrillMlb] = useState(null);
      const [drillTitulo, setDrillTitulo] = useState('');
      const [visitasGrowth, setVisitasGrowth] = useState(null);
      const [rpcTotals, setRpcTotals] = useState(null);

      // Fetch data
      useEffect(() => {
        async function load() {
          setLoading(true);
          setError(null);
          try {
            const [margemRes, saldoRes] = await Promise.all([
              supabase.from('vw_margem_segmentada').select('*').order('mes', { ascending: false }),
              supabase.from('vw_saldo_vendas').select('*').order('mes', { ascending: false })
            ]);
            if (margemRes.error) throw margemRes.error;
            const data = margemRes.data || [];
            setRawData(data);
            setSaldoData(saldoRes.data || []);

            const ms = [...new Set(data.map(d => d.mes))].sort((a,b) => b.localeCompare(a));
            const cs = [...new Set(data.map(d => d.conta_nome))].sort();
            setMeses(ms);
            setContas(cs);
          } catch (e) {
            setError(e.message || 'Erro ao carregar dados');
          }
          setLoading(false);
        }
        load();
      }, []);

      // Fetch RPC totals for accurate period-based KPI cards
      useEffect(() => {
        async function loadRPC() {
          try {
            const range = getDateRangeISO(periodoSel);
            // Find conta_id from conta_nome
            let contaId = null;
            if (contaSel) {
              const CONTA_NAME_TO_ID = {
                'GGE-GRAMPEADORES': 'e761652f-07fa-49d2-a6c7-1b738862ab08',
                'GGESP': '304d2ad4-a3e7-449b-9073-1b7d54cbfa0c',
                'TOOWCOMERCIAL': '8284ee61-87f9-4162-9f1f-542587fbbf53'
              };
              contaId = CONTA_NAME_TO_ID[contaSel] || null;
            }
            const { data, error } = await supabase.rpc('rpc_dashboard_totais', {
              p_from: range.from,
              p_to: range.to,
              p_conta_id: contaId,
              p_status: null,
              p_tipo_listagem: tipoSel || null,
              p_em_catalogo: catSel ? (catSel === 'Catálogo') : null,
              p_modo_logistica: modeSel || null,
              p_fornecedor_id: null
            });
            if (error) throw error;
            setRpcTotals(data);
          } catch (e) {
            console.error('RPC error:', e);
            setRpcTotals(null);
          }
        }
        loadRPC();
      }, [periodoSel, contaSel, tipoSel, modeSel, catSel]);

      // Fetch visitas growth data when mode changes to crescimento_visitas
      useEffect(() => {
        if (topMode !== 'crescimento_visitas' || visitasGrowth) return;
        async function loadVisitas() {
          try {
            const today = new Date();
            const thirtyAgo = new Date(today.getTime() - 30 * 86400000).toISOString().split('T')[0];
            const sixtyAgo = new Date(today.getTime() - 60 * 86400000).toISOString().split('T')[0];
            const todayISO = today.toISOString().split('T')[0];

            const [curRes, prevRes] = await Promise.all([
              supabase.from('desempenho_diario').select('mlb_id,visitas').gte('data_referencia', thirtyAgo).lte('data_referencia', todayISO),
              supabase.from('desempenho_diario').select('mlb_id,visitas').gte('data_referencia', sixtyAgo).lt('data_referencia', thirtyAgo)
            ]);

            const map = {};
            (curRes.data || []).forEach(r => {
              if (!map[r.mlb_id]) map[r.mlb_id] = { cur: 0, prev: 0 };
              map[r.mlb_id].cur += Number(r.visitas) || 0;
            });
            (prevRes.data || []).forEach(r => {
              if (!map[r.mlb_id]) map[r.mlb_id] = { cur: 0, prev: 0 };
              map[r.mlb_id].prev += Number(r.visitas) || 0;
            });
            setVisitasGrowth(map);
          } catch (e) {
            console.error('Erro ao carregar visitas:', e);
            setVisitasGrowth({});
          }
        }
        loadVisitas();
      }, [topMode, visitasGrowth]);

      // Active months for the selected period
      const activeMeses = useMemo(() => getMesesForPeriodo(periodoSel, meses), [periodoSel, meses]);

      // Period label for header
      const periodoLabel = useMemo(() => {
        const opt = PERIODO_OPTIONS.find(p => p.value === periodoSel);
        if (!opt) return '';
        if (activeMeses.length === 1) return fmtMes(activeMeses[0]);
        if (activeMeses.length > 1) return `${fmtMes(activeMeses[activeMeses.length - 1])} a ${fmtMes(activeMeses[0])}`;
        return opt.label;
      }, [periodoSel, activeMeses]);

      // Filtered data
      const filtered = useMemo(() => {
        return rawData.filter(d => {
          if (!activeMeses.includes(d.mes)) return false;
          if (contaSel && d.conta_nome !== contaSel) return false;
          if (tipoSel && d.tipo_listagem !== tipoSel) return false;
          if (modeSel && d.modo_logistica !== modeSel) return false;
          if (kitSel && d.kit_produto !== kitSel) return false;
          if (catSel && d.catalogo_anuncio !== catSel) return false;
          if (fornSel && d.fornecedor !== fornSel) return false;
          if (pontoSel && d.ponto_saida !== pontoSel) return false;
          if (idadeSel && d.idade_anuncio !== idadeSel) return false;
          return true;
        });
      }, [rawData, activeMeses, contaSel, tipoSel, modeSel, kitSel, catSel, fornSel, pontoSel, idadeSel]);

      // Totals — MC1 = c/ DIFAL (margem final), MC2 = s/ DIFAL
      const totals = useMemo(() => {
        const t = { anuncios: 0, vendas: 0, receita: 0, margem: 0, ads: 0, frete: 0, custo: 0, comissao: 0, difal: 0, prejuizo_count: 0 };
        filtered.forEach(d => {
          t.anuncios++;
          t.vendas += Number(d.qtd_vendas) || 0;
          t.receita += Number(d.receita) || 0;
          t.margem += Number(d.margem_valor) || 0;
          t.ads += Number(d.custo_ads) || 0;
          t.frete += Number(d.custo_frete) || 0;
          t.custo += Number(d.custo_produto) || 0;
          t.comissao += Number(d.comissao) || 0;
          t.difal += Number(d.difal_reserva) || 0;
          if (Number(d.margem_valor) < 0) t.prejuizo_count++;
        });
        t.mc1 = t.margem;                    // MC1 = margem final (c/ DIFAL)
        t.mc2 = t.margem + t.difal;          // MC2 = margem antes do DIFAL (s/ DIFAL)
        t.mc1_pct = t.receita > 0 ? (t.mc1 / t.receita * 100) : 0;
        t.mc2_pct = t.receita > 0 ? (t.mc2 / t.receita * 100) : 0;
        t.ticket = t.vendas > 0 ? (t.receita / t.vendas) : 0;
        return t;
      }, [filtered]);

      // Unique filter options
      const filterOpts = useMemo(() => {
        const mesData = rawData.filter(d => activeMeses.includes(d.mes));
        return {
          tipos: [...new Set(mesData.map(d => d.tipo_listagem))].sort(),
          modos: [...new Set(mesData.map(d => d.modo_logistica))].sort(),
          kits: [...new Set(mesData.map(d => d.kit_produto))].sort(),
          cats: [...new Set(mesData.map(d => d.catalogo_anuncio))].sort(),
          forns: [...new Set(mesData.map(d => d.fornecedor))].sort(),
          pontos: [...new Set(mesData.map(d => d.ponto_saida))].sort(),
          idades: sortIdades([...new Set(mesData.map(d => d.idade_anuncio))]),
        };
      }, [rawData, activeMeses]);

      // Cancel totals for selected period
      const cancelTotals = useMemo(() => {
        const rows = saldoData.filter(d => {
          if (!activeMeses.includes(d.mes)) return false;
          if (contaSel && d.conta_nome !== contaSel) return false;
          return true;
        });
        const t = { bruto: 0, cancelado: 0, liquido: 0, qtd_vendas: 0, qtd_cancel: 0, qtd_refund: 0, refund_valor: 0 };
        rows.forEach(r => {
          t.bruto += Number(r.faturamento_bruto) || 0;
          t.cancelado += Number(r.cancelamentos) || 0;
          t.qtd_vendas += Number(r.qtd_vendas) || 0;
          t.qtd_cancel += Number(r.qtd_cancelamentos) || 0;
          t.qtd_refund += Number(r.qtd_parcial_refund) || 0;
          t.refund_valor += Number(r.valor_parcial_refund_original) || 0;
        });
        t.liquido = t.bruto;
        t.vendas_brutas = t.bruto + t.cancelado;
        t.pct = t.vendas_brutas > 0 ? (t.cancelado / t.vendas_brutas * 100) : 0;
        return t;
      }, [saldoData, activeMeses, contaSel]);

      if (error) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="bg-gge-card border border-red-500/30 rounded-xl p-8 max-w-md text-center">
              <div className="text-4xl mb-4">&#9888;&#65039;</div>
              <h2 className="text-xl font-bold text-white mb-2">Erro ao carregar</h2>
              <p className="text-gge-muted text-sm">{error}</p>
              <button onClick={() => window.location.reload()}
                      className="mt-4 px-4 py-2 bg-gge-accent text-white rounded-lg text-sm hover:bg-gge-accent/80 transition-colors">
                Tentar novamente
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="border-b border-gge-border bg-gge-card/50 backdrop-blur-sm sticky top-0 z-50">
            <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gge-accent rounded-xl flex items-center justify-center text-white font-bold text-lg">G</div>
                <div>
                  <h1 className="text-lg font-bold text-white tracking-tight">Controle Total GGE</h1>
                  <p className="text-xs text-gge-muted">Painel de Margem de Contribuição</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                {periodoLabel && <span className="text-sm text-gge-muted">Dados: <span className="text-white font-medium">{periodoLabel}</span></span>}
                <a href="index.html" className="flex items-center gap-2 px-3 py-1.5 bg-gge-green/15 border border-gge-green/30 rounded-lg text-gge-green hover:bg-gge-green/25 transition-all text-sm font-medium" title="Voltar ao Dashboard">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                  Dashboard
                </a>
                <a href="saude.html" className="flex items-center gap-2 px-3 py-1.5 bg-gge-accent/15 border border-gge-accent/30 rounded-lg text-gge-accent hover:bg-gge-accent/25 transition-all text-sm font-medium" title="Saúde do Banco">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                  Saúde
                </a>
                <div className="w-2 h-2 rounded-full bg-gge-green animate-pulse" title="Conectado ao Supabase"></div>
              </div>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto px-6 py-6 space-y-6">
            {/* Filters */}
            <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-sm font-semibold text-white">Filtros</span>
                <span className="text-xs text-gge-muted">({fmtInt(filtered.length)} anúncios)</span>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-10 gap-3">
                <FilterSelect label="Período" value={periodoSel} onChange={setPeriodoSel}
                              options={PERIODO_OPTIONS.map(p => p.value)}
                              allLabel="Todo o período"
                              labelFn={v => PERIODO_OPTIONS.find(p => p.value === v)?.label || v}
                              isActive={periodoSel !== '30d'} />
                <FilterSelect label="Conta" value={contaSel} onChange={setContaSel} options={contas} isActive={!!contaSel} />
                <FilterSelect label="Listagem" value={tipoSel} onChange={setTipoSel} options={filterOpts.tipos} labelFn={labelTipo} isActive={!!tipoSel} />
                <FilterSelect label="Logística" value={modeSel} onChange={setModeSel} options={filterOpts.modos} isActive={!!modeSel} />
                <FilterSelect label="Tipo" value={kitSel} onChange={setKitSel} options={filterOpts.kits} isActive={!!kitSel} />
                <FilterSelect label="Catálogo" value={catSel} onChange={setCatSel} options={filterOpts.cats} isActive={!!catSel} />
                <FilterSelect label="Fornecedor" value={fornSel} onChange={setFornSel} options={filterOpts.forns} isActive={!!fornSel} />
                <FilterSelect label="Pto Saída" value={pontoSel} onChange={setPontoSel} options={filterOpts.pontos} isActive={!!pontoSel} />
                <FilterSelect label="Idade" value={idadeSel} onChange={setIdadeSel} options={filterOpts.idades} isActive={!!idadeSel} />
                <div className="flex items-end">
                  <button onClick={() => { setPeriodoSel('30d'); setContaSel(''); setTipoSel(''); setModeSel(''); setKitSel(''); setCatSel(''); setFornSel(''); setPontoSel(''); setIdadeSel(''); }}
                          className="w-full px-3 py-2 text-sm text-gge-muted border border-gge-border rounded-lg hover:bg-white/5 transition-colors">
                    Limpar
                  </button>
                </div>
              </div>
            </div>

            {loading ? (
              <div className="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-4">
                {[...Array(10)].map((_, i) => <Skeleton key={i} className="h-28" />)}
              </div>
            ) : (
              <>
                {/* Vendas Brutas vs Cancelamentos — uses RPC when available */}
                {(() => {
                  const hasRpc = !!rpcTotals;
                  const r = rpcTotals || {};
                  const qtdEfetivas = hasRpc ? (r.vendas_efetivas || 0) : cancelTotals.qtd_vendas;
                  const qtdCancel = hasRpc ? (r.vendas_canceladas || 0) : cancelTotals.qtd_cancel;
                  const valorCancel = hasRpc ? (r.valor_cancelamentos || 0) : cancelTotals.cancelado;
                  const receita = hasRpc ? (r.receita || 0) : cancelTotals.liquido;
                  const vendasBrutas = receita + valorCancel;
                  const qtdTotal = qtdEfetivas + qtdCancel;
                  const pctCancel = hasRpc ? (r.taxa_cancelamento_pct || 0) : cancelTotals.pct;
                  const qtdRefund = cancelTotals.qtd_refund;
                  const refundValor = cancelTotals.refund_valor;

                  if (qtdCancel <= 0 && qtdRefund <= 0) return null;
                  return (
                  <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
                    <div className="flex items-center gap-2 mb-4">
                      <span className="text-lg font-semibold text-white">Vendas Brutas vs Cancelamentos</span>
                      <span className="text-xs text-gge-muted">(status das ordens no ML)</span>
                    </div>
                    <div className={`grid grid-cols-1 gap-4 items-center ${qtdRefund > 0 ? 'md:grid-cols-7' : 'md:grid-cols-5'}`}>
                      <div className="text-center">
                        <div className="text-gge-muted text-xs uppercase tracking-wider mb-1">Vendas Brutas</div>
                        <div className="text-xl font-bold text-white">R$ {fmt(vendasBrutas)}</div>
                        <div className="text-gge-muted text-xs">{fmtInt(qtdTotal)} ordens</div>
                      </div>
                      <div className="text-center text-gge-muted text-2xl hidden md:block">→</div>
                      <div className="text-center">
                        <div className="text-gge-muted text-xs uppercase tracking-wider mb-1">Cancelamentos</div>
                        <div className="text-xl font-bold text-gge-red">- R$ {fmt(valorCancel)}</div>
                        <div className="text-gge-red text-xs">{fmtInt(qtdCancel)} ordens ({fmtPct(pctCancel)})</div>
                      </div>
                      <div className="text-center text-gge-muted text-2xl hidden md:block">→</div>
                      <div className="text-center">
                        <div className="text-gge-muted text-xs uppercase tracking-wider mb-1">Vendas Realizadas</div>
                        <div className="text-xl font-bold text-gge-green">R$ {fmt(receita)}</div>
                        <div className="text-gge-green text-xs">{fmtInt(qtdEfetivas)} ordens efetivas</div>
                      </div>
                      {qtdRefund > 0 && (
                        <>
                          <div className="text-center text-gge-muted text-2xl hidden md:block">↵</div>
                          <div className="text-center">
                            <div className="text-gge-muted text-xs uppercase tracking-wider mb-1">Devoluções Parciais</div>
                            <div className="text-xl font-bold text-gge-yellow">R$ {fmt(refundValor)}</div>
                            <div className="text-gge-yellow text-xs">{fmtInt(qtdRefund)} devoluções</div>
                          </div>
                        </>
                      )}
                    </div>
                    {/* Visual proportion bar */}
                    <div className="mt-4 h-3 rounded-full bg-gge-border overflow-hidden flex">
                      <div className="bg-gge-green h-full rounded-l-full transition-all" style={{ width: `${100 - pctCancel}%` }} />
                      <div className="bg-gge-red h-full rounded-r-full transition-all" style={{ width: `${pctCancel}%` }} />
                    </div>
                    <div className="flex justify-between mt-1 text-xs text-gge-muted">
                      <span>Realizadas ({fmtPct(100 - pctCancel)})</span>
                      <span>Canceladas ({fmtPct(pctCancel)})</span>
                    </div>
                  </div>
                  );
                })()}

                {/* KPI Cards — uses RPC for accurate period data, fallback to view totals */}
                {(() => {
                  const r = rpcTotals || {};
                  const hasRpc = !!rpcTotals;
                  const rec = hasRpc ? (r.receita || 0) : totals.receita;
                  const custo = hasRpc ? (r.custo_produto || 0) : totals.custo;
                  const comissao = hasRpc ? (r.comissao_ml || 0) : totals.comissao;
                  const frete = hasRpc ? (r.frete || 0) : totals.frete;
                  const ads = hasRpc ? (r.ads || 0) : totals.ads;
                  const mc1 = hasRpc ? (r.mc1_valor || 0) : totals.mc1;
                  const mc1_pct = hasRpc ? (r.mc1_pct || 0) : totals.mc1_pct;
                  const difal = hasRpc ? (r.difal_valor || 0) : totals.difal;
                  const mc2 = hasRpc ? (r.mc2_valor || 0) : totals.mc2;
                  const mc2_pct = hasRpc ? (r.mc2_pct || 0) : totals.mc2_pct;
                  const ticket = hasRpc ? (r.ticket_medio || 0) : totals.ticket;
                  const vendas = hasRpc ? (r.vendas_efetivas || 0) : totals.vendas;
                  return (
                    <div className="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-4">
                      <MetricCard label="Receita" value={`R$ ${fmt(rec)}`} icon="💰" />
                      <MetricCard label="Custo Produto" value={`R$ ${fmt(custo)}`}
                                  sub={rec > 0 ? `${fmtPct(custo/rec*100)} da receita` : ''} icon="📦" />
                      <MetricCard label="Comissão ML" value={`R$ ${fmt(comissao)}`}
                                  sub={rec > 0 ? `${fmtPct(comissao/rec*100)} da receita` : ''} icon="🏆" />
                      <MetricCard label="Frete" value={`R$ ${fmt(frete)}`}
                                  sub={rec > 0 ? `${fmtPct(frete/rec*100)} da receita` : ''} icon="🚚" />
                      <MetricCard label="ADs" value={`R$ ${fmt(ads)}`} color="text-gge-yellow"
                                  sub={rec > 0 ? `${fmtPct(ads/rec*100)} da receita` : ''} icon="📢" />
                      <MetricCard label="MC1 (c/ DIFAL)" value={`R$ ${fmt(mc1)}`}
                                  color={mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}
                                  sub={`${fmtPct(mc1_pct)} da receita`} icon="🏅" />
                      <MetricCard label="DIFAL" value={`R$ ${fmt(difal)}`} color="text-gge-orange"
                                  sub={rec > 0 ? `${fmtPct(difal/rec*100)} da receita` : ''} icon="🍰" />
                      <MetricCard label="MC2 (s/ DIFAL)" value={`R$ ${fmt(mc2)}`}
                                  color={mc2 >= 0 ? 'text-gge-green' : 'text-gge-red'}
                                  sub={`${fmtPct(mc2_pct)} da receita`} icon="📊" />
                      <MetricCard label="Ticket Médio" value={`R$ ${fmt(ticket)}`}
                                  sub={`${fmtInt(vendas)} vendas`} icon="🍕" />
                      <MetricCard label="Vendas" value={fmtInt(vendas)}
                                  sub={`${fmtInt(totals.prejuizo_count)} em prejuízo`} icon="🛒" />
                    </div>
                  );
                })()}

                {/* Charts Row */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                  <div className="lg:col-span-2">
                    <GroupsChart data={filtered} />
                  </div>
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Receita por Conta" field="conta_nome" />
                </div>

                {/* Groups Table */}
                <GroupsSummary data={filtered} />

                {/* Alerts Panel — 2×2 grid */}
                <AlertsPanel data={filtered} />

                {/* Evolution + Curva ABC */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <EvolutionChart rawData={rawData} allMeses={meses} />
                  <CurvaABC data={filtered} />
                </div>

                {/* Distribution charts */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Fornecedor" field="fornecedor" />
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Tipo Listagem" field="tipo_listagem" labelFn={labelTipo} />
                  <DistributionPie data={filtered.filter(d => Number(d.receita) > 0)} title="Por Logística" field="modo_logistica" />
                </div>

                {/* Top Anúncios */}
                <div>
                  <div className="flex items-center gap-4 mb-3">
                    <h3 className="text-lg font-semibold text-white">Top 10 Anúncios</h3>
                    <div className="flex gap-1">
                      {[['lucro', 'Maior Lucro'], ['prejuizo', 'Maior Prejuízo'], ['receita', 'Maior Receita'], ['crescimento_vendas', '📈 Cresc. Vendas 30d'], ['crescimento_visitas', '👁 Cresc. Visitas 30d']].map(([k, label]) => (
                        <button key={k} onClick={() => setTopMode(k)}
                                className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${topMode === k ? 'bg-gge-accent text-white' : 'bg-gge-card border border-gge-border text-gge-muted hover:text-white'}`}>
                          {label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <TopAnuncios data={filtered} allData={rawData} visitasData={visitasGrowth} mode={topMode} totals={totals} onDrill={(mlb, titulo) => { setDrillMlb(mlb); setDrillTitulo(titulo); }} />
                </div>

                {/* Drilldown Modal */}
                {drillMlb && (
                  <DrilldownModal mlbId={drillMlb} titulo={drillTitulo} data={filtered}
                    onClose={() => { setDrillMlb(null); setDrillTitulo(''); }} />
                )}

                {/* Footer — fórmulas atualizadas MC1/MC2 */}
                <div className="text-center text-gge-muted text-xs py-8 border-t border-gge-border space-y-1">
                  <p className="font-medium text-gge-text">Controle Total GGE — Dados do Supabase em tempo real</p>
                  <p><strong>MC2</strong> = Receita - Comissão - Frete - Custo Produto - ADs - PIS/COFINS(9,25%) + Créditos PIS/COFINS(9,25%) - Simples(8,65% TOOW)</p>
                  <p><strong>MC1</strong> = MC2 - DIFAL (alíq. interna destino - alíq. interestadual, por UF, apenas GGE)</p>
                </div>
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
