<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Total GGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 1rem; max-width: 1100px; width: 95%; max-height: 85vh; overflow-y: auto; }
    .alert-pulse { animation: alertPulse 2s ease-in-out infinite; }
    @keyframes alertPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    .row-clickable { cursor: pointer; }
    .row-clickable:hover { background: rgba(99, 102, 241, 0.1) !important; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: white; padding: 12px 16px; border-radius: 8px; font-size: 12px; z-index: 999; animation: toastSlideIn 0.3s ease-out; }
    @keyframes toastSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .toast.fade-out { animation: toastFadeOut 0.3s ease-in forwards; }
    @keyframes toastFadeOut { from { opacity: 1; } to { opacity: 0; } }
    .expandable-row { cursor: pointer; }
    .expandable-row:hover { background: rgba(99, 102, 241, 0.08); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gge-bg': '#0f1117',
            'gge-card': '#1a1d2e',
            'gge-border': '#2a2d3e',
            'gge-text': '#e2e8f0',
            'gge-muted': '#94a3b8',
            'gge-accent': '#6366f1',
            'gge-green': '#22c55e',
            'gge-red': '#ef4444',
            'gge-yellow': '#eab308',
            'gge-orange': '#f97316',
            'gge-cyan': '#22d3ee',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-load { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d2e; }
    ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d4e; }
    .filter-active select { border-color: #6366f1 !important; color: #fff !important; font-weight: 600; }

    /* Sidebar */
    .sidebar {
      position: fixed; left: 0; top: 0; height: 100vh; width: 48px;
      background-color: #0a0e14; border-right: 1px solid #2a2d3a;
      padding: 20px 0; transition: width 0.3s ease; z-index: 1000;
      overflow-y: auto; overflow-x: hidden;
    }
    .sidebar:hover { width: 250px; }
    .sidebar-header { display: flex; align-items: center; padding: 0 12px; margin-bottom: 30px; min-height: 40px; }
    .sidebar-logo { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-logo-text { font-weight: 700; font-size: 20px; color: #58a6ff; }
    .sidebar-logo-sub { font-size: 10px; color: #8b949e; line-height: 1; }
    .sidebar:not(:hover) .sidebar-logo-sub { display: none; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; color: #f0c040; text-decoration: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-size: 14px; font-weight: bold; }
    .nav-item:hover { background-color: #161b22; }
    .nav-item.active { background-color: #58a6ff; color: #0f1117; }
    .nav-item-icon { display: flex; align-items: center; justify-content: center; min-width: 20px; }
    .sidebar:not(:hover) .nav-item-label { display: none; }
    .main-with-sidebar { margin-left: 48px; min-height: 100vh; }
  </style>
<script src="auth.js" defer></script>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="sidebar-logo-text">GGE</span>
        <span class="sidebar-logo-sub">Controle Total</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><span class="nav-item-icon">📊</span><span class="nav-item-label">Dashboard</span></a>
      <a href="/margem" class="nav-item active"><span class="nav-item-icon">📈</span><span class="nav-item-label">Margem</span></a>
      <a href="/precificacao" class="nav-item"><span class="nav-item-icon">🏷️</span><span class="nav-item-label">Precificação</span></a>
      <a href="/saude" class="nav-item"><span class="nav-item-icon">💪</span><span class="nav-item-label">Saúde</span></a>
      <a href="/avaliacao" class="nav-item"><span class="nav-item-icon">⭐</span><span class="nav-item-label">Avaliação</span></a>
    </nav>
  </div>

  <!-- Main content with sidebar offset -->
  <div class="main-with-sidebar">
    <div id="root"></div>
  </div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;
    const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend, ComposedChart, Area, ReferenceLine } = Recharts;

    // ── Supabase Client ──
    const SUPABASE_URL = 'https://opceujqpqyvxsatzdarg.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wY2V1anFwcXl2eHNhdHpkYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzIwMDEsImV4cCI6MjA4OTA0ODAwMX0.XKhgaNBJF8xiHiGEWEs8HL1dq5KFJpo2_RQckjsY9kc';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Helpers ──
    const fmt = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtInt = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR');
    const fmtPct = (v) => v == null ? '—' : Number(v).toFixed(1) + '%';
    const fmtMes = (m) => { const d = new Date(m + 'T12:00:00'); return d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' }); };

    // ── Grupo config com L7 e L8 ──
    const GRUPO_COLORS = {
      P1: '#ef4444', P2: '#f97316', P3: '#a855f7',
      L1: '#fbbf24', L2: '#a3e635', L3: '#4ade80',
      L4: '#22d3ee', L5: '#3b82f6', L6: '#6366f1',
      L7: '#8b5cf6', L8: '#ec4899'
    };
    const GRUPO_LABELS = {
      P1: 'P1 — Prejuízo estrutural', P2: 'P2 — Prejuízo por ADs',
      P3: 'P3 — Só ADs, sem vendas',
      L1: 'L1 — 0-5%', L2: 'L2 — 5-10%', L3: 'L3 — 10-15%',
      L4: 'L4 — 15-20%', L5: 'L5 — 20-25%', L6: 'L6 — 25-30%',
      L7: 'L7 — 30-40%', L8: 'L8 — >40%'
    };
    const GRUPO_ORDER = ['P1','P2','P3','L1','L2','L3','L4','L5','L6','L7','L8'];

    const TIPO_LISTAGEM_LABELS = {
      'gold_special': 'Premium',
      'gold_pro': 'Clássico',
      'Desconhecido': 'Desconhecido'
    };
    const labelTipo = (t) => TIPO_LISTAGEM_LABELS[t] || t;

    // ── Período config ──
    const PERIODO_OPTIONS = [
      { value: '7d', label: '7 dias' },
      { value: '15d', label: '15 dias' },
      { value: '30d', label: '30 dias' },
      { value: 'mes_passado', label: 'Mês passado' },
      { value: '2m_atras', label: '2 meses atrás' },
      { value: '3m_atras', label: '3 meses atrás' },
      { value: '90d', label: '90 dias' },
      { value: '180d', label: '180 dias' },
      { value: '1a', label: '1 ano' },
    ];

    // Date range for RPC calls (same logic as Dashboard)
    function getDateRangeISO(periodo) {
      const today = new Date();
      const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
      let from, to = new Date(today);
      switch (periodo) {
        case '7d': from = new Date(today); from.setDate(d - 7); break;
        case '15d': from = new Date(today); from.setDate(d - 15); break;
        case '30d': from = new Date(today); from.setDate(d - 30); break;
        case 'mes_atual': from = new Date(y, m, 1); to = new Date(y, m + 1, 0); break;
        case 'mes_passado': from = new Date(y, m - 1, 1); to = new Date(y, m, 0); break;
        case '2m_atras': from = new Date(y, m - 2, 1); to = new Date(y, m - 1, 0); break;
        case '3m_atras': from = new Date(y, m - 3, 1); to = new Date(y, m - 2, 0); break;
        case '90d': from = new Date(today); from.setDate(d - 90); break;
        case '180d': from = new Date(today); from.setDate(d - 180); break;
        case '1a': from = new Date(today); from.setFullYear(y - 1); break;
        default: from = new Date(today); from.setDate(d - 30);
      }
      return { from: from.toISOString(), to: to.toISOString() };
    }

    function getMesesForPeriodo(periodo, allMeses) {
      if (!allMeses.length) return [];
      const sorted = [...allMeses].sort((a,b) => b.localeCompare(a));
      const today = new Date();
      const toYM = (d) => d.toISOString().slice(0, 7);
      const mYM = (m) => String(m).slice(0, 7);

      switch (periodo) {
        case '7d': case '15d': case '30d': {
          const days = periodo === '7d' ? 7 : periodo === '15d' ? 15 : 30;
          const cutoff = new Date(today);
          cutoff.setDate(cutoff.getDate() - days);
          const cutoffYM = toYM(cutoff);
          const todayYM = toYM(today);
          return sorted.filter(m => mYM(m) >= cutoffYM && mYM(m) <= todayYM);
        }
        case 'mes_passado': {
          const d = new Date(today.getFullYear(), today.getMonth() - 1, 1);
          const ym = toYM(d);
          return sorted.filter(m => mYM(m) === ym);
        }
        case '2m_atras': {
          const d = new Date(today.getFullYear(), today.getMonth() - 2, 1);
          const ym = toYM(d);
          return sorted.filter(m => mYM(m) === ym);
        }
        case '3m_atras': {
          const d = new Date(today.getFullYear(), today.getMonth() - 3, 1);
          const ym = toYM(d);
          return sorted.filter(m => mYM(m) === ym);
        }
        case '90d': {
          const cutoff = new Date(today);
          cutoff.setDate(cutoff.getDate() - 90);
          const cutoffYM = toYM(cutoff);
          return sorted.filter(m => mYM(m) >= cutoffYM);
        }
        case '180d': {
          const cutoff = new Date(today);
          cutoff.setDate(cutoff.getDate() - 180);
          const cutoffYM = toYM(cutoff);
          return sorted.filter(m => mYM(m) >= cutoffYM);
        }
        case '1a': {
          const cutoff = new Date(today);
          cutoff.setFullYear(cutoff.getFullYear() - 1);
          const cutoffYM = toYM(cutoff);
          return sorted.filter(m => mYM(m) >= cutoffYM);
        }
        default:
          return sorted.slice(0, 1);
      }
    }

    // ── Get date range for period ──
    function getDateRangeForPeriodo(periodo) {
      const today = new Date();
      const toDate = new Date(today);
      let fromDate = new Date(today);

      if (periodo === '7d') fromDate.setDate(fromDate.getDate() - 7);
      else if (periodo === '15d') fromDate.setDate(fromDate.getDate() - 15);
      else if (periodo === '30d') fromDate.setDate(fromDate.getDate() - 30);
      else if (periodo === '90d') fromDate.setDate(fromDate.getDate() - 90);
      else if (periodo === '180d') fromDate.setDate(fromDate.getDate() - 180);
      else if (periodo === '1a') fromDate.setFullYear(fromDate.getFullYear() - 1);
      else if (periodo === 'mes_passado') {
        const d = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        fromDate = new Date(d);
        toDate.setDate(0);
      } else if (periodo === '2m_atras') {
        const d = new Date(today.getFullYear(), today.getMonth() - 2, 1);
        fromDate = new Date(d);
        toDate = new Date(today.getFullYear(), today.getMonth() - 1, 0);
      } else if (periodo === '3m_atras') {
        const d = new Date(today.getFullYear(), today.getMonth() - 3, 1);
        fromDate = new Date(d);
        toDate = new Date(today.getFullYear(), today.getMonth() - 2, 0);
      }

      return {
        from: fromDate.toISOString().split('T')[0],
        to: toDate.toISOString().split('T')[0]
      };
    }

    // ── Idade sort order (chronological) ──
    const IDADE_ORDER = { '7d': 1, '15d': 2, '30d': 3, '90d': 4, '180d': 5, '1 ano': 6, '+1 ano': 7 };
    const sortIdades = (arr) => [...arr].sort((a, b) => (IDADE_ORDER[a] || 99) - (IDADE_ORDER[b] || 99));

    // ── Loading skeleton ──
    function Skeleton({ className }) {
      return <div className={`bg-gge-border rounded pulse-load ${className || ''}`} />;
    }

    // ── Toast Notification ──
    function Toast({ message, duration = 1500 }) {
      const [visible, setVisible] = useState(true);
      useEffect(() => {
        const timer = setTimeout(() => setVisible(false), duration);
        return () => clearTimeout(timer);
      }, [duration]);
      if (!visible) return null;
      return <div className="toast">{message}</div>;
    }

    // ── Metric Card ──
    function MetricCard({ label, value, sub, color, icon }) {
      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-4 fade-in">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-gge-muted text-xs font-medium leading-tight">{label}</span>
            {icon && <span className="text-lg opacity-60">{icon}</span>}
          </div>
          <div className={`text-lg font-bold whitespace-nowrap ${color || 'text-white'}`}>{value}</div>
          {sub && <div className="text-gge-muted text-xs mt-1">{sub}</div>}
        </div>
      );
    }

    // ── Filter Select with active styling ──
    function FilterSelect({ label, value, onChange, options, allLabel, labelFn, isActive }) {
      const getLabel = labelFn || (o => o);
      return (
        <div className={`flex flex-col gap-1 ${isActive ? 'filter-active' : ''}`}>
          <label className={`text-xs font-medium uppercase tracking-wider ${isActive ? 'text-gge-accent' : 'text-gge-muted'}`}>{label}</label>
          <select
            value={value}
            onChange={e => onChange(e.target.value)}
            className="bg-gge-card border border-gge-border text-gge-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gge-accent transition-colors"
          >
            <option value="">{allLabel || 'Todos'}</option>
            {options.map(o => <option key={o} value={o}>{getLabel(o)}</option>)}
          </select>
        </div>
      );
    }

    // ── Grupo Badge ──
    function GrupoBadge({ grupo }) {
      const bg = GRUPO_COLORS[grupo] || '#666';
      return (
        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
              style={{ backgroundColor: bg + '22', color: bg, border: `1px solid ${bg}44` }}>
          {grupo}
        </span>
      );
    }

    // ── Groups Summary Table with click-to-expand ──
    function GroupsSummary({ data }) {
      const [expandedGrupo, setExpandedGrupo] = useState(null);
      const [loadingAnuncios, setLoadingAnuncios] = useState({});
      const [anunciosData, setAnunciosData] = useState({});
      const [toast, setToast] = useState(null);

      const groups = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const g = row.grupo;
          if (!map[g]) map[g] = { grupo: g, anuncios: 0, vendas: 0, receita: 0, margem: 0, custo_ads: 0, custo_produto: 0, comissao: 0, custo_frete: 0, difal: 0 };
          map[g].anuncios++;
          map[g].vendas += Number(row.qtd_vendas) || 0;
          map[g].receita += Number(row.receita) || 0;
          map[g].margem += Number(row.margem_valor) || 0;
          map[g].custo_ads += Number(row.custo_ads) || 0;
          map[g].custo_produto += Number(row.custo_produto) || 0;
          map[g].comissao += Number(row.comissao) || 0;
          map[g].custo_frete += Number(row.custo_frete) || 0;
          map[g].difal += Number(row.difal_reserva) || 0;
        });
        return GRUPO_ORDER.filter(g => map[g]).map(g => ({
          ...map[g],
          mc1: map[g].margem,
          mc1_pct: map[g].receita > 0 ? (map[g].margem / map[g].receita * 100) : 0,
          mc2: map[g].margem + map[g].difal,
          mc2_pct: map[g].receita > 0 ? ((map[g].margem + map[g].difal) / map[g].receita * 100) : 0
        }));
      }, [data]);

      const totG = useMemo(() => {
        const t = { anuncios: 0, vendas: 0, receita: 0, margem: 0, custo_ads: 0, difal: 0 };
        groups.forEach(g => { t.anuncios += g.anuncios; t.vendas += g.vendas; t.receita += g.receita; t.margem += g.margem; t.custo_ads += g.custo_ads; t.difal += g.difal; });
        t.mc1 = t.margem;
        t.mc2 = t.margem + t.difal;
        return t;
      }, [groups]);

      const handleGrupoClick = async (grupo) => {
        if (expandedGrupo === grupo) {
          setExpandedGrupo(null);
          return;
        }

        if (anunciosData[grupo]) {
          setExpandedGrupo(grupo);
          return;
        }

        setLoadingAnuncios(prev => ({ ...prev, [grupo]: true }));
        try {
          const anuncios = data.filter(d => d.grupo === grupo);
          setAnunciosData(prev => ({ ...prev, [grupo]: anuncios }));
          setExpandedGrupo(grupo);
        } finally {
          setLoadingAnuncios(prev => ({ ...prev, [grupo]: false }));
        }
      };

      const copyToClipboard = (text, type) => {
        navigator.clipboard.writeText(text);
        setToast(`${type === 'mlb' ? 'MLB' : 'SKU'} copiado!`);
        setTimeout(() => setToast(null), 1500);
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl overflow-hidden fade-in">
          <div className="px-5 py-4 border-b border-gge-border">
            <h3 className="text-lg font-semibold text-white">Segmentação por Grupo</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gge-muted text-xs uppercase tracking-wider">
                  <th className="text-left px-5 py-3"></th>
                  <th className="text-left px-5 py-3">Grupo</th>
                  <th className="text-right px-3 py-3">Anúncios</th>
                  <th className="text-right px-3 py-3">Vendas</th>
                  <th className="text-right px-3 py-3">Receita</th>
                  <th className="text-right px-3 py-3">ADs</th>
                  <th className="text-right px-3 py-3 border-l border-gge-border/50">MC2 R$</th>
                  <th className="text-right px-3 py-3">MC2 %</th>
                  <th className="text-right px-3 py-3 text-gge-cyan">Share MC2</th>
                  <th className="text-right px-3 py-3 text-gge-orange border-l border-gge-border/50">DIFAL</th>
                  <th className="text-right px-3 py-3 border-l border-gge-border/50">MC1 R$</th>
                  <th className="text-right px-3 py-3">MC1 %</th>
                  <th className="text-right px-5 py-3 text-gge-cyan">Share MC1</th>
                </tr>
              </thead>
              <tbody>
                {groups.map((g, i) => (
                  <React.Fragment key={g.grupo}>
                    <tr className={`border-t border-gge-border hover:bg-white/5 transition-colors expandable-row ${i % 2 === 0 ? '' : 'bg-white/[0.02]'}`}
                        onClick={() => handleGrupoClick(g.grupo)}>
                      <td className="px-5 py-3 text-gge-muted text-lg">{expandedGrupo === g.grupo ? '▼' : '▶'}</td>
                      <td className="px-5 py-3"><GrupoBadge grupo={g.grupo} /></td>
                      <td className="text-right px-3 py-3 text-gge-text">{fmtInt(g.anuncios)}</td>
                      <td className="text-right px-3 py-3 text-gge-text">{fmtInt(g.vendas)}</td>
                      <td className="text-right px-3 py-3 text-white font-medium">R$ {fmt(g.receita)}</td>
                      <td className="text-right px-3 py-3 text-gge-yellow">R$ {fmt(g.custo_ads)}</td>
                      <td className={`text-right px-3 py-3 font-medium border-l border-gge-border/50 ${g.mc2 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        R$ {fmt(g.mc2)}
                      </td>
                      <td className={`text-right px-3 py-3 ${g.mc2_pct >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        {fmtPct(g.mc2_pct)}
                      </td>
                      <td className="text-right px-3 py-3 text-gge-cyan">
                        {totG.mc2 !== 0 ? fmtPct(g.mc2 / totG.mc2 * 100) : '—'}
                      </td>
                      <td className="text-right px-3 py-3 text-gge-orange border-l border-gge-border/50">
                        R$ {fmt(g.difal)}
                      </td>
                      <td className={`text-right px-3 py-3 font-bold border-l border-gge-border/50 ${g.mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        R$ {fmt(g.mc1)}
                      </td>
                      <td className={`text-right px-3 py-3 font-bold ${g.mc1_pct >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        {fmtPct(g.mc1_pct)}
                      </td>
                      <td className="text-right px-5 py-3 text-gge-cyan">
                        {totG.mc1 !== 0 ? fmtPct(g.mc1 / totG.mc1 * 100) : '—'}
                      </td>
                    </tr>

                    {expandedGrupo === g.grupo && (
                      <tr className="bg-gge-bg/50 border-t border-gge-border/30">
                        <td colSpan="13" className="px-5 py-4">
                          {loadingAnuncios[g.grupo] ? (
                            <div className="text-center text-gge-muted text-sm">Carregando anúncios...</div>
                          ) : (
                            <div className="space-y-2">
                              <h4 className="text-xs font-semibold text-white uppercase tracking-wider">Anúncios no Grupo {g.grupo}</h4>
                              <div className="overflow-x-auto rounded-lg border border-gge-border/30">
                                <table className="w-full text-xs">
                                  <thead>
                                    <tr className="text-gge-muted uppercase tracking-wider bg-gge-border/10">
                                      <th className="text-left px-3 py-2">Título</th>
                                      <th className="text-left px-3 py-2">MLB ID</th>
                                      <th className="text-left px-3 py-2">SKU</th>
                                      <th className="text-right px-3 py-2">Margem %</th>
                                      <th className="text-right px-3 py-2">Margem R$</th>
                                      <th className="text-right px-3 py-2">Receita</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {anunciosData[g.grupo]?.map((item, idx) => (
                                      <tr key={idx} className={`border-t border-gge-border/20 ${idx % 2 === 0 ? '' : 'bg-white/[0.01]'}`}>
                                        <td className="px-3 py-2 text-gge-text truncate max-w-xs" title={item.titulo}>{item.titulo}</td>
                                        <td className="px-3 py-2 text-gge-accent font-mono whitespace-nowrap">
                                          <div className="inline-flex items-center gap-1">
                                            <span>{item.mlb_id}</span>
                                            <button onClick={(e) => { e.stopPropagation(); copyToClipboard(item.mlb_id, 'mlb'); }}
                                                    className="opacity-50 hover:opacity-100 transition-opacity" title="Copiar MLB">
                                              📋
                                            </button>
                                          </div>
                                        </td>
                                        <td className="px-3 py-2 text-gge-text whitespace-nowrap">
                                          <div className="inline-flex items-center gap-1">
                                            <span className="truncate max-w-[150px]">{item.sku_vendedor || '—'}</span>
                                            {item.sku_vendedor && (
                                              <button onClick={(e) => { e.stopPropagation(); copyToClipboard(item.sku_vendedor, 'sku'); }}
                                                      className="opacity-50 hover:opacity-100 transition-opacity shrink-0" title="Copiar SKU">
                                                📋
                                              </button>
                                            )}
                                          </div>
                                        </td>
                                        <td className={`text-right px-3 py-2 ${Number(item.margem_pct) >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                                          {fmtPct(item.margem_pct)}
                                        </td>
                                        <td className={`text-right px-3 py-2 font-medium ${Number(item.margem_valor) >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                                          R$ {fmt(item.margem_valor)}
                                        </td>
                                        <td className="text-right px-3 py-2 text-white">R$ {fmt(item.receita)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-gge-border font-bold">
                  <td className="px-5 py-3"></td>
                  <td className="px-5 py-3 text-white">TOTAL</td>
                  <td className="text-right px-3 py-3 text-white">{fmtInt(totG.anuncios)}</td>
                  <td className="text-right px-3 py-3 text-white">{fmtInt(totG.vendas)}</td>
                  <td className="text-right px-3 py-3 text-white">R$ {fmt(totG.receita)}</td>
                  <td className="text-right px-3 py-3 text-gge-yellow">R$ {fmt(totG.custo_ads)}</td>
                  <td className={`text-right px-3 py-3 border-l border-gge-border/50 ${totG.mc2 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                    R$ {fmt(totG.mc2)}
                  </td>
                  <td className={`text-right px-3 py-3 ${totG.receita > 0 && totG.mc2/totG.receita*100 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                    {fmtPct(totG.receita > 0 ? totG.mc2/totG.receita*100 : 0)}
                  </td>
                  <td className="text-right px-3 py-3 text-gge-cyan">100%</td>
                  <td className="text-right px-3 py-3 text-gge-orange border-l border-gge-border/50">R$ {fmt(totG.difal)}</td>
                  <td className={`text-right px-3 py-3 border-l border-gge-border/50 ${totG.mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                    R$ {fmt(totG.mc1)}
                  </td>
                  <td className={`text-right px-3 py-3 ${totG.receita > 0 && totG.mc1/totG.receita*100 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                    {fmtPct(totG.receita > 0 ? totG.mc1/totG.receita*100 : 0)}
                  </td>
                  <td className="text-right px-5 py-3 text-gge-cyan">100%</td>
                </tr>
              </tfoot>
            </table>
          </div>
          {toast && <Toast message={toast} />}
        </div>
      );
    }

    // ── Groups Bar Chart — MC1 = c/ DIFAL (final), MC2 = s/ DIFAL ──
    function GroupsChart({ data }) {
      const chartData = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const g = row.grupo;
          if (!map[g]) map[g] = { grupo: g, receita: 0, mc1: 0, mc2: 0, difal: 0 };
          map[g].receita += Number(row.receita) || 0;
          map[g].mc1 += Number(row.margem_valor) || 0;
          map[g].difal += Number(row.difal_reserva) || 0;
        });
        return GRUPO_ORDER.filter(g => map[g]).map(g => ({
          ...map[g],
          mc2: map[g].mc1 + map[g].difal
        }));
      }, [data]);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 shadow-xl">
            <p className="font-semibold text-white mb-1">{GRUPO_LABELS[d.grupo] || d.grupo}</p>
            <p className="text-sm text-gge-muted">Receita: <span className="text-white">R$ {fmt(d.receita)}</span></p>
            <p className="text-sm text-gge-muted">MC2 (s/ DIFAL): <span className={d.mc2 >= 0 ? 'text-gge-green' : 'text-gge-red'}>R$ {fmt(d.mc2)}</span></p>
            <p className="text-sm text-gge-muted">DIFAL: <span className="text-gge-orange">R$ {fmt(d.difal)}</span></p>
            <p className="text-sm text-gge-muted">MC1 (c/ DIFAL): <span className={d.mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}>R$ {fmt(d.mc1)}</span></p>
          </div>
        );
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <h3 className="text-lg font-semibold text-white mb-4">Margem por Grupo (R$)</h3>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2a2d3e" />
              <XAxis dataKey="grupo" tick={{ fill: '#94a3b8', fontSize: 12 }} axisLine={{ stroke: '#2a2d3e' }} />
              <YAxis tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={{ stroke: '#2a2d3e' }}
                     tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
              <Tooltip content={<CustomTooltip />} />
              <Bar dataKey="mc1" radius={[6, 6, 0, 0]}>
                {chartData.map((entry, i) => (
                  <Cell key={i} fill={GRUPO_COLORS[entry.grupo] || '#666'} opacity={0.85} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ── Distribution Pie with percentage in legend ──
    function DistributionPie({ data, title, field, labelFn }) {
      const pieData = useMemo(() => {
        const map = {};
        data.forEach(row => {
          const rawKey = row[field] || 'Desconhecido';
          const displayKey = labelFn ? labelFn(rawKey) : rawKey;
          if (!map[displayKey]) map[displayKey] = { name: displayKey, value: 0 };
          map[displayKey].value += Number(row.receita) || 0;
        });
        return Object.values(map).sort((a,b) => b.value - a.value);
      }, [data, field, labelFn]);

      const COLORS = ['#6366f1','#22c55e','#3b82f6','#eab308','#ef4444','#a855f7','#f97316','#14b8a6'];
      const total = pieData.reduce((s, d) => s + d.value, 0);

      const CustomLegend = (props) => {
        return (
          <div className="flex flex-wrap gap-2 justify-center mt-3 text-xs">
            {pieData.map((item, i) => (
              <span key={i} className="flex items-center gap-1.5">
                <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: COLORS[i % COLORS.length] }}></span>
                <span className="text-gge-text">{item.name}</span>
                <span className="text-gge-muted">({fmtPct(total > 0 ? item.value / total * 100 : 0)})</span>
              </span>
            ))}
          </div>
        );
      };

      const renderLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent, name }) => {
        if (percent < 0.03) return null;
        const RADIAN = Math.PI / 180;
        const radius = innerRadius + (outerRadius - innerRadius) * 0.5;
        const x = cx + radius * Math.cos(-midAngle * RADIAN);
        const y = cy + radius * Math.sin(-midAngle * RADIAN);
        return (
          <text x={x} y={y} fill="#fff" textAnchor="middle" dominantBaseline="central"
                fontSize={11} fontWeight="bold">
            {(percent * 100).toFixed(1)}%
          </text>
        );
      };

      const PieTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const d = payload[0];
        const pct = total > 0 ? (d.value / total * 100).toFixed(1) : '0.0';
        return (
          <div style={{ backgroundColor: '#1e2235', border: '1px solid #3a3f5c', borderRadius: 8,
                        padding: '8px 12px', color: '#e2e8f0', fontSize: 13 }}>
            <p style={{ margin: 0, fontWeight: 600, color: d.payload?.fill || '#fff' }}>{d.name}</p>
            <p style={{ margin: '4px 0 0', color: '#cbd5e1' }}>R$ {fmt(d.value)} ({pct}%)</p>
          </div>
        );
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <h3 className="text-lg font-semibold text-white mb-4">{title}</h3>
          <ResponsiveContainer width="100%" height={250}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%"
                   outerRadius={85} innerRadius={45} paddingAngle={2}
                   stroke="#1a1d2e" strokeWidth={2}
                   label={renderLabel} labelLine={false}>
                {pieData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
              </Pie>
              <Tooltip content={<PieTooltip />} />
            </PieChart>
          </ResponsiveContainer>
          <CustomLegend />
        </div>
      );
    }

    // ── Top Anúncios Table with copy buttons ──
    function TopAnuncios({ data, allData, visitasData, mode, onDrill, totals }) {
      const [toast, setToast] = useState(null);

      const sorted = useMemo(() => {
        const filtered = data.filter(d => Number(d.receita) > 0);
        if (mode === 'lucro') return [...filtered].sort((a,b) => Number(b.margem_valor) - Number(a.margem_valor)).slice(0, 10);
        if (mode === 'prejuizo') return [...filtered].sort((a,b) => Number(a.margem_valor) - Number(b.margem_valor)).slice(0, 10);

        if (mode === 'crescimento_vendas') {
          // Compare current month vs previous month per mlb_id
          const today = new Date();
          const curMonth = today.toISOString().slice(0, 7);
          const prevDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
          const prevMonth = prevDate.toISOString().slice(0, 7);

          const curMap = {};
          const prevMap = {};
          (allData || []).forEach(d => {
            const m = String(d.mes).slice(0, 7);
            const mlb = d.mlb_id;
            const qty = Number(d.qtd_vendas) || 0;
            if (m === curMonth) curMap[mlb] = (curMap[mlb] || 0) + qty;
            if (m === prevMonth) prevMap[mlb] = (prevMap[mlb] || 0) + qty;
          });

          // Build growth list with titulo from filtered data
          const mlbInfo = {};
          filtered.forEach(d => { if (!mlbInfo[d.mlb_id]) mlbInfo[d.mlb_id] = d; });

          const growthList = Object.keys(curMap).filter(mlb => prevMap[mlb] > 0 && mlbInfo[mlb]).map(mlb => ({
            ...mlbInfo[mlb],
            _growth_pct: ((curMap[mlb] - prevMap[mlb]) / prevMap[mlb]) * 100,
            _cur_vendas: curMap[mlb],
            _prev_vendas: prevMap[mlb]
          }));
          return growthList.sort((a, b) => b._growth_pct - a._growth_pct).slice(0, 10);
        }

        if (mode === 'crescimento_visitas' && visitasData) {
          // visitasData = { mlb_id: { cur: N, prev: N } }
          const mlbInfo = {};
          filtered.forEach(d => { if (!mlbInfo[d.mlb_id]) mlbInfo[d.mlb_id] = d; });

          const growthList = Object.keys(visitasData).filter(mlb => visitasData[mlb].prev > 0 && mlbInfo[mlb]).map(mlb => ({
            ...mlbInfo[mlb],
            _growth_pct: ((visitasData[mlb].cur - visitasData[mlb].prev) / visitasData[mlb].prev) * 100,
            _cur_visitas: visitasData[mlb].cur,
            _prev_visitas: visitasData[mlb].prev
          }));
          return growthList.sort((a, b) => b._growth_pct - a._growth_pct).slice(0, 10);
        }

        return [...filtered].sort((a,b) => Number(b.receita) - Number(a.receita)).slice(0, 10);
      }, [data, allData, visitasData, mode]);

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        setToast('MLB copiado!');
        setTimeout(() => setToast(null), 1500);
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl overflow-hidden fade-in">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gge-muted text-xs uppercase tracking-wider">
                  <th className="text-left px-4 py-3 w-12">#</th>
                  <th className="text-left px-4 py-3">Anúncio</th>
                  {(mode === 'crescimento_vendas' || mode === 'crescimento_visitas') && (
                    <th className="text-right px-4 py-3 text-gge-green">Crescimento</th>
                  )}
                  <th className="text-right px-4 py-3">Vendas</th>
                  <th className="text-right px-4 py-3">Receita</th>
                  <th className="text-right px-4 py-3">DIFAL</th>
                  <th className="text-right px-4 py-3">MC1</th>
                  <th className="text-right px-4 py-3">MC1%</th>
                  <th className="text-right px-4 py-3 text-gge-cyan border-l border-gge-border/50">Share Rec.</th>
                  <th className="text-right px-4 py-3 text-gge-cyan">Share MC1</th>
                  <th className="text-center px-4 py-3">Grupo</th>
                </tr>
              </thead>
              <tbody>
               {sorted.map((row, i) => {
                  const mc1 = Number(row.margem_valor) || 0;
                  const mc1pct = Number(row.receita) > 0 ? mc1/Number(row.receita)*100 : 0;
                  const difal = Number(row.difal_reserva) || 0;
                  const shareRec = totals && totals.receita > 0 ? (Number(row.receita) / totals.receita * 100) : 0;
                  const shareMC1 = totals && totals.mc1 !== 0 ? (mc1 / totals.mc1 * 100) : 0;
                  return (
                    <tr key={row.mlb_id + '-' + i} className="border-t border-gge-border/50 hover:bg-white/5 transition-colors row-clickable"
                        onClick={() => onDrill && onDrill(row.mlb_id, row.titulo)}>
                      <td className="px-4 py-2.5 text-gge-muted">{i+1}</td>
                      <td className="px-4 py-2.5">
                        <div className="text-white text-sm font-medium truncate max-w-xs" title={row.titulo}>{row.titulo}</div>
                        <div className="text-gge-muted text-xs flex items-center gap-2 mt-0.5">
                          <span>{row.sku_vendedor || '—'} · {row.mlb_id}</span>
                          <button onClick={(e) => { e.stopPropagation(); copyToClipboard(row.mlb_id); }}
                                  className="opacity-50 hover:opacity-100 transition-opacity" title="Copiar MLB ID">
                            📋
                          </button>
                        </div>
                      </td>
                      {mode === 'crescimento_vendas' && (
                        <td className="text-right px-4 py-2.5">
                          <span className={`font-bold ${(row._growth_pct || 0) >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                            {(row._growth_pct || 0) >= 0 ? '▲' : '▼'} {Math.abs(row._growth_pct || 0).toFixed(1)}%
                          </span>
                          <div className="text-gge-muted text-xs">{row._prev_vendas || 0} → {row._cur_vendas || 0}</div>
                        </td>
                      )}
                      {mode === 'crescimento_visitas' && (
                        <td className="text-right px-4 py-2.5">
                          <span className={`font-bold ${(row._growth_pct || 0) >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                            {(row._growth_pct || 0) >= 0 ? '▲' : '▼'} {Math.abs(row._growth_pct || 0).toFixed(1)}%
                          </span>
                          <div className="text-gge-muted text-xs">{row._prev_visitas || 0} → {row._cur_visitas || 0}</div>
                        </td>
                      )}
                      <td className="text-right px-4 py-2.5 text-gge-text">{fmtInt(row.qtd_vendas)}</td>
                      <td className="text-right px-4 py-2.5 text-white">R$ {fmt(row.receita)}</td>
                      <td className="text-right px-4 py-2.5 text-gge-orange">{difal > 0 ? `R$ ${fmt(difal)}` : '—'}</td>
                      <td className={`text-right px-4 py-2.5 font-medium ${mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>
                        R$ {fmt(mc1)}
                      </td>
                      <td className={`text-right px-4 py-2.5 font-bold ${mc1pct >= 0 ? 'text-gge-green' : 'text-gge-red'}`}>{fmtPct(mc1pct)}</td>
                      <td className="text-right px-4 py-2.5 text-gge-cyan border-l border-gge-border/50">{fmtPct(shareRec)}</td>
                      <td className={`text-right px-4 py-2.5 font-medium ${shareMC1 >= 0 ? 'text-gge-cyan' : 'text-gge-red'}`}>{fmtPct(shareMC1)}</td>
                      <td className="text-center px-4 py-2.5"><GrupoBadge grupo={row.grupo} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {toast && <Toast message={toast} />}
        </div>
      );
    }

    // ── Alerts Panel ──
    function AlertsPanel({ data }) {
      const alerts = useMemo(() => {
        const list = [];
        // P1 anúncios — prejuízo estrutural
        const p1 = data.filter(d => d.grupo === 'P1').sort((a,b) => Number(a.margem_valor) - Number(b.margem_valor));
        if (p1.length > 0) {
          const totalLoss = p1.reduce((s, d) => s + (Number(d.margem_valor) || 0), 0);
          list.push({ severity: 'critical', icon: '\u26A0\uFE0F', title: `${p1.length} anúncios em prejuízo estrutural (P1)`,
            detail: `Perda total: R$ ${fmt(Math.abs(totalLoss))}`,
            items: p1.slice(0, 3).map(d => ({ mlb: d.mlb_id, text: `${d.titulo?.slice(0, 50)}... → R$ ${fmt(d.margem_valor)}` })) });
        }
        // P2 — prejuízo por ADs
        const p2 = data.filter(d => d.grupo === 'P2');
        if (p2.length > 0) {
          const adsWasted = p2.reduce((s, d) => s + (Number(d.custo_ads) || 0), 0);
          list.push({ severity: 'warning', icon: '\uD83D\uDCE2', title: `${p2.length} anúncios com prejuízo por ADs (P2)`,
            detail: `Gasto em ADs: R$ ${fmt(adsWasted)} — margem seria positiva sem ADs`,
            items: p2.slice(0, 3).map(d => ({ mlb: d.mlb_id, text: `${d.titulo?.slice(0, 50)}... → ADs: R$ ${fmt(d.custo_ads)}` })) });
        }
        // P3 — Só ads sem vendas
        const p3 = data.filter(d => d.grupo === 'P3' || d.apenas_ads);
        if (p3.length > 0) {
          const wasted = p3.reduce((s, d) => s + (Number(d.custo_ads) || 0), 0);
          list.push({ severity: 'warning', icon: '\uD83D\uDED1', title: `${p3.length} anúncios com gasto em ADs mas sem vendas (P3)`,
            detail: `R$ ${fmt(wasted)} gastos em ADs sem gerar nenhuma venda no período`,
            items: p3.slice(0, 3).map(d => ({ mlb: d.mlb_id, text: `${d.titulo?.slice(0, 50)}... → ADs: R$ ${fmt(d.custo_ads)}` })) });
        }
        // Sem custo cadastrado
        const semCusto = data.filter(d => !d.tem_custo && Number(d.receita) > 0);
        if (semCusto.length > 0) {
          const receitaSemCusto = semCusto.reduce((s, d) => s + (Number(d.receita) || 0), 0);
          list.push({ severity: 'info', icon: '\u2753', title: `${semCusto.length} anúncios sem custo de produto`,
            detail: `Receita sem margem calculável: R$ ${fmt(receitaSemCusto)}`,
            items: semCusto.slice(0, 3).map(d => ({ mlb: d.mlb_id, text: `${d.titulo?.slice(0, 50)}... → Receita: R$ ${fmt(d.receita)}` })) });
        }
        return list;
      }, [data]);

      if (alerts.length === 0) return null;

      const sevColor = { critical: 'border-gge-red/50 bg-gge-red/5', warning: 'border-gge-yellow/50 bg-gge-yellow/5', info: 'border-gge-accent/30 bg-gge-accent/5' };
      const sevText = { critical: 'text-gge-red', warning: 'text-gge-yellow', info: 'text-gge-accent' };

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 fade-in">
          {alerts.map((a, i) => (
            <div key={i} className={`border rounded-xl p-4 ${sevColor[a.severity]} alert-pulse`}>
              <div className="flex items-start gap-3">
                <span className="text-xl">{a.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className={`font-semibold text-sm ${sevText[a.severity]}`}>{a.title}</div>
                  <div className="text-gge-muted text-xs mt-0.5">{a.detail}</div>
                  {a.items && (
                    <div className="mt-2 space-y-1">
                      {a.items.map((item, j) => (
                        <div key={j} className="text-xs text-gge-text flex items-center gap-2">
                          <code className="text-gge-accent font-mono text-xs bg-white/5 px-1.5 py-0.5 rounded shrink-0">{item.mlb}</code>
                          <button className="shrink-0 opacity-60 hover:opacity-100 transition-opacity" title="Copiar MLB"
                            onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText(item.mlb); const b=e.currentTarget; b.textContent='\u2705'; setTimeout(()=>b.textContent='\uD83D\uDCCB',1200); }}>
                            {'\uD83D\uDCCB'}
                          </button>
                          <span className="truncate">{item.text}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── Evolution Chart (monthly MC1/MC2/Receita) ──
    function EvolutionChart({ rawData, allMeses }) {
      const chartData = useMemo(() => {
        const sorted = [...allMeses].sort((a,b) => a.localeCompare(b));
        return sorted.map(m => {
          const rows = rawData.filter(d => d.mes === m);
          const receita = rows.reduce((s, d) => s + (Number(d.receita) || 0), 0);
          const mc1 = rows.reduce((s, d) => s + (Number(d.margem_valor) || 0), 0);
          const difal = rows.reduce((s, d) => s + (Number(d.difal_reserva) || 0), 0);
          const ads = rows.reduce((s, d) => s + (Number(d.custo_ads) || 0), 0);
          const mc2 = mc1 + difal;
          return {
            mes: fmtMes(m),
            receita: Math.round(receita),
            mc2: Math.round(mc2),
            mc1: Math.round(mc1),
            ads: Math.round(ads),
            mc1_pct: receita > 0 ? Math.round(mc1 / receita * 1000) / 10 : 0,
            mc2_pct: receita > 0 ? Math.round(mc2 / receita * 1000) / 10 : 0,
          };
        }).filter(d => d.receita > 0);
      }, [rawData, allMeses]);

      if (chartData.length < 2) return null;

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 shadow-xl text-sm">
            <p className="font-semibold text-white mb-1">{d.mes}</p>
            <p className="text-gge-muted">Receita: <span className="text-white">R$ {fmt(d.receita)}</span></p>
            <p className="text-gge-muted">MC2: <span className="text-gge-cyan">R$ {fmt(d.mc2)} ({fmtPct(d.mc2_pct)})</span></p>
            <p className="text-gge-muted">MC1: <span className={d.mc1 >= 0 ? 'text-gge-green' : 'text-gge-red'}>R$ {fmt(d.mc1)} ({fmtPct(d.mc1_pct)})</span></p>
            <p className="text-gge-muted">ADs: <span className="text-gge-yellow">R$ {fmt(d.ads)}</span></p>
          </div>
        );
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <h3 className="text-lg font-semibold text-white mb-4">Evolução Mensal</h3>
          <ResponsiveContainer width="100%" height={300}>
            <ComposedChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2a2d3e" />
              <XAxis dataKey="mes" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={{ stroke: '#2a2d3e' }} />
              <YAxis tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={{ stroke: '#2a2d3e' }}
                     tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
              <Tooltip content={<CustomTooltip />} />
              <Area type="monotone" dataKey="receita" fill="#6366f1" fillOpacity={0.08} stroke="#6366f1" strokeWidth={1.5} strokeDasharray="4 4" />
              <Line type="monotone" dataKey="mc2" stroke="#22d3ee" strokeWidth={2.5} dot={{ r: 4 }} />
              <Line type="monotone" dataKey="mc1" stroke="#22c55e" strokeWidth={2.5} dot={{ r: 4 }} />
              <Line type="monotone" dataKey="ads" stroke="#eab308" strokeWidth={1.5} dot={{ r: 3 }} strokeDasharray="3 3" />
              <ReferenceLine y={0} stroke="#ef4444" strokeDasharray="3 3" strokeOpacity={0.5} />
            </ComposedChart>
          </ResponsiveContainer>
          <div className="flex items-center justify-center gap-6 mt-3 text-xs">
            <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 bg-[#6366f1] inline-block" style={{borderTop:'1px dashed #6366f1'}}></span><span className="text-gge-muted">Receita</span></span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 bg-[#22d3ee] inline-block"></span><span className="text-gge-muted">MC2</span></span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 bg-[#22c55e] inline-block"></span><span className="text-gge-muted">MC1</span></span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-0.5 bg-[#eab308] inline-block" style={{borderTop:'1px dashed #eab308'}}></span><span className="text-gge-muted">ADs</span></span>
          </div>
        </div>
      );
    }

    // ── Curva ABC (Pareto) ──
    function CurvaABC({ data }) {
      const chartData = useMemo(() => {
        const sorted = [...data].filter(d => Number(d.receita) > 0)
          .sort((a, b) => Number(b.receita) - Number(a.receita));
        const totalReceita = sorted.reduce((s, d) => s + Number(d.receita), 0);
        let cumulative = 0;
        return sorted.slice(0, 50).map((d, i) => {
          cumulative += Number(d.receita);
          const pctCum = totalReceita > 0 ? (cumulative / totalReceita * 100) : 0;
          return {
            rank: i + 1,
            name: (d.titulo || '').slice(0, 25) + (d.titulo?.length > 25 ? '...' : ''),
            fullName: d.titulo,
            mlb_id: d.mlb_id,
            receita: Number(d.receita),
            margem: Number(d.margem_valor) || 0,
            pctCum: Math.round(pctCum * 10) / 10,
            classe: pctCum <= 80 ? 'A' : pctCum <= 95 ? 'B' : 'C',
          };
        });
      }, [data]);

      if (chartData.length < 5) return null;

      const countA = chartData.filter(d => d.classe === 'A').length;
      const countB = chartData.filter(d => d.classe === 'B').length;
      const countC = chartData.filter(d => d.classe === 'C').length;
      const totalItems = data.filter(d => Number(d.receita) > 0).length;

      const classeColors = { A: '#22c55e', B: '#eab308', C: '#ef4444' };

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div className="bg-gge-card border border-gge-border rounded-lg p-3 shadow-xl text-sm">
            <p className="font-semibold text-white mb-1">#{d.rank} — {d.fullName?.slice(0, 60)}</p>
            <p className="text-gge-muted">{d.mlb_id}</p>
            <p className="text-gge-muted">Receita: <span className="text-white">R$ {fmt(d.receita)}</span></p>
            <p className="text-gge-muted">Margem: <span className={d.margem >= 0 ? 'text-gge-green' : 'text-gge-red'}>R$ {fmt(d.margem)}</span></p>
            <p className="text-gge-muted">Acumulado: <span className="text-gge-cyan">{fmtPct(d.pctCum)}</span></p>
            <p className="text-gge-muted">Classe: <span style={{color: classeColors[d.classe]}} className="font-bold">{d.classe}</span></p>
          </div>
        );
      };

      return (
        <div className="bg-gge-card border border-gge-border rounded-xl p-5 fade-in">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-lg font-semibold text-white">Curva ABC — Top 50 Anúncios</h3>
            <div className="flex gap-3 text-xs">
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-gge-green"></span> A: {countA} ({totalItems > 0 ? Math.round(countA/totalItems*100) : 0}%)</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-gge-yellow"></span> B: {countB}</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-gge-red"></span> C: {Math.max(0, totalItems - countA - countB)}</span>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={300}>
            <ComposedChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2a2d3e" />
              <XAxis dataKey="rank" tick={{ fill: '#94a3b8', fontSize: 10 }} axisLine={{ stroke: '#2a2d3e' }} />
              <YAxis yAxisId="left" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={{ stroke: '#2a2d3e' }}
                     tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
              <YAxis yAxisId="right" orientation="right" domain={[0, 100]} tick={{ fill: '#94a3b8', fontSize: 11 }}
                     axisLine={{ stroke: '#2a2d3e' }} tickFormatter={v => `${v}%`} />
              <Tooltip content={<CustomTooltip />} />
              <Bar yAxisId="left" dataKey="receita" radius={[3, 3, 0, 0]}>
                {chartData.map((entry, i) => (
                  <Cell key={i} fill={classeColors[entry.classe]} opacity={0.7} />
                ))}
              </Bar>
              <Line yAxisId="right" type="monotone" dataKey="pctCum" stroke="#22d3ee" strokeWidth={2.5} dot={false} />
              <ReferenceLine yAxisId="right" y={80} stroke="#22c55e" strokeDasharray="3 3" strokeOpacity={0.5} label={{ value: '80%', fill: '#22c55e', fontSize: 10 }} />
              <ReferenceLine yAxisId="right" y={95} stroke="#eab308" strokeDasharray="3 3" strokeOpacity={0.5} label={{ value: '95%', fill: '#eab308', fontSize: 10 }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ── Drill-down Modal ──
    function DrilldownModal({ mlbId, titulo, data, onClose }) {
      const [vendas, setVendas] = useState([]);
      const [loadingVendas, setLoadingVendas] = useState(true);

      useEffect(() => {
        if (!mlbId) return;
        async function fetchVendas() {
          setLoadingVendas(true);
          const { data: rows, error } = await supabase
            .from('vw_margem_canonica')
            .select('ordem_id,data_venda,quantidade,receita,comissao,custo_frete,frete_origem,custo_produto,custo_origem,custo_ads_rateado,ads_origem,pis_cofins_debito,credito_pis_cofins,imposto_simples,difal_reserva,margem_valor,margem_pct,comprador_uf')
            .eq('mlb_id', mlbId)
            .order('data_venda', { ascending: false })
            .limit(200);
          if (!error && rows) setVendas(rows);
          setLoadingVendas(false);
        }
        fetchVendas();
      }, [mlbId]);

      // MLB summary from parent data
      const mlbData = useMemo(() => data.find(d => d.mlb_id === mlbId), [data, mlbId]);

      const vendaTotals = useMemo(() => {
        const t = { receita: 0, comissao: 0, frete: 0, custo: 0, ads: 0, pis: 0, credPis: 0, simples: 0, difal: 0, margem: 0, count: vendas.length };
        vendas.forEach(v => {
          t.receita += Number(v.receita) || 0;
          t.comissao += Number(v.comissao) || 0;
          t.frete += Number(v.custo_frete) || 0;
          t.custo += Number(v.custo_produto) || 0;
          t.ads += Number(v.custo_ads_rateado) || 0;
          t.pis += Number(v.pis_cofins_debito) || 0;
          t.credPis += Number(v.credito_pis_cofins) || 0;
          t.simples += Number(v.imposto_simples) || 0;
          t.difal += Number(v.difal_reserva) || 0;
          t.margem += Number(v.margem_valor) || 0;
        });
        return t;
      }, [vendas]);

      if (!mlbId) return null;

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="sticky top-0 bg-gge-card border-b border-gge-border rounded-t-2xl px-6 py-4 flex items-center justify-between z-10">
              <div className="min-w-0 flex-1">
                <h2 className="text-lg font-bold text-white truncate">{titulo || mlbId}</h2>
                <div className="flex items-center gap-3 mt-1 text-xs text-gge-muted">
                  <span>{mlbId}</span>
                  {mlbData && <><span>SKU: {mlbData.sku_vendedor || '—'}</span><span>Conta: {mlbData.conta_nome}</span><GrupoBadge grupo={mlbData.grupo} /></>}
                </div>
              </div>
              <button onClick={onClose} className="text-gge-muted hover:text-white text-2xl px-2 transition-colors">&times;</button>
            </div>

            <div className="p-6 space-y-5">
              {/* Memória de cálculo */}
              {mlbData && (
                <div className="bg-gge-bg rounded-xl p-4 border border-gge-border">
                  <h4 className="text-sm font-semibold text-white mb-3">Memória de Cálculo — Período Selecionado</h4>
                  <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3 text-center">
                    {[
                      ['Receita', mlbData.receita, 'text-white'],
                      ['Comissão', mlbData.comissao, 'text-gge-red'],
                      ['Frete', mlbData.custo_frete, 'text-gge-red'],
                      ['Custo Prod.', mlbData.custo_produto, 'text-gge-red'],
                      ['ADs', mlbData.custo_ads, 'text-gge-yellow'],
                      ['DIFAL', mlbData.difal_reserva, 'text-gge-orange'],
                      ['MC1', mlbData.margem_valor, Number(mlbData.margem_valor) >= 0 ? 'text-gge-green' : 'text-gge-red'],
                    ].map(([label, val, color]) => (
                      <div key={label}>
                        <div className="text-gge-muted text-xs uppercase tracking-wider">{label}</div>
                        <div className={`text-sm font-bold mt-0.5 ${color}`}>R$ {fmt(val)}</div>
                      </div>
                    ))}
                  </div>
                  {mlbData.receita > 0 && (
                    <div className="mt-3 h-4 rounded-full bg-gge-border overflow-hidden flex">
                      {[
                        { val: Number(mlbData.custo_produto)/Number(mlbData.receita)*100, color: '#3b82f6', label: 'Custo' },
                        { val: Number(mlbData.comissao)/Number(mlbData.receita)*100, color: '#a855f7', label: 'Comissão' },
                        { val: Number(mlbData.custo_frete)/Number(mlbData.receita)*100, color: '#f97316', label: 'Frete' },
                        { val: Number(mlbData.custo_ads)/Number(mlbData.receita)*100, color: '#eab308', label: 'ADs' },
                        { val: Math.max(0, Number(mlbData.difal_reserva)/Number(mlbData.receita)*100), color: '#ef4444', label: 'DIFAL' },

                          <th className="text-right px-3 py-2">Frete</th>
                          <th className="text-right px-3 py-2">Custo</th>

                          <th className="text-right px-3 py-2">DIFAL</th>

                      <tbody>
                        {vendas.map((v, i) => {
                          const mc = Number(v.margem_valor) || 0;
                          const mcPct = Number(v.margem_pct) || 0;

    }
